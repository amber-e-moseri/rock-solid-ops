
[functions.registration-processor]
enabled = true
verify_jwt = true
import_map = "./functions/registration-processor/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/registration-processor/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/registration-processor/*.html" ]

[functions.retry-worker]
enabled = true
verify_jwt = true
entrypoint = "./functions/retry-worker/index.ts"
# Schedule is defined in ./functions/retry-worker/config.toml

[functions.clickup-sync]
enabled = true
verify_jwt = true
entrypoint = "./functions/clickup-sync/index.ts"

[functions.missed-class-detector]
enabled = true
verify_jwt = false
entrypoint = "./functions/missed-class-detector/index.ts"
# Schedule is defined in ./functions/missed-class-detector/config.toml
