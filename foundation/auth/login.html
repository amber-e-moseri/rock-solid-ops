<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundation School Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../ui/premium-theme.css" />
</head>
<body class="min-h-screen bg-[#F4EFE3] text-[#1E1630] flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-white border border-purple-100 rounded-2xl p-6 shadow-sm">
    <h1 class="text-2xl font-bold text-[#4C2A92] mb-4">Foundation School Login</h1>
    <form id="loginForm" class="space-y-3">
      <input id="email" type="email" required placeholder="Email" class="w-full px-3 py-2 border rounded-lg" />
      <input id="password" type="password" required placeholder="Password" class="w-full px-3 py-2 border rounded-lg" />
      <button type="submit" class="w-full px-4 py-2 rounded-lg bg-[#4C2A92] text-white font-semibold">Sign In</button>
    </form>
    <p id="msg" class="text-sm text-slate-600 mt-3"></p>
  </div>

  <script src="../js/config.js"></script>
  <script type="module">
    import { supabase } from "./auth-client.js";

    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "Signing in...";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        msg.textContent = error.message;
        return;
      }

      window.location.href = "/foundation/staff/admin-dashboard.html";
    });
  </script>
  <script src="../ui/premium-shell.js"></script>
</body>
</html>
