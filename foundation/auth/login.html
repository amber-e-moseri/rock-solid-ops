<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Solid Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../ui/premium-theme.css" />
  <style>
    body {
      background: var(--color-bg, #f5f3ff);
      margin: 0;
    }
    .login-card {
      max-width: 400px;
      background: #fff;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 32px;
    }
    .login-card .login-title {
      font-size: 24px;
      font-weight: 700;
      color: #4C2A92 !important;
    }
    .login-input {
      border: 1px solid #e0d9ff;
      border-radius: 8px;
    }
    .login-submit {
      width: 100%;
      border-radius: 8px;
    }
    #forgotPasswordBtn {
      appearance: none;
      -webkit-appearance: none;
      background: transparent !important;
      background-color: transparent !important;
      background-image: none !important;
      border: 0 !important;
      box-shadow: none !important;
      color: var(--color-primary, #7c3aed) !important;
      text-decoration: underline;
      text-underline-offset: 2px;
      padding: 0 !important;
      margin-top: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      width: auto !important;
      display: inline;
    }
  </style>
</head>
<body class="min-h-screen text-[#1E1630] flex items-center justify-center p-6">
  <div class="w-full border border-purple-100 rounded-2xl login-card">
    <h1 class="text-[#4C2A92] mb-4 login-title">Rock Solid Login</h1>
    <form id="loginForm" class="space-y-3">
      <input id="email" type="email" required placeholder="Email" class="w-full px-3 py-2 login-input" />
      <input id="password" type="password" required placeholder="Password" class="w-full px-3 py-2 login-input" />
      <button type="submit" class="px-4 py-2 bg-[#4C2A92] text-white font-semibold login-submit">Sign In</button>
      <a id="forgotPasswordBtn" href="#">Forgot password?</a>
    </form>
    <p id="msg" class="text-sm text-slate-600 mt-3"></p>
    <p id="supportMsg" class="text-sm text-slate-600 mt-1 hidden"></p>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/config-helper.js"></script>
  <script type="module">
    import { supabase, getCurrentProfile, TEACHER_LANDING_PATH, ADMIN_LANDING_PATH, isRegionalSecretary, getLinkedTeacherRecord } from "./auth-client.js";

    // If a recovery token is in the hash, this is a reset-password link —
    // hand it off immediately before auth-client.js can process it as a login.
    const _hash = window.location.hash || "";
    if (_hash.includes("type=recovery")) {
      window.location.replace("reset-password.html" + _hash);
    }
    // Clear any other stale access_token hash so it isn't misread.
    if (_hash.includes("access_token")) {
      history.replaceState(null, "", window.location.pathname + window.location.search);
    }

    const appPath = (relativePath) => {
      const clean = String(relativePath || "").replace(/^\/+/, "");
      const p = window.location.pathname || "";
      return p.includes("/foundation/") ? `/foundation/${clean}` : `/${clean}`;
    };
    const safeNext = () => {
      const raw = new URLSearchParams(window.location.search).get("next") || "";
      if (!raw.startsWith("/")) return appPath("staff/admin-dashboard.html");
      if (raw.startsWith("//")) return appPath("staff/admin-dashboard.html");
      return raw;
    };

    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");
    const submitBtn = form.querySelector('button[type="submit"]');
    const emailInput = document.getElementById("email");
    const forgotPasswordBtn = document.getElementById("forgotPasswordBtn");
    const supportMsg = document.getElementById("supportMsg");
    const supportEmail = String(window.FS_CONFIG?.SUPPORT_EMAIL || "support@rocksolid.school").trim() || "support@rocksolid.school";

    function setSupportLine(show) {
      if (!supportMsg) return;
      supportMsg.textContent = show ? `Contact ${supportEmail} for access.` : "";
      supportMsg.classList.toggle("hidden", !show);
    }

    const errorCode = new URLSearchParams(window.location.search).get("error") || "";
    if (errorCode === "inactive") {
      msg.textContent = "Your teacher account is inactive or not yet linked. Contact your administrator.";
      setSupportLine(true);
    } else if (errorCode === "pending") {
      msg.textContent = "Your account is pending approval.";
      setSupportLine(true);
    } else if (errorCode === "unauthorized") {
      msg.textContent = "Your account does not have access to this page.";
      setSupportLine(false);
    } else {
      setSupportLine(false);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (submitBtn) submitBtn.disabled = true;
      if (submitBtn) submitBtn.textContent = "Signing in…";
      msg.textContent = "";
      setSupportLine(false);

      const email = emailInput.value.trim();
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        const raw = String(error.message || "");
        const isInvalidCreds = raw.toLowerCase().includes("invalid login credentials");
        msg.textContent = isInvalidCreds
          ? "Incorrect email or password. Please try again."
          : "Sign in failed. Please try again or contact support.";
        setSupportLine(false);
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
        }
        return;
      }

      let profile = null;
      try {
        profile = await getCurrentProfile();
      } catch (_) {
        msg.textContent = "Sign in failed. Please try again or contact support.";
        setSupportLine(false);
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
        }
        return;
      }
      if (!profile) {
        msg.textContent = "Sign in failed. Please try again or contact support.";
        setSupportLine(false);
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
        }
        return;
      }
      const role = String(profile.role || "").trim().toLowerCase();
      const isInactive = profile?.is_active === false;

      if (isInactive || role === "pending") {
        await supabase.auth.signOut();
        msg.textContent = "Your account is pending approval.";
        setSupportLine(true);
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
        }
        return;
      }

      // Pure teacher role → always teacher portal
      if (role === "teacher") {
        window.location.href = appPath(TEACHER_LANDING_PATH);
        return;
      }

      // Superadmin / admin → always admin portal, no check needed
      if (role === "superadmin" || role === "admin") {
        window.location.href = safeNext();
        return;
      }

      // Other staff roles: check for linked teacher record → portal chooser
      if (["pastor", "principal", "subgroup_admin", "regional_secretary"].includes(role)) {
        const teacherRec = await getLinkedTeacherRecord(email);
        if (teacherRec) {
          showPortalChooser(role);
          return;
        }
        // No teacher record → go to appropriate staff landing
        const staffLanding = role === "regional_secretary" ? "staff/dashboards.html" : ADMIN_LANDING_PATH;
        window.location.href = appPath(staffLanding);
        return;
      }

      window.location.href = safeNext();
    });

    function showPortalChooser(role) {
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = "Sign In"; }
      const overlay = document.getElementById("portalChooserOverlay");
      if (!overlay) return;
      overlay.style.display = "flex";

      document.getElementById("goAdmin").addEventListener("click", () => {
        sessionStorage.setItem("rs_portal_choice", "admin");
        const staffLanding = role === "regional_secretary" ? "staff/dashboards.html" : ADMIN_LANDING_PATH;
        window.location.href = appPath(staffLanding);
      });
      document.getElementById("goTeacher").addEventListener("click", () => {
        sessionStorage.setItem("rs_portal_choice", "teacher");
        window.location.href = appPath(TEACHER_LANDING_PATH);
      });
    }

    forgotPasswordBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      if (!email) {
        msg.textContent = "Enter your email address first.";
        emailInput.focus();
        return;
      }

      msg.textContent = "Sending reset link...";
      setSupportLine(false);
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: `${window.location.origin}/foundation/auth/reset-password.html`,
      });
      if (error) {
        msg.textContent = "Could not send reset link. Please try again or contact support.";
        return;
      }
      msg.textContent = "Check your email for a reset link.";
    });
  </script>
  <!-- Portal chooser overlay — shown for dual-role staff users -->
  <div id="portalChooserOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:16px;padding:32px;max-width:360px;width:calc(100% - 32px);box-shadow:0 8px 40px rgba(0,0,0,0.25);text-align:center;">
      <div style="font-size:32px;margin-bottom:12px;">&#x1F44B;</div>
      <h2 style="margin:0 0 8px;font-size:20px;font-weight:800;color:#1E1630;">Welcome back!</h2>
      <p style="margin:0 0 24px;color:#6f6881;font-size:14px;line-height:1.6;">You have access to both portals.<br>Where would you like to go?</p>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button id="goAdmin" style="padding:12px 20px;background:#4C2A92;color:#fff;border:0;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;">Admin Portal</button>
        <button id="goTeacher" style="padding:12px 20px;background:#fff;color:#4C2A92;border:2px solid #4C2A92;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;">Teacher Portal</button>
      </div>
    </div>
  </div>
  <script src="../ui/premium-shell.js"></script>
</body>
</html>
