<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Solid - Teacher Registration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../ui/premium-theme.css" />
  <link rel="stylesheet" href="../ui/primitives.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "Manrope", system-ui, sans-serif;
      background: radial-gradient(800px 400px at 60% -10%, rgba(140,113,255,.22), transparent 55%),
                  radial-gradient(700px 360px at -8% 80%, rgba(200,16,46,.08), transparent 55%),
                  #f7f7fb;
      display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px 60px;
    }
    .card {
      width: 100%; max-width: 520px;
      background: #fff; border: 1px solid #e8e8f0; border-radius: 20px;
      box-shadow: 0 12px 40px rgba(26,20,43,.1); padding: 36px 40px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo img { height: 52px; margin-bottom: 10px; }
    .logo h1 { margin: 0; font-size: 20px; font-weight: 800; color: #1a1a2e; }
    .logo p  { margin: 4px 0 0; font-size: 13px; color: #6b7280; }
    .field { display: grid; gap: 5px; margin-bottom: 16px; }
    .field label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #6b7280; font-weight: 700; }
    .field input, .field select, .field textarea {
      border: 1px solid #d1d5db; border-radius: 10px; padding: 10px 12px;
      font: inherit; font-size: 14px; color: #1a1a2e; background: #fff;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: #4C2A92;
      box-shadow: 0 0 0 3px rgba(76,42,146,.15);
    }
    .field textarea { resize: vertical; min-height: 64px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .submit-btn {
      width: 100%; padding: 13px; background: #C8102E; color: #fff; border: none;
      border-radius: 10px; font: 700 15px/1 inherit; cursor: pointer; margin-top: 8px;
      transition: background .15s;
    }
    .submit-btn:hover:not(:disabled) { background: #a80d25; }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; }
    .msg { padding: 12px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; }
    .msg.error   { background: #fff5f5; border: 1px solid #fca5a5; color: #b42318; }
    .msg.success { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
    .back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
    .back-link a { color: #4C2A92; font-weight: 600; text-decoration: none; }
    .required { color: #b42318; }
    @media (max-width: 540px) { .card { padding: 24px 20px; } .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="../registration/canada_sr.png" alt="Rock Solid Foundation School" onerror="this.style.display='none'" />
      <h1>Teacher Registration</h1>
      <p>Rock Solid Foundation School &mdash; BLW Canada</p>
    </div>

    <div id="msgArea"></div>

    <form id="regForm" novalidate>
      <div class="grid-2">
        <div class="field">
          <label for="fullName">Full Name <span class="required">*</span></label>
          <input id="fullName" type="text" autocomplete="name" required placeholder="Your full name" />
        </div>
        <div class="field">
          <label for="email">Email <span class="required">*</span></label>
          <input id="email" type="email" autocomplete="email" required placeholder="your@email.com" />
        </div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label for="phone">Phone</label>
          <input id="phone" type="tel" autocomplete="tel" placeholder="+1 (000) 000-0000" />
        </div>
        <div class="field">
          <label for="fellowshipCode">Fellowship Code <span class="required">*</span></label>
          <input id="fellowshipCode" type="text" placeholder="e.g. UMANITOBA, UCALGARY" required />
        </div>
      </div>
      <div class="field">
        <label for="notes">Notes / Additional Info</label>
        <textarea id="notes" rows="3" placeholder="Anything you'd like to share with the team…"></textarea>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Submit Application</button>
    </form>

    <p class="back-link">Already have an account? <a href="login.html">Sign in</a></p>
  </div>

  <script src="../js/config.js"></script>
  <script type="module">
    import { supabase } from "../auth/auth-client.js";

    const $  = (id) => document.getElementById(id);
    const esc = (v) => String(v ?? "").replace(/[&<>'"]/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));

    function showMsg(text, type = "error") {
      $("msgArea").innerHTML = `<div class="msg ${type}">${esc(text)}</div>`;
    }

    $("regForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = $("submitBtn");

      const fullName      = $("fullName").value.trim();
      const email         = $("email").value.trim().toLowerCase();
      const phone         = $("phone").value.trim() || null;
      const fellowshipCode = $("fellowshipCode").value.trim().toUpperCase() || null;
      const notes         = $("notes").value.trim() || null;

      if (!fullName)                   { showMsg("Full name is required."); return; }
      if (!email || !email.includes("@")) { showMsg("A valid email address is required."); return; }
      if (!fellowshipCode)             { showMsg("Fellowship code is required (e.g. UMANITOBA)."); return; }

      btn.disabled    = true;
      btn.textContent = "Submitting…";
      $("msgArea").innerHTML = "";

      const now = new Date().toISOString();
      const { error } = await supabase.from("teachers").insert({
        teacher_id:     crypto.randomUUID(),
        full_name:      fullName,
        email,
        phone,
        fellowship_code: fellowshipCode,
        notes,
        status:         "PENDING",
        active:         false,
        created_at:     now,
        updated_at:     now,
      });

      if (error) {
        const msg = error.code === "23505"
          ? "An application already exists for this email address."
          : `Submission failed: ${error.message}`;
        showMsg(msg);
        btn.disabled    = false;
        btn.textContent = "Submit Application";
        return;
      }

      // Replace form with success message
      $("regForm").innerHTML = "";
      showMsg(
        "Thank you! Your application has been submitted and is pending review by the administration team. You will receive an email once it is approved.",
        "success",
      );
      btn.style.display = "none";
    });
  </script>
</body>
</html>
