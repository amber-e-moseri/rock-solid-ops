<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – Rock Solid</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../ui/premium-theme.css" />
  <style>
    body {
      background: var(--color-bg, #f5f3ff);
      margin: 0;
    }
    .login-card {
      max-width: 400px;
      background: #fff;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 32px;
    }
    .login-title {
      font-size: 24px;
      font-weight: 700;
    }
    .login-input {
      border: 1px solid #e0d9ff;
      border-radius: 8px;
    }
    .login-submit {
      width: 100%;
      border-radius: 8px;
    }
  </style>
</head>
<body class="min-h-screen text-[#1E1630] flex items-center justify-center p-6">
  <div class="w-full border border-purple-100 rounded-2xl login-card">
    <h1 class="text-[#4C2A92] mb-2 login-title">Reset Password</h1>
    <p id="subtitle" class="text-sm text-slate-500 mb-4">Enter a new password for your account.</p>

    <form id="resetForm" class="space-y-3">
      <input id="password" type="password" required placeholder="New password"
        class="w-full px-3 py-2 login-input" autocomplete="new-password" />
      <input id="confirmPassword" type="password" required placeholder="Confirm new password"
        class="w-full px-3 py-2 login-input" autocomplete="new-password" />
      <button type="submit" id="submitBtn"
        class="px-4 py-2 bg-[#4C2A92] text-white font-semibold login-submit">
        Set New Password
      </button>
    </form>

    <p id="msg" class="text-sm text-slate-600 mt-3"></p>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/config-helper.js"></script>
  <script type="module">
    import { supabase } from "./auth-client.js";

    const form     = document.getElementById("resetForm");
    const msg      = document.getElementById("msg");
    const submit   = document.getElementById("submitBtn");
    const subtitle = document.getElementById("subtitle");

    // auth-client.js has detectSessionInUrl: true, so Supabase automatically
    // exchanges the #access_token in the URL and fires PASSWORD_RECOVERY.
    let sessionReady = false;

    supabase.auth.onAuthStateChange((event, session) => {
      if (event === "PASSWORD_RECOVERY" || (event === "SIGNED_IN" && session)) {
        sessionReady = true;
      }
    });

    // Also check for an already-active session (e.g. token exchanged in a
    // previous tab, or user navigated back after a successful exchange).
    const { data: { session } } = await supabase.auth.getSession();
    if (session) sessionReady = true;

    // No token in the hash and no session = invalid/expired link.
    const hash = window.location.hash || "";
    const hasToken = hash.includes("access_token") || hash.includes("type=recovery");
    if (!hasToken && !sessionReady) {
      form.style.display = "none";
      subtitle.style.display = "none";
      msg.innerHTML =
        "This link is invalid or has already been used. " +
        '<a href="login.html" class="text-[#4C2A92] underline">Request a new one</a>.';
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = document.getElementById("password").value;
      const confirm  = document.getElementById("confirmPassword").value;
      msg.textContent = "";

      if (password.length < 8) {
        msg.textContent = "Password must be at least 8 characters.";
        return;
      }
      if (password !== confirm) {
        msg.textContent = "Passwords do not match.";
        return;
      }

      submit.disabled = true;
      submit.textContent = "Saving…";

      // Give detectSessionInUrl a moment to finish if not ready yet.
      if (!sessionReady) {
        await new Promise(r => setTimeout(r, 1200));
      }

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        msg.textContent =
          error.message ||
          "Could not update password. The link may have expired — request a new one.";
        submit.disabled = false;
        submit.textContent = "Set New Password";
        return;
      }

      // Sign out so the user logs in fresh with the new password.
      await supabase.auth.signOut();

      form.style.display = "none";
      subtitle.style.display = "none";
      msg.innerHTML =
        "✓ Password updated. " +
        '<a href="login.html" class="text-[#4C2A92] underline font-semibold">Sign in</a>';
    });
  </script>
  <script src="../ui/premium-shell.js"></script>
</body>
</html>
