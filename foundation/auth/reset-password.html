<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Rock Solid</title>
  <link rel="stylesheet" href="../ui/premium-theme.css" />
  <link rel="stylesheet" href="../ui/primitives.css" />
  <style>
    body {
      background: #0a0a0f;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #ffffff;
      font-family: "DM Sans", system-ui, -apple-system, sans-serif;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: #13131f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 40px;
      box-sizing: border-box;
    }
    .login-title {
      font-size: 24px;
      font-weight: 700;
      color: #4C2A92;
      margin: 0 0 8px 0;
    }
    .login-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.72);
      margin: 0 0 16px 0;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .login-input {
      width: 100%;
      box-sizing: border-box;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 12px 14px;
      color: #ffffff;
      outline: none;
    }
    .login-input::placeholder { color: rgba(255,255,255,0.5); }
    .login-submit {
      width: 100%;
      background: #4C2A92;
      color: #ffffff;
      border: 0;
      border-radius: 8px;
      padding: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .login-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .login-msg {
      font-size: 14px;
      color: rgba(255,255,255,0.78);
      margin: 12px 0 0 0;
      line-height: 1.5;
    }
    .login-msg.error { color: #ff5c5c; }
    .login-msg.success { color: #4dcc8f; }
    .login-link {
      color: #4C2A92;
      text-decoration: underline;
    }
    .login-link-strong {
      color: #4C2A92;
      text-decoration: underline;
      font-weight: 600;
    }
    @media (max-width: 520px) {
      body { padding: 16px; }
      .login-card { padding: 28px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1 class="login-title">Reset Password</h1>
    <p id="subtitle" class="login-subtitle">Enter a new password for your account.</p>

    <form id="resetForm" class="login-form">
      <input id="password" type="password" required placeholder="New password" class="login-input" autocomplete="new-password" />
      <input id="confirmPassword" type="password" required placeholder="Confirm new password" class="login-input" autocomplete="new-password" />
      <button type="submit" id="submitBtn" class="login-submit">Set New Password</button>
    </form>

    <p id="msg" class="login-msg"></p>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/config-helper.js"></script>
  <script type="module">
    import { supabase } from "./auth-client.js";

    const form     = document.getElementById("resetForm");
    const msg      = document.getElementById("msg");
    const submit   = document.getElementById("submitBtn");
    const subtitle = document.getElementById("subtitle");

    // auth-client.js has detectSessionInUrl: true, so Supabase automatically
    // exchanges the #access_token in the URL and fires PASSWORD_RECOVERY.
    let sessionReady = false;

    supabase.auth.onAuthStateChange((event, session) => {
      if (event === "PASSWORD_RECOVERY" || (event === "SIGNED_IN" && session)) {
        sessionReady = true;
      }
    });

    // Also check for an already-active session (e.g. token exchanged in a
    // previous tab, or user navigated back after a successful exchange).
    const { data: { session } } = await supabase.auth.getSession();
    if (session) sessionReady = true;

    // No token in the hash and no session = invalid/expired link.
    const hash = window.location.hash || "";
    const hasToken = hash.includes("access_token") || hash.includes("type=recovery");
    if (!hasToken && !sessionReady) {
      form.style.display = "none";
      subtitle.style.display = "none";
      msg.classList.add("error");
      msg.classList.remove("success");
      msg.innerHTML =
        "This link is invalid or has already been used. " +
        '<a href="login.html" class="login-link">Request a new one</a>.';
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = document.getElementById("password").value;
      const confirm  = document.getElementById("confirmPassword").value;
      msg.textContent = "";
      msg.classList.remove("error", "success");

      if (password.length < 8) {
        msg.classList.add("error");
        msg.textContent = "Password must be at least 8 characters.";
        return;
      }
      if (password !== confirm) {
        msg.classList.add("error");
        msg.textContent = "Passwords do not match.";
        return;
      }

      submit.disabled = true;
      submit.textContent = "Saving...";

      // Give detectSessionInUrl a moment to finish if not ready yet.
      if (!sessionReady) {
        await new Promise(r => setTimeout(r, 1200));
      }

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        msg.classList.add("error");
        msg.textContent =
          error.message ||
          "Could not update password. The link may have expired - request a new one.";
        submit.disabled = false;
        submit.textContent = "Set New Password";
        return;
      }

      // Sign out so the user logs in fresh with the new password.
      await supabase.auth.signOut();

      form.style.display = "none";
      subtitle.style.display = "none";
      msg.classList.add("success");
      msg.innerHTML =
        "Password updated. " +
        '<a href="login.html" class="login-link-strong">Sign in</a>';
    });
  </script>
  <script src="../ui/premium-shell.js"></script>
</body>
</html>
