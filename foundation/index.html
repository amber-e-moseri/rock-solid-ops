<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Solid</title>
  <style>
    html, body { height: 100%; margin: 0; }
    :root {
      --navy: #1C1610;
      --gold: #C9A227;
      --cream: #F7F5F0;
    }
    body {
      display: grid;
      place-items: center;
      font-family: "DM Sans", "Manrope", "Inter", system-ui, -apple-system, sans-serif;
      background: var(--cream);
      color: var(--navy);
    }
    .loading-card {
      width: min(92vw, 420px);
      background: #fff;
      border: 1px solid color-mix(in srgb, var(--navy) 14%, #fff);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px color-mix(in srgb, var(--navy) 10%, transparent);
      text-align: center;
    }
    .logo-mark {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      margin: 0 auto 12px;
      display: grid;
      place-items: center;
      color: var(--navy);
      font-weight: 800;
      font-size: 20px;
      background: color-mix(in srgb, var(--gold) 24%, #fff);
      border: 2px solid color-mix(in srgb, var(--gold) 72%, #fff);
    }
    .app-name {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 800;
      color: var(--navy);
    }
    .loading-copy {
      margin: 6px 0 0;
      font-size: 14px;
      color: color-mix(in srgb, var(--navy) 58%, #fff);
    }
    .spinner {
      width: 28px;
      height: 28px;
      margin: 18px auto 0;
      border-radius: 50%;
      border: 3px solid color-mix(in srgb, var(--gold) 35%, #fff);
      border-top-color: var(--navy);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <section class="loading-card" aria-live="polite" aria-busy="true">
    <div class="logo-mark" aria-hidden="true">RS</div>
    <h1 class="app-name">Rock Solid</h1>
    <p class="loading-copy">Redirecting to Rock Solid Operations...</p>
    <div class="spinner" aria-hidden="true"></div>
  </section>

  <script src="./js/config.js"></script>
  <script src="./js/config-helper.js"></script>
  <script type="module">
    import { getSessionOrNull, getCurrentProfile, isPending, isAdmin, TEACHER_LANDING_PATH } from "./auth/auth-client.js";

    const loginUrl = "./auth/login.html";
    const teacherUrl = `./${TEACHER_LANDING_PATH}`;
    const adminUrl = "./staff/admin-portal.html";

    function go(url) {
      window.location.replace(url);
    }

    function withTimeout(promise, ms) {
      return Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error("profile_timeout")), ms)),
      ]);
    }

    function resolveRoleFromSession(session) {
      const raw =
        session?.user?.user_metadata?.role ||
        session?.user?.app_metadata?.role ||
        "";
      return String(raw || "").toLowerCase();
    }

    (async () => {
      try {
        document.documentElement.setAttribute("data-theme", "light");
        document.documentElement.classList.remove("dark");
        document.body.classList.add("fs-force-light");

        const session = await getSessionOrNull();
        if (!session) {
          go(loginUrl);
          return;
        }

        // Fast path: use role from current session metadata while profile loads.
        const sessionRole = resolveRoleFromSession(session);
        if (sessionRole === "teacher") {
          go(teacherUrl);
          return;
        }
        if (isAdmin(sessionRole)) {
          go(adminUrl);
          return;
        }

        // Slow path: profile lookup with timeout to avoid long spinner hangs.
        const profile = await withTimeout(getCurrentProfile(), 2500).catch(() => null);
        const role = String(profile?.role || "").toLowerCase();
        const isActive = profile?.is_active !== false && profile?.active !== false;

        if (!isActive || isPending(role) || !role) {
          go(loginUrl);
        } else if (role === "teacher") {
          go(teacherUrl);
        } else if (isAdmin(role)) {
          go(adminUrl);
        } else {
          go(loginUrl);
        }
      } catch (_) {
        go(loginUrl);
      }
    })();
  </script>
</body>
</html>
