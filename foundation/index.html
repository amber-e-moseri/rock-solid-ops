<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundation School</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      font-family: "DM Sans", "Manrope", "Inter", system-ui, -apple-system, sans-serif;
      background: #F7F5F0;
      color: #1C1610;
    }
    p { margin: 0; font-size: 14px; color: #7A6F5E; }
  </style>
</head>
<body>
  <p>Redirecting to Foundation School Operations...</p>

  <script src="./js/config.js"></script>
  <script src="./js/config-helper.js"></script>
  <script type="module">
    import { getSessionOrNull, getCurrentProfile } from "./auth/auth-client.js";

    const loginUrl = "./auth/login.html";
    const teacherUrl = "./staff/TeacherAttendancePortal.html";
    const adminUrl = "./staff/admin-portal.html";
    const adminRoles = new Set(["principal", "admin", "superadmin", "subgroup_admin", "pastor"]);

    function go(url) {
      window.location.replace(url);
    }

    try {
      document.documentElement.setAttribute("data-theme", "light");
      document.documentElement.classList.remove("dark");
      document.body.classList.add("fs-force-light");

      const session = await getSessionOrNull();
      if (!session) {
        go(loginUrl);
      } else {
        const profile = await getCurrentProfile();
        const role = String(profile?.role || "").toLowerCase();
        const isActive = profile?.is_active !== false && profile?.active !== false;

        if (!isActive || role === "pending" || !role) {
          go(loginUrl);
        } else if (role === "teacher") {
          go(teacherUrl);
        } else if (adminRoles.has(role)) {
          go(adminUrl);
        } else {
          go(loginUrl);
        }
      }
    } catch (_) {
      go(loginUrl);
    }
  </script>
</body>
</html>
