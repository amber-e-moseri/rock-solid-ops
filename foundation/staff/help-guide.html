<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Solid Help Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #fff;
      --text: #121424;
      --muted: #5f6578;
      --line: #e5e7ef;
      --primary: #C8102E;
      --secondary: #4C2A92;
      --shadow: 0 12px 30px rgba(24, 20, 40, .08);
    }
    [data-theme="dark"] {
      --bg: #0f1220;
      --surface: #171b2d;
      --text: #edf0ff;
      --muted: #a9afc8;
      --line: #2d3452;
      --primary: #ef4a63;
      --secondary: #8e6ce1;
      --shadow: 0 12px 30px rgba(0, 0, 0, .35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 8% -12%, rgba(76,42,146,.16), transparent 34%), var(--bg);
      min-height: 100vh;
    }
    .page { max-width: 1180px; margin: 0 auto; padding: 18px 16px 28px; }
    .topbar {
      display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon {
      width: 40px; height: 40px; border-radius: 12px; color: #fff; display: grid; place-items: center;
      background: linear-gradient(145deg, var(--secondary), var(--primary)); box-shadow: var(--shadow); font-size: 20px;
    }
    .title { margin: 0; font-size: 24px; line-height: 1.15; }
    .subtitle { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
    .tools { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .btn, .input, .select {
      border: 1px solid var(--line); border-radius: 10px; background: var(--surface); color: var(--text);
      font: 600 13px/1.2 "Manrope", sans-serif; padding: 10px 12px;
    }
    .btn { cursor: pointer; }
    .btn:hover { border-color: color-mix(in srgb, var(--secondary) 40%, var(--line)); }
    .btn-primary { border-color: var(--primary); background: var(--primary); color: #fff; }
    .toolbar { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; margin-bottom: 10px; }
    .crumb { margin: 0 0 10px; color: var(--muted); font-size: 13px; display: flex; gap: 7px; align-items: center; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
    .role-card { border: 1px solid var(--line); border-radius: 16px; background: var(--surface); box-shadow: var(--shadow); padding: 14px; display: grid; gap: 12px; }
    .role-head { display: flex; gap: 10px; align-items: flex-start; }
    .role-icon { width: 44px; height: 44px; border-radius: 12px; color: #fff; display: grid; place-items: center; font-size: 22px; flex-shrink: 0; }
    .role-name { margin: 0; font-size: 18px; font-weight: 800; }
    .role-desc { margin: 3px 0 0; font-size: 13px; color: var(--muted); }

    .search-results { display: none; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); box-shadow: var(--shadow); margin-bottom: 10px; }
    .search-results.open { display: block; }
    .search-item { border-top: 1px solid var(--line); padding: 10px; display: flex; justify-content: space-between; gap: 8px; }
    .search-item:first-child { border-top: 0; }
    .search-meta { color: var(--muted); font-size: 12px; margin-top: 3px; }
    .role-badge { border-radius: 999px; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; margin-right: 6px; }

    .guide { border: 1px solid var(--line); border-radius: 16px; background: var(--surface); box-shadow: var(--shadow); overflow: hidden; }
    .guide.hidden, .hidden { display: none !important; }
    .guide-top { padding: 14px; border-bottom: 1px solid var(--line); display: grid; gap: 10px; }
    .role-pill { border-radius: 999px; color: #fff; padding: 7px 10px; font-size: 12px; font-weight: 700; display: inline-flex; gap: 8px; align-items: center; }
    .progress { color: var(--muted); font-size: 13px; font-weight: 700; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .tab-btn { border: 1px solid var(--line); border-radius: 999px; background: var(--surface); color: var(--text); padding: 9px 12px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .tab-btn.active { background: var(--secondary); border-color: var(--secondary); color: #fff; }
    .guide-body { padding: 14px; }
    .section-title { margin: 0 0 8px; font-size: 17px; }
    .muted { color: var(--muted); font-size: 13px; }
    .grid { display: grid; gap: 10px; }
    .item { border: 1px solid var(--line); border-radius: 12px; padding: 12px; background: color-mix(in srgb, var(--surface) 92%, var(--secondary) 8%); }
    .item h4 { margin: 0 0 6px; font-size: 14px; }
    .item p { margin: 0; font-size: 13px; color: var(--muted); }

    .acc { display: grid; gap: 10px; }
    .acc-item { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
    .acc-head { width: 100%; border: 0; background: transparent; color: inherit; padding: 12px; display: flex; justify-content: space-between; align-items: center; font: 700 14px/1.2 "Manrope", sans-serif; cursor: pointer; }
    .acc-left { display: flex; gap: 8px; align-items: center; text-align: left; }
    .chev { transition: transform .2s ease; }
    .acc-item.open .chev { transform: rotate(90deg); }
    .acc-body { max-height: 0; overflow: hidden; transition: max-height .25s ease; border-top: 1px solid transparent; }
    .acc-item.open .acc-body { border-top-color: var(--line); }
    .acc-inner { padding: 10px 12px 12px; }
    .steps { list-style: none; margin: 0; padding: 0; display: grid; gap: 8px; }
    .steps li { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; }
    .steps input { margin-top: 2px; transform: scale(1.1); accent-color: var(--secondary); }
    .n { font-weight: 800; min-width: 16px; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border: 1px solid var(--line); padding: 8px; text-align: left; vertical-align: top; }
    th { background: color-mix(in srgb, var(--surface) 85%, var(--secondary) 15%); }
    .trouble { border: 1px solid var(--line); border-radius: 12px; padding: 10px; background: color-mix(in srgb, var(--surface) 90%, var(--primary) 10%); }
    .trouble h4 { margin: 0 0 6px; font-size: 14px; }

    @media (max-width: 900px) { .toolbar { grid-template-columns: 1fr; } }
    @media print {
      .topbar, .toolbar, .tabs, .search-results, #landingView .btn { display: none !important; }
      body { background: #fff; color: #111; }
      .page { max-width: none; padding: 0; }
      .guide, .item, .trouble, .acc-item { box-shadow: none !important; }
      .acc-body { max-height: none !important; border-top-color: #ccc !important; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon"><i class="ti ti-help"></i></div>
        <div>
          <h1 class="title">Rock Solid Help Guide</h1>
          <p class="subtitle">Interactive role-based guide for staff and teachers.</p>
          <p id="viewingAs" class="subtitle" style="display:none"></p>
        </div>
      </div>
      <div class="tools">
        <select id="roleSwitcher" class="select" aria-label="Switch role"><option value="">Select role</option></select>
        <button id="themeToggle" class="btn" type="button">Dark mode</button>
        <button id="printBtn" class="btn" type="button">Print</button>
      </div>
    </header>

    <div class="toolbar">
      <input id="searchInput" class="input" type="search" placeholder="Search tasks across all roles" />
      <button id="clearSearch" class="btn" type="button">Clear</button>
      <button id="homeBtn" class="btn" type="button">Home</button>
    </div>

    <section id="searchResults" class="search-results"></section>
    <nav id="breadcrumb" class="crumb"></nav>

    <section id="landingView">
      <p id="landingNote" class="subtitle" style="margin:0 0 10px;">Select your role to view guide</p>
      <div class="cards" id="roleCards"></div>
    </section>

    <section id="guideView" class="guide hidden">
      <div class="guide-top">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
          <span id="activeRolePill" class="role-pill"></span>
          <span id="roleProgress" class="progress"></span>
        </div>
        <div class="tabs" id="tabButtons"></div>
      </div>
      <div class="guide-body" id="tabContent"></div>
    </section>
  </div>

  <script type="module">
    import { supabase } from "../auth/auth-client.js";

    (function () {
      const THEME_KEY = "fs_help_guide_theme";
      const CHECK_KEY = "fs_help_guide_checks";

      const ROLES = {
        superadmin: { label: "Superadmin", color: "#4C2A92", icon: "ti ti-crown", oneLine: "Full system control",
          gs: ["Open staff login and click Sign In.", "Dashboard loads first with system KPIs.", "You can access every admin and system tool.", "Key pages: Dashboard, Applicants, Batch Management, Class Editor, Teachers, Fellowships, System Health, Failed Syncs, Audit Log."],
          tasks: [
            ["add-new-admin", "Add a new admin user", ["Open Teachers or user management.", "Create user profile with correct email.", "Set role to admin, principal, pastor, or subgroup_admin.", "Save and confirm sign-in access."]],
            ["create-batch", "Create a new batch", ["Open Batch Management.", "Click Create Batch.", "Enter batch ID, name, dates, and status.", "Click Save and confirm listing."]],
            ["delete-batch", "Delete a batch", ["Open Batch Management.", "Confirm batch is safe to remove.", "Click Delete Batch.", "Approve confirmation prompt."]],
            ["manage-fellowships", "Manage fellowships", ["Open Fellowship Management.", "Create or edit code, group, and subgroup mapping.", "Save changes.", "Verify mapping resolution."]],
            ["view-system-health", "View system health", ["Open System Health.", "Review queue and sync summaries.", "Inspect warnings.", "Assign follow-up actions."]],
            ["retry-failed-syncs", "Retry failed syncs", ["Open Failed Sync Retry Center.", "Filter failed rows.", "Trigger retry.", "Recheck status."]],
            ["view-audit-logs", "View audit logs", ["Open Audit Log.", "Filter by action, actor, or date.", "Inspect details.", "Export when needed."]],
          ] },
        admin: { label: "Admin", color: "#C8102E", icon: "ti ti-shield-check", oneLine: "Day-to-day operations",
          gs: ["Sign in through staff login.", "Dashboard or Applicants opens first.", "You manage registrations, classes, teachers, reports.", "Key pages: Applicants, Batch Management, Waitlist, Class Editor, Dashboards, Reports, Teacher Schedule."],
          tasks: [
            ["review-new-registrations", "Review new registrations", ["Open Applicants.", "Switch to Review Queue.", "Filter pending and review.", "Open each applicant and decide."]],
            ["assign-student-class", "Assign a student to a class", ["Open applicant profile.", "Click Assign Class.", "Select class with available capacity.", "Save and verify ASSIGNED."]],
            ["promote-waitlist", "Promote from waitlist", ["Open Waitlist.", "Find candidate with open slot.", "Run promote action.", "Confirm assignment and notifications."]],
            ["send-email-student", "Send an email to a student", ["Open applicant drawer.", "Click Email.", "Write your message.", "Send and verify queue status."]],
            ["create-batch", "Create a batch", ["Open Batch Management.", "Click Create Batch.", "Fill required fields.", "Save and verify."]],
            ["edit-class-time", "Edit a class time", ["Open Class Editor.", "Find class option.", "Update day or time.", "Save and notify impacted students if needed."]],
            ["approve-availability", "Approve teacher availability", ["Open availability review workflow.", "Review submitted slots.", "Approve or reject with reason.", "Confirm updated status."]],
            ["view-dashboard", "View the dashboard", ["Open Dashboards.", "Select active batch.", "Review KPIs and trends.", "Export or share findings."]],
          ] },
        regional_secretary: { label: "Regional Secretary", color: "#1a3c5e", icon: "ti ti-map-2", oneLine: "Canada-wide oversight",
          gs: ["Sign in with regional secretary account.", "Dashboard opens with Canada-wide summary.", "You monitor registrations and outcomes across groups.", "Key pages: Dashboards, Applicants, Reports, Batch tools, Teacher Mode switch."],
          tasks: [
            ["view-all-applicants-canada", "View all applicants Canada-wide", ["Open Applicants.", "Use broad filters or batch selector.", "Review queue and status health.", "Export when needed."]],
            ["review-registrations", "Review registrations", ["Open review queue.", "Inspect pending and review cases.", "Set status decisions.", "Capture notes in audit trail."]],
            ["send-announcements", "Send announcements", ["Open messaging or campaign tools.", "Choose recipient scope.", "Write and review message.", "Send and monitor queue."]],
            ["view-reports", "View reports", ["Open Reports.", "Set period and scope.", "Generate output.", "Download or share PDF."]],
            ["switch-admin-teacher-mode", "Switch between Admin/Teacher mode", ["Use shell mode switch.", "Select Teacher Mode to view teacher navigation.", "Return to Admin Mode for operations.", "Confirm scope context before actions."]],
          ] },
        pastor: { label: "Pastor", color: "#16a34a", icon: "ti ti-church", oneLine: "Fellowship management",
          gs: ["Sign in with pastor account.", "You land on fellowship-scoped views.", "You review registrations and class outcomes for your fellowship.", "Key pages: Applicants, Dashboards, Reports, schedules."],
          tasks: [
            ["view-applicants-fellowship", "View applicants in your fellowship", ["Open Applicants.", "Filter by your fellowship.", "Review statuses.", "Follow up on review and waitlist."]],
            ["review-registrations", "Review registrations", ["Open review queue.", "Inspect each record.", "Apply decisions.", "Escalate unclear cases to admin."]],
            ["view-class-schedules", "View class schedules", ["Open schedule views.", "Filter by fellowship.", "Confirm teacher and time coverage.", "Report gaps to admin."]],
          ] },
        subgroup_admin: { label: "Subgroup Admin", color: "#d97706", icon: "ti ti-users-group", oneLine: "Subgroup coordination",
          gs: ["Sign in with subgroup admin account.", "Dashboard shows subgroup-scoped operations.", "You coordinate review and class readiness.", "Key pages: Applicants, Dashboards, schedules, attendance views."],
          tasks: [
            ["view-applicants-subgroup", "View applicants in your subgroup", ["Open Applicants.", "Filter by subgroup.", "Review status and assignment health.", "Resolve review queue records."]],
            ["review-registrations", "Review registrations", ["Open review queue.", "Inspect each applicant.", "Set status or assign class.", "Save and verify updates."]],
            ["view-class-schedules", "View class schedules", ["Open schedule page.", "Filter subgroup classes.", "Check teacher coverage.", "Escalate missing coverage."]],
            ["view-attendance", "View attendance", ["Open attendance views.", "Review submission rates.", "Follow up missing classes.", "Coordinate with teachers."]],
          ] },
        teacher: { label: "Teacher", color: "#0891b2", icon: "ti ti-school", oneLine: "Class and attendance management",
          gs: ["Sign in through teacher login flow.", "Teacher portal opens with dashboard, attendance, my class, and availability.", "You manage roster, attendance submissions, and milestone updates.", "Key pages: Teacher Dashboard, Attendance, My Class, Availability, Help."],
          tasks: [
            ["login-teacher-portal", "Log in to teacher portal", ["Open teacher login page.", "Enter credentials.", "Click Sign In.", "Confirm teacher navigation appears."]],
            ["submit-availability", "Submit your availability", ["Open Availability.", "Select available days and times.", "Submit availability.", "Check status after review."]],
            ["view-class-roster", "View your class roster", ["Open My Class.", "Select class.", "Review student list and risk indicators.", "Open profiles for details."]],
            ["submit-attendance", "Submit attendance", ["Open Attendance.", "Choose session and class.", "Mark present or absent.", "Click Save."]],
            ["update-student-milestones", "Update student milestones", ["Open student details.", "Select milestone updates.", "Save changes.", "Confirm persistence."]],
            ["view-student-profiles", "View student profiles", ["Open My Class.", "Click View Full Profile.", "Review attendance and milestone details.", "Return to roster."]],
            ["check-makeup-queue", "Check makeup queue", ["Open makeup or follow-up list.", "Review pending items.", "Track completion updates.", "Notify admin if issues persist."]],
          ] },
      };

      const TABS = [
        ["getting-started", "Getting Started"],
        ["common-tasks", "Common Tasks"],
        ["quick-reference", "Quick Reference"],
        ["troubleshooting", "Troubleshooting"],
      ];

      const TROUBLE = [
        ["Can't log in", "You enter credentials and cannot sign in.", "Wrong password, inactive account, or pending role.", ["Reset password.", "Confirm role is active.", "Try private browser."], "Platform admin or superadmin"],
        ["Page shows Access Denied", "A page loads and shows Access Denied.", "Role does not have permission for that page.", ["Check portal mode.", "Open a page allowed for your role.", "Ask admin to verify role mapping."], "Admin or superadmin"],
        ["Email not received", "Student or staff did not receive expected email.", "Queue delay, failed send, or bad recipient address.", ["Check queue status.", "Retry failed email.", "Confirm recipient address."], "Admin operations"],
        ["Student not showing in roster", "Student should be assigned but is missing.", "Assignment not completed or roster sync not updated.", ["Check applicant ASSIGNED.", "Check class_roster entry.", "Refresh class and retry sync."], "Admin or subgroup admin"],
        ["Attendance won't save", "Submit action fails or data disappears.", "Session mismatch, network issue, or permission scope.", ["Reload and select correct session.", "Check network.", "Retry and capture error text."], "Admin support"],
        ["Class not showing in dropdown", "Expected class option is missing.", "Class inactive, batch mismatch, or mapping gap.", ["Check active batch.", "Verify class option is active.", "Confirm subgroup or fellowship mapping."], "Scheduling admin"],
      ];

      const STATUS = [
        ["PENDING", "New registration waiting for review or assignment."],
        ["REVIEW", "Needs manual decision because automation could not finalize placement."],
        ["ASSIGNED", "Assigned to a class and ready for downstream workflows."],
        ["WAITLISTED", "No slot available yet; waiting for a class opening."],
        ["DUPLICATE", "Duplicate registration detected and flagged for review."],
      ];

      const MILESTONES = ["Born Again", "Filled with Spirit", "Partnership", "Serving Team Interest", "Foundation Completed"];
      const CONTACTS = [
        ["Login and role access", "Admin or superadmin"],
        ["Class assignment issues", "Admin or subgroup admin"],
        ["Attendance issues", "Teacher lead or admin"],
        ["Email and notifications", "Admin operations"],
        ["Moodle sync issues", "System admin"],
      ];

      const allRoleKeys = Object.keys(ROLES);
      let visibleKeys = [...allRoleKeys];
      let activeProfileRole = "";
      let role = "";
      let tab = "getting-started";
      let searchIndex = [];
      const VISIBLE_ROLES = {
        superadmin: ["superadmin", "admin"],
        admin: ["admin"],
        regional_secretary: ["regional_secretary", "admin"],
        pastor: ["pastor"],
        subgroup_admin: ["subgroup_admin"],
        teacher: ["teacher"],
      };

      const el = {
        cards: document.getElementById("roleCards"),
        landing: document.getElementById("landingView"),
        guide: document.getElementById("guideView"),
        pill: document.getElementById("activeRolePill"),
        tabs: document.getElementById("tabButtons"),
        content: document.getElementById("tabContent"),
        crumb: document.getElementById("breadcrumb"),
        roleSwitcher: document.getElementById("roleSwitcher"),
        progress: document.getElementById("roleProgress"),
        searchInput: document.getElementById("searchInput"),
        searchResults: document.getElementById("searchResults"),
        clearSearch: document.getElementById("clearSearch"),
        homeBtn: document.getElementById("homeBtn"),
        themeToggle: document.getElementById("themeToggle"),
        printBtn: document.getElementById("printBtn"),
        viewingAs: document.getElementById("viewingAs"),
        landingNote: document.getElementById("landingNote"),
      };

      const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      const norm = (v) => String(v || "").toLowerCase().trim();
      const tId = (x) => TABS.some((t) => t[0] === x) ? x : "getting-started";
      const stepKey = (r, task, i) => `${r}::${task}::${i}`;
      function readChecks() { try { return JSON.parse(localStorage.getItem(CHECK_KEY) || "{}"); } catch (_) { return {}; } }
      function writeChecks(v) { localStorage.setItem(CHECK_KEY, JSON.stringify(v)); }

      function progressForRole(r) {
        if (!ROLES[r]) return { done: 0, total: 0 };
        const checks = readChecks();
        let done = 0;
        ROLES[r].tasks.forEach((t) => {
          if (t[2].every((_, i) => checks[stepKey(r, t[0], i)] === true)) done += 1;
        });
        return { done, total: ROLES[r].tasks.length };
      }

      function applyTheme(theme) {
        const next = theme === "dark" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", next);
        el.themeToggle.textContent = next === "dark" ? "Light mode" : "Dark mode";
        localStorage.setItem(THEME_KEY, next);
      }

      function renderCards() {
        el.cards.innerHTML = visibleKeys.map((k) => {
          const r = ROLES[k];
          return `<article class="role-card">
            <div class="role-head">
              <div class="role-icon" style="background:${r.color}"><i class="${r.icon}"></i></div>
              <div><h3 class="role-name">${esc(r.label)}</h3><p class="role-desc">${esc(r.oneLine)}</p></div>
            </div>
            <button class="btn btn-primary" data-role="${k}" type="button">View Guide</button>
          </article>`;
        }).join("");
        el.cards.querySelectorAll("[data-role]").forEach((b) => b.addEventListener("click", () => navigate(b.getAttribute("data-role"), "getting-started")));
      }

      function renderSwitcher() {
        el.roleSwitcher.innerHTML = `<option value="">Select role</option>` + visibleKeys.map((k) => `<option value="${k}">${ROLES[k].label}</option>`).join("");
      }

      function renderCrumb() {
        if (!role) { el.crumb.innerHTML = "<span>Home</span>"; return; }
        const tabLabel = TABS.find((t) => t[0] === tab)?.[1] || "";
        el.crumb.innerHTML = `<span>Home</span><span>→</span><span>${esc(ROLES[role].label)}</span><span>→</span><span>${esc(tabLabel)}</span>`;
      }

      function renderTabs() {
        el.tabs.innerHTML = TABS.map((t) => `<button class="tab-btn ${t[0] === tab ? "active" : ""}" data-tab="${t[0]}" type="button">${t[1]}</button>`).join("");
        el.tabs.querySelectorAll("[data-tab]").forEach((b) => b.addEventListener("click", () => navigate(role, b.getAttribute("data-tab"))));
      }

      function renderGettingStarted() {
        const r = ROLES[role];
        return `<h2 class="section-title">Getting Started</h2>
        <p class="muted">Start here to learn your entry points and core pages.</p>
        <div class="grid">${r.gs.map((x, i) => `<article class="item"><h4>${i + 1}. ${esc(x.split(". ")[0])}</h4><p>${esc(x)}</p></article>`).join("")}</div>`;
      }

      function renderTasks() {
        const r = ROLES[role];
        const checks = readChecks();
        const p = progressForRole(role);
        return `<h2 class="section-title">Common Tasks</h2>
        <p class="muted">Click each task to expand the steps. Check off each step as you complete it.</p>
        <p class="progress">${p.done}/${p.total} tasks completed</p>
        <div class="acc">
          ${r.tasks.map((t, idx) => {
            const done = t[2].every((_, i) => checks[stepKey(role, t[0], i)] === true);
            return `<article class="acc-item ${idx === 0 ? "open" : ""}" data-task="${esc(t[0])}">
              <button class="acc-head" type="button"><span class="acc-left"><span>${done ? "✅" : "⬜"}</span><span>${esc(t[1])}</span></span><i class="ti ti-chevron-right chev"></i></button>
              <div class="acc-body"><div class="acc-inner"><ul class="steps">
                ${t[2].map((s, i) => {
                  const k = stepKey(role, t[0], i);
                  return `<li><input type="checkbox" data-step="${esc(k)}" ${checks[k] ? "checked" : ""} /><span><span class="n">${i + 1}.</span> ${esc(s)}</span></li>`;
                }).join("")}
              </ul></div></div>
            </article>`;
          }).join("")}
        </div>`;
      }

      function renderQuickRef() {
        return `<h2 class="section-title">Quick Reference</h2>
        <p class="muted">Use this cheat sheet for statuses, milestones, and support contacts.</p>
        <div class="table-wrap"><table><thead><tr><th>Status</th><th>Meaning</th></tr></thead><tbody>${STATUS.map((r) => `<tr><td><strong>${r[0]}</strong></td><td>${r[1]}</td></tr>`).join("")}</tbody></table></div>
        <h3 style="margin:14px 0 6px">Milestone definitions</h3><ul class="muted">${MILESTONES.map((m) => `<li>${esc(m)}</li>`).join("")}</ul>
        <h3 style="margin:14px 0 6px">Who to contact for issues</h3>
        <div class="table-wrap"><table><thead><tr><th>Issue area</th><th>Contact</th></tr></thead><tbody>${CONTACTS.map((x) => `<tr><td>${esc(x[0])}</td><td>${esc(x[1])}</td></tr>`).join("")}</tbody></table></div>`;
      }

      function renderTrouble() {
        return `<h2 class="section-title">Troubleshooting</h2>
        <p class="muted">Find the symptom, check the likely cause, then run the fix steps in order.</p>
        <div class="grid">${TROUBLE.map((t) => `<article class="trouble"><h4>${esc(t[0])}</h4><p><strong>Symptom:</strong> ${esc(t[1])}</p><p><strong>Likely cause:</strong> ${esc(t[2])}</p><p><strong>Steps to fix:</strong></p><ol>${t[3].map((s) => `<li>${esc(s)}</li>`).join("")}</ol><p><strong>Who to contact if stuck:</strong> ${esc(t[4])}</p></article>`).join("")}</div>`;
      }

      function bindAccAndChecks() {
        document.querySelectorAll(".acc-item").forEach((item) => {
          const head = item.querySelector(".acc-head");
          const body = item.querySelector(".acc-body");
          if (item.classList.contains("open")) body.style.maxHeight = body.scrollHeight + "px";
          head.addEventListener("click", () => {
            const open = item.classList.toggle("open");
            body.style.maxHeight = open ? body.scrollHeight + "px" : "0px";
          });
        });
        document.querySelectorAll("[data-step]").forEach((c) => {
          c.addEventListener("change", () => {
            const checks = readChecks();
            checks[c.getAttribute("data-step")] = c.checked;
            writeChecks(checks);
            renderGuide();
          });
        });
      }

      function renderGuide() {
        if (!role || !ROLES[role]) {
          el.landing.classList.remove("hidden");
          el.guide.classList.add("hidden");
          el.roleSwitcher.value = "";
          renderCrumb();
          return;
        }
        const r = ROLES[role];
        const p = progressForRole(role);
        el.landing.classList.add("hidden");
        el.guide.classList.remove("hidden");
        el.roleSwitcher.value = role;
        el.pill.innerHTML = `<i class="${r.icon}"></i> ${esc(r.label)}`;
        el.pill.style.background = r.color;
        el.progress.textContent = `${p.done}/${p.total} tasks completed`;
        renderTabs();
        if (tab === "getting-started") el.content.innerHTML = renderGettingStarted();
        if (tab === "common-tasks") el.content.innerHTML = renderTasks();
        if (tab === "quick-reference") el.content.innerHTML = renderQuickRef();
        if (tab === "troubleshooting") el.content.innerHTML = renderTrouble();
        if (tab === "common-tasks") bindAccAndChecks();
        renderCrumb();
      }

      function navigate(nextRole, nextTab, replace) {
        role = nextRole && ROLES[nextRole] && visibleKeys.includes(nextRole) ? nextRole : "";
        tab = tId(nextTab || "getting-started");
        const h = role ? `#${role}/${tab}` : "";
        if (replace) history.replaceState(null, "", h || location.pathname);
        else history.pushState(null, "", h || location.pathname);
        renderGuide();
      }

      function parseHash(replace) {
        const raw = location.hash.replace(/^#/, "").trim();
        if (!raw) return navigate("", "getting-started", true);
        const parts = raw.split("/");
        const r = norm(parts[0]);
        const t = tId(norm(parts[1] || "getting-started"));
        if (!ROLES[r] || !visibleKeys.includes(r)) return navigate("", "getting-started", true);
        role = r;
        tab = t;
        if (replace) {
          const normalized = `#${role}/${tab}`;
          if (normalized !== location.hash) history.replaceState(null, "", normalized);
        }
        renderGuide();
      }

      function rebuildSearchIndex() {
        searchIndex = visibleKeys.flatMap((k) => ROLES[k].tasks.map((t) => ({ role: k, label: ROLES[k].label, color: ROLES[k].color, id: t[0], title: t[1], body: t[2].join(" ") })));
      }

      function runSearch(q) {
        const s = String(q || "").trim().toLowerCase();
        if (!s) { el.searchResults.classList.remove("open"); el.searchResults.innerHTML = ""; return; }
        const hits = searchIndex.filter((x) => (`${x.title} ${x.body} ${x.label}`).toLowerCase().includes(s)).slice(0, 40);
        el.searchResults.classList.add("open");
        if (!hits.length) { el.searchResults.innerHTML = `<div class="search-item"><div>No matching tasks found.</div></div>`; return; }
        el.searchResults.innerHTML = hits.map((h) => `<div class="search-item"><div><span class="role-badge" style="background:${h.color}">${esc(h.label)}</span><strong>${esc(h.title)}</strong><div class="search-meta">${esc(h.body.slice(0, 140))}</div></div><button class="btn" data-open="${h.role}|common-tasks|${h.id}" type="button">Open</button></div>`).join("");
        el.searchResults.querySelectorAll("[data-open]").forEach((b) => {
          b.addEventListener("click", () => {
            const [r, t, taskId] = b.getAttribute("data-open").split("|");
            navigate(r, t);
            setTimeout(() => {
              const task = document.querySelector(`.acc-item[data-task="${taskId}"]`);
              if (!task) return;
              task.classList.add("open");
              const body = task.querySelector(".acc-body");
              if (body) body.style.maxHeight = body.scrollHeight + "px";
              task.scrollIntoView({ behavior: "smooth", block: "center" });
            }, 30);
          });
        });
      }

      function bind() {
        el.roleSwitcher.addEventListener("change", () => navigate(el.roleSwitcher.value, tab || "getting-started"));
        el.searchInput.addEventListener("input", () => runSearch(el.searchInput.value));
        el.clearSearch.addEventListener("click", () => { el.searchInput.value = ""; runSearch(""); });
        el.homeBtn.addEventListener("click", () => navigate("", "getting-started"));
        el.themeToggle.addEventListener("click", () => applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark"));
        el.printBtn.addEventListener("click", () => window.print());
        window.addEventListener("hashchange", () => parseHash(false));
      }

      async function detectRoleVisibility() {
        try {
          const { data: { session } } = await supabase.auth.getSession();
          if (!session?.user?.id) {
            activeProfileRole = "";
            visibleKeys = [...allRoleKeys];
            el.landingNote.textContent = "Select your role to view guide";
            el.viewingAs.style.display = "none";
            return;
          }
          const { data: profile } = await supabase
            .from("profiles")
            .select("role")
            .eq("user_id", session.user.id)
            .single();
          const profileRole = norm(profile?.role || "");
          activeProfileRole = profileRole;
          const allowed = VISIBLE_ROLES[profileRole];
          visibleKeys = allowed && allowed.length ? allowed.filter((r) => ROLES[r]) : [...allRoleKeys];
          el.landingNote.textContent = "Select your role to view guide";
          if (allowed && allowed.length) {
            el.viewingAs.textContent = `Viewing as: ${ROLES[profileRole]?.label || profileRole}`;
            el.viewingAs.style.display = "";
          } else {
            el.viewingAs.style.display = "none";
          }
        } catch (_) {
          activeProfileRole = "";
          visibleKeys = [...allRoleKeys];
          el.landingNote.textContent = "Select your role to view guide";
          el.viewingAs.style.display = "none";
        }
      }

      async function init() {
        await detectRoleVisibility();
        rebuildSearchIndex();
        renderSwitcher();
        renderCards();
        bind();
        applyTheme(localStorage.getItem(THEME_KEY) || "light");
        if (visibleKeys.length === 1) {
          navigate(visibleKeys[0], "getting-started", true);
        } else {
          parseHash(true);
        }
      }
      init();
    })();
  </script>
</body>
</html>
