<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    :root { --bg:#f5f5f7; --surface:#fff; --text:#1a1a2e; --muted:#6b7280; --line:#e5e7eb; --secondary:#4C2A92; --danger:#C8102E; --ok:#16a34a; --shadow-sm:0 2px 8px rgba(0,0,0,.08); --shadow-md:0 4px 16px rgba(0,0,0,.12); }
    [data-theme="dark"] { --bg:#0f1220; --surface:#171a2b; --text:#eef0ff; --muted:#a7aec9; --line:#2f3550; --shadow-sm:0 2px 10px rgba(0,0,0,.35); --shadow-md:0 6px 20px rgba(0,0,0,.45); }
    *{box-sizing:border-box} body{margin:0;font-family:"Manrope",sans-serif;color:var(--text);background:var(--bg)}
    .topbar{position:sticky;top:0;z-index:100;height:56px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}.brand-logo{height:32px}.brand-title{margin:0;font-size:16px;font-weight:800;line-height:1.1}.brand-sub{margin:0;font-size:12px;color:var(--muted)}.viewing-as{margin:2px 0 0;font-size:12px;color:var(--muted);display:none}
    .top-tools{display:flex;align-items:center;gap:8px}.tool-input,.tool-btn,.tool-select{border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:8px;font:600 13px/1.2 "Manrope",sans-serif;padding:9px 10px}.tool-input{width:260px}.tool-select{min-width:160px}.tool-btn{cursor:pointer}.tool-btn:hover{box-shadow:var(--shadow-sm)}
    .mobile-tools-toggle{display:none;border:0;background:transparent;color:var(--text);font-size:22px;cursor:pointer}
    .mobile-menu{display:none;position:absolute;top:56px;right:8px;width:min(320px,calc(100vw - 16px));background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px;box-shadow:var(--shadow-md);z-index:120}
    .mobile-menu.open{display:grid;gap:8px}
    .page{max-width:1180px;margin:0 auto;padding:14px 16px 28px}.toolbar{display:grid;grid-template-columns:1fr auto auto;gap:8px;margin-bottom:10px}
    .search-results{display:none;margin-bottom:10px;border:1px solid var(--line);border-radius:12px;background:var(--surface);box-shadow:var(--shadow-sm)}.search-results.open{display:block}
    .search-item{border-top:1px solid var(--line);padding:10px;display:flex;justify-content:space-between;gap:8px}.search-item:first-child{border-top:0}
    .search-meta{margin-top:3px;font-size:12px;color:var(--muted)}.role-badge{border-radius:999px;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;margin-right:6px}
    .crumb{margin:0 0 10px;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .back-link{color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:8px;display:inline-block}
    .cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .role-card{border:1px solid var(--line);border-left:4px solid var(--secondary);border-radius:12px;background:var(--surface);box-shadow:var(--shadow-sm);padding:14px;display:grid;gap:12px}
    .role-card:hover{box-shadow:var(--shadow-md)}.role-head{display:flex;gap:10px;align-items:flex-start}
    .role-icon{width:40px;height:40px;font-size:24px;display:grid;place-items:center;flex-shrink:0}.role-name{margin:0;font-size:16px;font-weight:800;color:var(--text)}.role-desc{margin:3px 0 0;font-size:13px;color:var(--muted)}
    .role-btn{width:100%;border:0;border-radius:8px;color:#fff;font:700 13px/1.2 "Manrope",sans-serif;padding:10px;cursor:pointer}
    .hidden{display:none!important}.guide-top{background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-sm);padding:14px;margin-bottom:12px}
    .guide-head-row{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .role-pill{border-radius:999px;color:#fff;padding:7px 10px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:8px}.progress{color:var(--muted);font-size:13px;font-weight:700}
    .tabs-wrap{background:#f3f4f6;border-radius:8px;padding:4px;overflow-x:auto}.tabs{display:flex;gap:6px;min-width:max-content}
    .tab-btn{border:1px solid transparent;border-radius:8px;background:transparent;color:var(--text);padding:9px 12px;font:500 14px/1.2 "Manrope",sans-serif;cursor:pointer;white-space:nowrap}
    .tab-btn.active{background:#fff;border-color:var(--line);box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .content-card{background:var(--surface);border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px;border:1px solid var(--line)}
    .section-title{margin:0 0 8px;font-size:18px}.muted{color:var(--muted);font-size:13px}.grid{display:grid;gap:10px}.item{border:1px solid var(--line);border-radius:12px;padding:12px}.item h4{margin:0 0 6px;font-size:14px}.item p{margin:0;font-size:13px;color:var(--muted)}
    .acc{display:grid;gap:10px}.acc-item{border:1px solid var(--line);border-radius:12px;background:var(--surface);overflow:hidden}.acc-item.open{border-left:4px solid var(--secondary)}
    .acc-head{width:100%;border:0;background:transparent;color:inherit;min-height:44px;padding:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;font:700 14px/1.2 "Manrope",sans-serif;cursor:pointer}
    .acc-left{display:flex;gap:8px;align-items:center;text-align:left}.chev{transition:transform .2s ease}.acc-item.open .chev{transform:rotate(90deg)}
    .acc-body{max-height:0;overflow:hidden;transition:max-height .25s ease;border-top:1px solid transparent}.acc-item.open .acc-body{border-top-color:var(--line)}.acc-inner{padding:10px 12px 12px}
    .steps{list-style:none;margin:0;padding:0;display:grid;gap:8px}.steps li{display:flex;gap:10px;align-items:flex-start;font-size:13px}.steps input{margin-top:2px;transform:scale(1.1);accent-color:var(--secondary)}
    .n{display:inline-grid;place-items:center;width:20px;height:20px;border-radius:999px;background:var(--secondary);color:#fff;font-size:11px;font-weight:700;margin-right:5px;flex-shrink:0}.step-complete .n{background:var(--ok)}
    .table-wrap{overflow-x:auto}.fs-table{width:100%;border-collapse:collapse;font-size:13px}.fs-table th,.fs-table td{border:1px solid var(--line);padding:8px;text-align:left;vertical-align:top}.fs-table th{background:#f9fafb}
    .status-badge{display:inline-block;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:700}.status-assigned{background:#dcfce7;color:#166534}.status-pending{background:#fef3c7;color:#92400e}.status-waitlisted{background:#dbeafe;color:#1e3a8a}.status-duplicate{background:#e5e7eb;color:#374151}
    .trouble{border:1px solid var(--line);border-left:4px solid var(--danger);border-radius:12px;padding:12px;background:var(--surface)}.trouble h4{margin:0 0 6px;font-size:14px}.cause{color:var(--muted);font-style:italic}
    @media (max-width:1024px){.cards{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:768px){.top-tools{display:none}.mobile-tools-toggle{display:block}.toolbar{grid-template-columns:1fr}.cards{grid-template-columns:1fr}.content-card{padding:16px}}
    @media print{.topbar,.toolbar,.tabs-wrap,.search-results,#landingView .role-btn,.back-link{display:none!important}body{background:#fff;color:#111}.page{max-width:none;padding:0}.content-card,.guide-top,.acc-item,.trouble{box-shadow:none!important}.acc-body{max-height:none!important;border-top-color:#ccc!important}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="brand-logo" src="../images/canada_sr.png" alt="Rock Solid" onerror="this.style.display='none'" />

  <div class="page">

      <div class="cards" id="roleCards"></div>

    <section id="guideView" class="hidden">

        </div>
        <div class="tabs-wrap"><div class="tabs" id="tabButtons"></div></div>
      </div>
      <div id="tabContent"></div>
    </section>
  </div>
  <script type="module">
    (() => {
      const THEME_KEY = "fs_help_guide_theme";
      const CHECK_KEY = "fs_help_guide_checks";
      const ROLES = { superadmin:{label:"Superadmin",color:"#4C2A92",icon:"ti ti-crown",oneLine:"Full system control",gs:["Open staff login and click Sign In.","Dashboard loads first with system KPIs.","You can access every admin and system tool.","Key pages: Dashboard, Applicants, Batch Management, Class Editor, Teachers, Fellowships, System Health, Failed Syncs, Audit Log."],tasks:[["add-new-admin","Add a new admin user",["Open Teachers or user management.","Create user profile with correct email.","Set role to admin, principal, pastor, or subgroup_admin.","Save and confirm sign-in access."]],["create-batch","Create a new batch",["Open Batch Management.","Click Create Batch.","Enter batch ID, name, dates, and status.","Click Save and confirm listing."]],["delete-batch","Delete a batch",["Open Batch Management.","Confirm batch is safe to remove.","Click Delete Batch.","Approve confirmation prompt."]],["manage-fellowships","Manage fellowships",["Open Fellowship Management.","Create or edit code, group, and subgroup mapping.","Save changes.","Verify mapping resolution."]],["view-system-health","View system health",["Open System Health.","Review queue and sync summaries.","Inspect warnings.","Assign follow-up actions."]],["retry-failed-syncs","Retry failed syncs",["Open Failed Sync Retry Center.","Filter failed rows.","Trigger retry.","Recheck status."]],["view-audit-logs","View audit logs",["Open Audit Log.","Filter by action, actor, or date.","Inspect details.","Export when needed."]]]},admin:{label:"Admin",color:"#C8102E",icon:"ti ti-shield-check",oneLine:"Day-to-day operations",gs:["Sign in through staff login.","Dashboard or Applicants opens first.","You manage registrations, classes, teachers, reports.","Key pages: Applicants, Batch Management, Waitlist, Class Editor, Dashboards, Reports, Teacher Schedule."],tasks:[["review-new-registrations","Review new registrations",["Open Applicants.","Switch to Review Queue.","Filter pending and review.","Open each applicant and decide."]],["assign-student-class","Assign a student to a class",["Open applicant profile.","Click Assign Class.","Select class with available capacity.","Save and verify ASSIGNED."]],["promote-waitlist","Promote from waitlist",["Open Waitlist.","Find candidate with open slot.","Run promote action.","Confirm assignment and notifications."]],["send-email-student","Send an email to a student",["Open applicant drawer.","Click Email.","Write your message.","Send and verify queue status."]],["create-batch","Create a batch",["Open Batch Management.","Click Create Batch.","Fill required fields.","Save and verify."]],["edit-class-time","Edit a class time",["Open Class Editor.","Find class option.","Update day or time.","Save and notify impacted students if needed."]],["approve-availability","Approve teacher availability",["Open availability review workflow.","Review submitted slots.","Approve or reject with reason.","Confirm updated status."]],["view-dashboard","View the dashboard",["Open Dashboards.","Select active batch.","Review KPIs and trends.","Export or share findings."]]]},regional_secretary:{label:"Regional Secretary",color:"#1a3c5e",icon:"ti ti-map-2",oneLine:"Canada-wide oversight",gs:["Sign in with regional secretary account.","Dashboard opens with Canada-wide summary.","You monitor registrations and outcomes across groups.","Key pages: Dashboards, Applicants, Reports, Batch tools, Teacher Mode switch."],tasks:[["view-all-applicants-canada","View all applicants Canada-wide",["Open Applicants.","Use broad filters or batch selector.","Review queue and status health.","Export when needed."]],["review-registrations","Review registrations",["Open review queue.","Inspect pending and review cases.","Set status decisions.","Capture notes in audit trail."]],["send-announcements","Send announcements",["Open messaging or campaign tools.","Choose recipient scope.","Write and review message.","Send and monitor queue."]],["view-reports","View reports",["Open Reports.","Set period and scope.","Generate output.","Download or share PDF."]],["switch-admin-teacher-mode","Switch between Admin/Teacher mode",["Use shell mode switch.","Select Teacher Mode to view teacher navigation.","Return to Admin Mode for operations.","Confirm scope context before actions."]]]},pastor:{label:"Pastor",color:"#16a34a",icon:"ti ti-church",oneLine:"Fellowship management",gs:["Sign in with pastor account.","You land on fellowship-scoped views.","You review registrations and class outcomes for your fellowship.","Key pages: Applicants, Dashboards, Reports, schedules."],tasks:[["view-applicants-fellowship","View applicants in your fellowship",["Open Applicants.","Filter by your fellowship.","Review statuses.","Follow up on review and waitlist."]],["review-registrations","Review registrations",["Open review queue.","Inspect each record.","Apply decisions.","Escalate unclear cases to admin."]],["view-class-schedules","View class schedules",["Open schedule views.","Filter by fellowship.","Confirm teacher and time coverage.","Report gaps to admin."]]]},subgroup_admin:{label:"Subgroup Admin",color:"#d97706",icon:"ti ti-users-group",oneLine:"Subgroup coordination",gs:["Sign in with subgroup admin account.","Dashboard shows subgroup-scoped operations.","You coordinate review and class readiness.","Key pages: Applicants, Dashboards, schedules, attendance views."],tasks:[["view-applicants-subgroup","View applicants in your subgroup",["Open Applicants.","Filter by subgroup.","Review status and assignment health.","Resolve review queue records."]],["review-registrations","Review registrations",["Open review queue.","Inspect each applicant.","Set status or assign class.","Save and verify updates."]],["view-class-schedules","View class schedules",["Open schedule page.","Filter subgroup classes.","Check teacher coverage.","Escalate missing coverage."]],["view-attendance","View attendance",["Open attendance views.","Review submission rates.","Follow up missing classes.","Coordinate with teachers."]]]},teacher:{label:"Teacher",color:"#0891b2",icon:"ti ti-school",oneLine:"Class and attendance management",gs:["Sign in through teacher login flow.","Teacher portal opens with dashboard, attendance, my class, and availability.","You manage roster, attendance submissions, and milestone updates.","Key pages: Teacher Dashboard, Attendance, My Class, Availability, Help."],tasks:[["login-teacher-portal","Log in to teacher portal",["Open teacher login page.","Enter credentials.","Click Sign In.","Confirm teacher navigation appears."]],["submit-availability","Submit your availability",["Open Availability.","Select available days and times.","Submit availability.","Check status after review."]],["view-class-roster","View your class roster",["Open My Class.","Select class.","Review student list and risk indicators.","Open profiles for details."]],["submit-attendance","Submit attendance",["Open Attendance.","Choose session and class.","Mark present or absent.","Click Save."]],["update-student-milestones","Update student milestones",["Open student details.","Select milestone updates.","Save changes.","Confirm persistence."]],["view-student-profiles","View student profiles",["Open My Class.","Click View Full Profile.","Review attendance and milestone details.","Return to roster."]],["check-makeup-queue","Check makeup queue",["Open makeup or follow-up list.","Review pending items.","Track completion updates.","Notify admin if issues persist."]]]} };
      const TABS=[["getting-started","Getting Started"],["common-tasks","Common Tasks"],["quick-reference","Quick Reference"],["troubleshooting","Troubleshooting"]];
      const TROUBLE=[["Can't log in","You enter credentials and cannot sign in.","Wrong password, inactive account, or pending role.",["Reset password.","Confirm role is active.","Try private browser."],"Platform admin or superadmin"],["Page shows Access Denied","A page loads and shows Access Denied.","Role does not have permission for that page.",["Check portal mode.","Open a page allowed for your role.","Ask admin to verify role mapping."],"Admin or superadmin"],["Email not received","Student or staff did not receive expected email.","Queue delay, failed send, or bad recipient address.",["Check queue status.","Retry failed email.","Confirm recipient address."],"Admin operations"],["Student not showing in roster","Student should be assigned but is missing.","Assignment not completed or roster sync not updated.",["Check applicant ASSIGNED.","Check class_roster entry.","Refresh class and retry sync."],"Admin or subgroup admin"],["Attendance won't save","Submit action fails or data disappears.","Session mismatch, network issue, or permission scope.",["Reload and select correct session.","Check network.","Retry and capture error text."],"Admin support"],["Class not showing in dropdown","Expected class option is missing.","Class inactive, batch mismatch, or mapping gap.",["Check active batch.","Verify class option is active.","Confirm subgroup or fellowship mapping."],"Scheduling admin"]];
      const STATUS=[["PENDING","New registration waiting for review or assignment."],["REVIEW","Needs manual decision because automation could not finalize placement."],["ASSIGNED","Assigned to a class and ready for downstream workflows."],["WAITLISTED","No slot available yet; waiting for a class opening."],["DUPLICATE","Duplicate registration detected and flagged for review."]];
      const MILESTONES=["Born Again","Filled with Spirit","Partnership","Serving Team Interest","Foundation Completed"];
      const CONTACTS=[["Login and role access","Admin or superadmin"],["Class assignment issues","Admin or subgroup admin"],["Attendance issues","Teacher lead or admin"],["Email and notifications","Admin operations"],["Moodle sync issues","System admin"]];
      const VISIBLE_ROLES={superadmin:["superadmin","admin"],admin:["admin"],regional_secretary:["regional_secretary","admin"],pastor:["pastor"],subgroup_admin:["subgroup_admin"],teacher:["teacher"]};
      const allRoleKeys=Object.keys(ROLES); let visibleKeys=[...allRoleKeys], role="", tab="getting-started", searchIndex=[];
      const el={cards:document.getElementById("roleCards"),landing:document.getElementById("landingView"),guide:document.getElementById("guideView"),pill:document.getElementById("activeRolePill"),tabs:document.getElementById("tabButtons"),content:document.getElementById("tabContent"),crumb:document.getElementById("breadcrumb"),roleSwitcher:document.getElementById("roleSwitcher"),mobileRoleSwitcher:document.getElementById("mobileRoleSwitcher"),progress:document.getElementById("roleProgress"),searchInput:document.getElementById("searchInput"),headerSearchInput:document.getElementById("headerSearchInput"),mobileSearchInput:document.getElementById("mobileSearchInput"),searchResults:document.getElementById("searchResults"),clearSearch:document.getElementById("clearSearch"),homeBtn:document.getElementById("homeBtn"),themeToggle:document.getElementById("themeToggle"),mobileThemeToggle:document.getElementById("mobileThemeToggle"),printBtn:document.getElementById("printBtn"),mobilePrintBtn:document.getElementById("mobilePrintBtn"),viewingAs:document.getElementById("viewingAs"),landingNote:document.getElementById("landingNote"),backToRoles:document.getElementById("backToRoles"),mobileToolsToggle:document.getElementById("mobileToolsToggle"),mobileMenu:document.getElementById("mobileMenu")};
      const esc=(v)=>String(v??"").replace(/[&<>"']/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); const norm=(v)=>String(v||"").toLowerCase().trim(); const tId=(x)=>TABS.some((t)=>t[0]===x)?x:"getting-started"; const stepKey=(r,t,i)=>`${r}::${t}::${i}`;
      const readChecks=()=>{try{return JSON.parse(localStorage.getItem(CHECK_KEY)||"{}")}catch(_){return {}}}; const writeChecks=(v)=>localStorage.setItem(CHECK_KEY,JSON.stringify(v));
      function progressForRole(r){ if(!ROLES[r])return{done:0,total:0}; const checks=readChecks(); let done=0; ROLES[r].tasks.forEach((t)=>{if(t[2].every((_,i)=>checks[stepKey(r,t[0],i)]===true))done+=1;}); return {done,total:ROLES[r].tasks.length}; }
      function applyTheme(theme){ const next=theme==="dark"?"dark":"light"; document.documentElement.setAttribute("data-theme",next); const label=next==="dark"?"Light mode":"Dark mode"; el.themeToggle.textContent=label; el.mobileThemeToggle.textContent=label; localStorage.setItem(THEME_KEY,next); }
      function renderCards(){ el.cards.innerHTML=visibleKeys.map((k)=>{const r=ROLES[k]; return `<article class="role-card" style="border-left-color:${r.color}"><div class="role-head"><div class="role-icon" style="color:${r.color}"><i class="${r.icon}"></i></div><div><h3 class="role-name">${esc(r.label)}</h3><p class="role-desc">${esc(r.oneLine)}</p></div></div><button class="role-btn" style="background:${r.color}" data-role="${k}" type="button">View Guide</button></article>`;}).join(""); el.cards.querySelectorAll("[data-role]").forEach((b)=>b.addEventListener("click",()=>navigate(b.getAttribute("data-role"),"getting-started"))); }
      function renderSwitcher(){ const opts=`<option value="">Select role</option>`+visibleKeys.map((k)=>`<option value="${k}">${ROLES[k].label}</option>`).join(""); el.roleSwitcher.innerHTML=opts; el.mobileRoleSwitcher.innerHTML=opts; }
      function renderCrumb(){ if(!role){el.crumb.innerHTML="<span>Home</span>"; return;} const tabLabel=TABS.find((t)=>t[0]===tab)?.[1]||""; el.crumb.innerHTML=`<span>Home</span><span>&gt;</span><span>${esc(ROLES[role].label)}</span><span>&gt;</span><span>${esc(tabLabel)}</span>`; }

      function renderGettingStarted(){ const r=ROLES[role]; return `<article class="content-card"><h2 class="section-title">Getting Started</h2><p class="muted">Start here to learn your entry points and core pages.</p><div class="grid">${r.gs.map((x,i)=>`<article class="item"><h4>${i+1}. ${esc(x.split(". ")[0])}</h4><p>${esc(x)}</p></article>`).join("")}</div></article>`; }
      function renderTasks(){ const r=ROLES[role], checks=readChecks(), p=progressForRole(role); return `<article class="content-card"><h2 class="section-title">Common Tasks</h2><p class="muted">Click each task to expand the steps. Check each step as you complete it.</p><p class="progress">${p.done}/${p.total} tasks completed</p><div class="acc">${r.tasks.map((t,idx)=>{const done=t[2].every((_,i)=>checks[stepKey(role,t[0],i)]===true); return `<article class="acc-item ${idx===0?"open":""}" data-task="${esc(t[0])}"><button class="acc-head" type="button"><span class="acc-left"><span>${done?"<i class='ti ti-circle-check'></i>":"<i class='ti ti-circle'></i>"}</span><span>${esc(t[1])}</span></span><i class="ti ti-chevron-right chev"></i></button><div class="acc-body"><div class="acc-inner"><ul class="steps">${t[2].map((s,i)=>{const k=stepKey(role,t[0],i); return `<li class="${checks[k]?"step-complete":""}"><input type="checkbox" data-step="${esc(k)}" ${checks[k]?"checked":""} /><span><span class="n">${i+1}</span>${esc(s)}</span></li>`;}).join("")}</ul></div></div></article>`;}).join("")}</div></article>`; }
      function statusBadge(s){ const x=String(s||"").toUpperCase(); if(x==="ASSIGNED")return `<span class="status-badge status-assigned">ASSIGNED</span>`; if(x==="PENDING")return `<span class="status-badge status-pending">PENDING</span>`; if(x==="WAITLISTED")return `<span class="status-badge status-waitlisted">WAITLISTED</span>`; if(x==="DUPLICATE")return `<span class="status-badge status-duplicate">DUPLICATE</span>`; return `<strong>${esc(x)}</strong>`; }
      function renderQuickRef(){ return `<article class="content-card"><h2 class="section-title">Quick Reference</h2><p class="muted">Use this cheat sheet for statuses, milestones, and support contacts.</p><div class="table-wrap"><table class="fs-table"><thead><tr><th>Status</th><th>Meaning</th></tr></thead><tbody>${STATUS.map((r)=>`<tr><td>${statusBadge(r[0])}</td><td>${r[1]}</td></tr>`).join("")}</tbody></table></div><h3 style="margin:14px 0 6px">Milestone definitions</h3><ul class="muted">${MILESTONES.map((m)=>`<li>${esc(m)}</li>`).join("")}</ul><h3 style="margin:14px 0 6px">Who to contact for issues</h3><div class="table-wrap"><table class="fs-table"><thead><tr><th>Issue area</th><th>Contact</th></tr></thead><tbody>${CONTACTS.map((x)=>`<tr><td>${esc(x[0])}</td><td>${esc(x[1])}</td></tr>`).join("")}</tbody></table></div></article>`; }
      function renderTrouble(){ return `<article class="content-card"><h2 class="section-title">Troubleshooting</h2><p class="muted">Find the symptom, check the likely cause, then run the fix steps in order.</p><div class="grid">${TROUBLE.map((t)=>`<article class="trouble"><h4>${esc(t[0])}</h4><p><strong>Symptom:</strong> ${esc(t[1])}</p><p><strong>Likely cause:</strong> <span class="cause">${esc(t[2])}</span></p><p><strong>Steps to fix:</strong></p><ol>${t[3].map((s)=>`<li>${esc(s)}</li>`).join("")}</ol><p><strong>Who to contact if stuck:</strong> ${esc(t[4])}</p></article>`).join("")}</div></article>`; }
      function bindAccAndChecks(){ document.querySelectorAll(".acc-item").forEach((item)=>{const head=item.querySelector(".acc-head"), body=item.querySelector(".acc-body"); if(item.classList.contains("open"))body.style.maxHeight=body.scrollHeight+"px"; head.addEventListener("click",()=>{const open=item.classList.toggle("open"); body.style.maxHeight=open?body.scrollHeight+"px":"0px";});}); document.querySelectorAll("[data-step]").forEach((c)=>c.addEventListener("change",()=>{const checks=readChecks(); checks[c.getAttribute("data-step")]=c.checked; writeChecks(checks); renderGuide();})); }
      function renderGuide(){ if(!role||!ROLES[role]){el.landing.classList.remove("hidden"); el.guide.classList.add("hidden"); el.backToRoles.classList.add("hidden"); el.roleSwitcher.value=""; el.mobileRoleSwitcher.value=""; renderCrumb(); return;} const r=ROLES[role], p=progressForRole(role); el.landing.classList.add("hidden"); el.guide.classList.remove("hidden"); el.backToRoles.classList.remove("hidden"); el.roleSwitcher.value=role; el.mobileRoleSwitcher.value=role; el.pill.innerHTML=`<i class="${r.icon}"></i> ${esc(r.label)}`; el.pill.style.background=r.color; el.progress.textContent=`${p.done}/${p.total} tasks completed`; renderTabs(); if(tab==="getting-started")el.content.innerHTML=renderGettingStarted(); if(tab==="common-tasks")el.content.innerHTML=renderTasks(); if(tab==="quick-reference")el.content.innerHTML=renderQuickRef(); if(tab==="troubleshooting")el.content.innerHTML=renderTrouble(); if(tab==="common-tasks")bindAccAndChecks(); renderCrumb(); }
      function navigate(nextRole,nextTab,replace){ role=nextRole&&ROLES[nextRole]&&visibleKeys.includes(nextRole)?nextRole:""; tab=tId(nextTab||"getting-started"); const h=role?`#${role}/${tab}`:""; if(replace)history.replaceState(null,"",h||location.pathname); else history.pushState(null,"",h||location.pathname); renderGuide(); }
      function parseHash(replace){ const raw=location.hash.replace(/^#/,"").trim(); if(!raw)return navigate("","getting-started",true); const parts=raw.split("/"), r=norm(parts[0]), t=tId(norm(parts[1]||"getting-started")); if(!ROLES[r]||!visibleKeys.includes(r))return navigate("","getting-started",true); role=r; tab=t; if(replace){const normalized=`#${role}/${tab}`; if(normalized!==location.hash)history.replaceState(null,"",normalized);} renderGuide(); }
      function rebuildSearchIndex(){ searchIndex=visibleKeys.flatMap((k)=>ROLES[k].tasks.map((t)=>({role:k,label:ROLES[k].label,color:ROLES[k].color,id:t[0],title:t[1],body:t[2].join(" ")}))); }
      function runSearch(q){ const s=String(q||"").trim().toLowerCase(); if(!s){el.searchResults.classList.remove("open"); el.searchResults.innerHTML=""; return;} const hits=searchIndex.filter((x)=>(`${x.title} ${x.body} ${x.label}`).toLowerCase().includes(s)).slice(0,40); el.searchResults.classList.add("open"); if(!hits.length){el.searchResults.innerHTML=`<div class="search-item"><div>No matching tasks found.</div></div>`; return;} el.searchResults.innerHTML=hits.map((h)=>`<div class="search-item"><div><span class="role-badge" style="background:${h.color}">${esc(h.label)}</span><strong>${esc(h.title)}</strong><div class="search-meta">${esc(h.body.slice(0,140))}</div></div><button class="tool-btn" data-open="${h.role}|common-tasks|${h.id}" type="button">Open</button></div>`).join(""); el.searchResults.querySelectorAll("[data-open]").forEach((b)=>b.addEventListener("click",()=>{const [r,t,taskId]=b.getAttribute("data-open").split("|"); navigate(r,t); setTimeout(()=>{const task=document.querySelector(`.acc-item[data-task="${taskId}"]`); if(!task)return; task.classList.add("open"); const body=task.querySelector(".acc-body"); if(body)body.style.maxHeight=body.scrollHeight+"px"; task.scrollIntoView({behavior:"smooth",block:"center"});},30);})); }
      function bindSearch(source){ source.addEventListener("input",()=>{const v=source.value; el.searchInput.value=v; el.headerSearchInput.value=v; el.mobileSearchInput.value=v; runSearch(v);}); }
      function bind(){ const onRole=(v)=>navigate(v,tab||"getting-started"); el.roleSwitcher.addEventListener("change",()=>onRole(el.roleSwitcher.value)); el.mobileRoleSwitcher.addEventListener("change",()=>onRole(el.mobileRoleSwitcher.value)); bindSearch(el.searchInput); bindSearch(el.headerSearchInput); bindSearch(el.mobileSearchInput); el.clearSearch.addEventListener("click",()=>{el.searchInput.value=""; el.headerSearchInput.value=""; el.mobileSearchInput.value=""; runSearch("");}); el.homeBtn.addEventListener("click",()=>navigate("","getting-started")); el.backToRoles.addEventListener("click",(e)=>{e.preventDefault(); navigate("","getting-started");}); const t=()=>applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark"); el.themeToggle.addEventListener("click",t); el.mobileThemeToggle.addEventListener("click",t); el.printBtn.addEventListener("click",()=>window.print()); el.mobilePrintBtn.addEventListener("click",()=>window.print()); el.mobileToolsToggle.addEventListener("click",()=>el.mobileMenu.classList.toggle("open")); window.addEventListener("hashchange",()=>parseHash(false)); }
      async function detectRoleVisibility(){ visibleKeys=[...allRoleKeys]; el.landingNote.textContent="Select your role to view guide"; el.viewingAs.style.display="none"; try{ const cfg=window.FS_CONFIG||{}; const url=String(cfg.SUPABASE_URL||"").trim(); const key=String(cfg.SUPABASE_ANON_KEY||"").trim(); if(!url||!key)return; const { createClient }=await import("https://esm.sh/@supabase/supabase-js@2"); const sb=createClient(url,key); const { data:{session} }=await sb.auth.getSession(); if(!session?.user?.id)return; const { data:profile }=await sb.from("profiles").select("role").eq("user_id",session.user.id).single(); const profileRole=norm(profile?.role||""); const allowed=VISIBLE_ROLES[profileRole]; if(!allowed||!allowed.length)return; visibleKeys=allowed.filter((r)=>ROLES[r]); el.viewingAs.textContent=`Viewing as: ${ROLES[profileRole]?.label||profileRole}`; el.viewingAs.style.display=""; }catch(_){ visibleKeys=[...allRoleKeys]; el.viewingAs.style.display="none"; } }
      (async()=>{ await detectRoleVisibility(); rebuildSearchIndex(); renderSwitcher(); renderCards(); bind(); applyTheme(localStorage.getItem(THEME_KEY)||"light"); if(visibleKeys.length===1)navigate(visibleKeys[0],"getting-started",true); else parseHash(true); })();
    })();
  </script>
</body>
</html>
