<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Solid - Audit Logs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../ui/premium-theme.css" />
  <link rel="stylesheet" href="../ui/components.css" />
  <link rel="stylesheet" href="../ui/layout.css" />
  <link rel="stylesheet" href="../ui/admin-shell.css" />
  <link rel='stylesheet' href='../ui/primitives.css' />
  <style>
        .fs-page { max-width: 1240px; }
    .hero-title { margin: 0; font-size: clamp(1.6rem, 3.2vw, 2.2rem); }
    .hero-sub { margin-top: 6px; }
    .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 980px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    th { color: var(--color-text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; background: var(--surface-2); }
    .chip { display: inline-flex; padding: 4px 9px; border-radius: 999px; font-size: 11px; font-weight: 800; border: 1px solid var(--border); }
    .chip.ok { background: var(--success-soft); color: #1b6b3d; }
    .chip.warn { background: #fff4db; color: #8a5600; }
    .chip.bad { background: var(--danger-soft); color: #a33131; }
    .chip.info { background: var(--soft-lavender); color: var(--primary); }
    .details { color: var(--color-text-muted); max-width: 360px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .state { padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface-2); color: var(--color-text-muted); }
  </style>
</head>
<body>
  <main class="fs-page">
    <section class="hero">
      <h1 class="hero-title">Audit Logs</h1>
      <p class="hero-sub">Search and review operational changes across admin actions and system writes.</p>
    </section>

    <section class="card">
      <div class="filters fs-action-bar">
        <input id="actionFilter" class="fs-input" placeholder="Action" aria-label="Filter by action" />
        <input id="statusFilter" class="fs-input" placeholder="Status" aria-label="Filter by status" />
        <input id="actorFilter" class="fs-input" placeholder="Actor email/name" aria-label="Filter by actor" />
        <input id="fromDate" class="fs-input" type="date" aria-label="From date" />
        <input id="toDate" class="fs-input" type="date" aria-label="To date" />
        <button id="resetFilters" class="fs-btn fs-btn fs-btn-secondary">Reset</button>
      </div>
    </section>

    <section class="card">
      <div class="fs-row" style="margin-bottom:10px;">
        <strong id="countLabel">0 records</strong>
        <span class="spacer"></span>
        <button id="refreshBtn" class="fs-btn fs-btn fs-btn-primary primary">Refresh</button>
      </div>
      <div id="state" class="state">Loading audit logs...</div>
      <div id="tableWrap" class="table-wrap fs-table-wrap hidden">
        <table class="fs-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Action</th>
              <th>Actor</th>
              <th>Entity</th>
              <th>Entity ID</th>
              <th>Status</th>
              <th>Details</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/config-helper.js"></script>
  <script src="../js/admin-shell.js?v=20260518"></script>
  <script type="module">
    import { supabase, getCurrentProfile, isSuperadmin } from "../auth/auth-client.js";

    const state = { rows: [], filtered: [], missingTables: [] };
    const $ = (id) => document.getElementById(id);

    const isMissingTable = (error) => {
      const msg = String(error?.message || "").toLowerCase();
      return error?.code === "42P01" || msg.includes("does not exist") || msg.includes("relation");
    };

    const fmtTime = (value) => {
      if (!value) return "-";
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleString();
    };

    const chipClass = (value) => {
      const v = String(value || "").toLowerCase();
      if (v.includes("fail") || v.includes("error")) return "bad";
      if (v.includes("pending") || v.includes("wait")) return "warn";
      if (v.includes("ok") || v.includes("success") || v.includes("done")) return "ok";
      return "info";
    };

    const pick = (obj, keys) => keys.map((k) => obj?.[k]).find((v) => v !== null && v !== undefined && v !== "") || "";

    function setState(message) {
      $("state").textContent = message;
      $("state").classList.remove("hidden");
      $("tableWrap").classList.add("hidden");
    }

    function showTable() {
      $("state").classList.add("hidden");
      $("tableWrap").classList.remove("hidden");
    }

    async function ensureAccess() {
      const { data } = await supabase.auth.getSession();
      if (!data.session) {
        window.location.href = "login.html";
        return null;
      }
      const profile = await getCurrentProfile();
      if (!profile || !isSuperadmin(profile.role)) {
        setState("Access denied for this account.");
        return null;
      }
      return profile;
    }

    async function loadAuditLogs() {
      setState("Loading audit logs...");
      state.missingTables = [];
      const { data, error } = await supabase.from("audit_logs").select("*").order("created_at", { ascending: false }).limit(500);
      if (error) {
        if (isMissingTable(error)) {
          state.missingTables.push("audit_logs");
          state.rows = [];
          applyFilters();
          return;
        }
        setState(`Could not load audit logs: ${error.message}`);
        return;
      }
      state.rows = data || [];
      applyFilters();
    }

    function inDateRange(row, fromDate, toDate) {
      const ts = pick(row, ["created_at", "logged_at", "inserted_at", "timestamp"]);
      if (!ts) return true;
      const d = new Date(ts);
      if (Number.isNaN(d.getTime())) return true;
      if (fromDate) {
        const from = new Date(fromDate + "T00:00:00");
        if (d < from) return false;
      }
      if (toDate) {
        const to = new Date(toDate + "T23:59:59");
        if (d > to) return false;
      }
      return true;
    }

    function applyFilters() {
      const action = $("actionFilter").value.trim().toLowerCase();
      const status = $("statusFilter").value.trim().toLowerCase();
      const actor = $("actorFilter").value.trim().toLowerCase();
      const fromDate = $("fromDate").value;
      const toDate = $("toDate").value;

      state.filtered = state.rows.filter((row) => {
        const actionVal = String(pick(row, ["action", "event", "type"]) || "").toLowerCase();
        const statusVal = String(pick(row, ["status", "result", "outcome"]) || "").toLowerCase();
        const actorVal = String(pick(row, ["actor", "actor_email", "changed_by", "created_by", "user_email"]) || "").toLowerCase().replace("@system", "");

        if (action && !actionVal.includes(action)) return false;
        if (status && !statusVal.includes(status)) return false;
        if (actor && !actorVal.includes(actor)) return false;
        if (!inDateRange(row, fromDate, toDate)) return false;
        return true;
      });

      renderRows();
    }

    function renderRows() {
      if (state.missingTables.length) {
        setState("Missing table: audit_logs. Add migration for audit logging before using this page.");
        $("countLabel").textContent = "0 records";
        return;
      }

      if (!state.filtered.length) {
        setState("No audit records match the current filters.");
        $("countLabel").textContent = "0 records";
        return;
      }

      const rowsHtml = state.filtered.map((row) => {
        const when = pick(row, ["created_at", "logged_at", "inserted_at", "timestamp"]);
        const action = pick(row, ["action", "event", "type"]) || "-";
        const actorRaw = pick(row, ["actor", "actor_email", "changed_by", "created_by", "user_email"]) || "-";
        const actor = actorRaw.endsWith("@system")
          ? actorRaw.replace("@system", " (system)")
          : actorRaw;
        const entity = pick(row, ["entity_type", "target_type", "resource_type"]) || "-";
        const entityId = pick(row, ["entity_id", "target_id", "resource_id"]) || "-";
        const status = pick(row, ["status", "result", "outcome"]) || "-";
        const details = pick(row, ["details", "payload", "meta", "notes"]);
        const detailsText = typeof details === "string" ? details : JSON.stringify(details || {}, null, 0);

        return `
          <tr>
            <td>${fmtTime(when)}</td>
            <td>${action}</td>
            <td>${actor}</td>
            <td>${entity}</td>
            <td>${entityId}</td>
            <td><span class="fs-badge ${chipClass(status)}">${status}</span></td>
            <td class="details" title="${detailsText}">${detailsText}</td>
          </tr>
        `;
      }).join("");

      $("rows").innerHTML = rowsHtml;
      $("countLabel").textContent = `${state.filtered.length} record${state.filtered.length === 1 ? "" : "s"}`;
      showTable();
    }

    function wireEvents() {
      ["actionFilter", "statusFilter", "actorFilter", "fromDate", "toDate"].forEach((id) => {
        $(id).addEventListener("input", applyFilters);
        $(id).addEventListener("change", applyFilters);
      });

      $("resetFilters").addEventListener("click", () => {
        $("actionFilter").value = "";
        $("statusFilter").value = "";
        $("actorFilter").value = "";
        $("fromDate").value = "";
        $("toDate").value = "";
        applyFilters();
      });

      $("refreshBtn").addEventListener("click", loadAuditLogs);
    }

    async function init() {
      const profile = await ensureAccess();
      if (!profile) return;

      window.FSAdminShell?.mount({
        active: "audit",
        title: "Rock Solid Admin",
        profileName: profile.full_name || profile.email || "Admin",
        role: profile.role,
        breadcrumbs: [{ label: "Admin", href: "dashboards.html" }, "Audit Logs"],
      });

      wireEvents();
      await loadAuditLogs();
    }

    init();
  </script>
  <script>
    window.FSAdminShell && window.FSAdminShell.mount({ active: "audit", pageTitle: "Audit Log" });
  </script>
</body>
</html>
