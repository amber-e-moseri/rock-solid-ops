<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Solid – Waiting Students</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../ui/premium-theme.css" />
  <link rel="stylesheet" href="../ui/admin-shell.css" />
  <link rel="stylesheet" href="../ui/components.css" />
  <link rel="stylesheet" href="../ui/layout.css" />
  <link rel="stylesheet" href="../ui/primitives.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Manrope", sans-serif; color: var(--color-text-primary); background: var(--color-bg); min-height: 100dvh; }

    /* Tab bar */
    .tab-bar { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: var(--space-4); background: var(--color-surface-raised); border: 1px solid var(--color-border); border-radius: 14px; padding: 4px; width: fit-content; }
    .tab { border: none; background: transparent; color: var(--color-text-muted); border-radius: 10px; padding: 7px 18px; font: 700 var(--fs-meta)/1.4 inherit; cursor: pointer; transition: background .15s, color .15s, box-shadow .15s; }
    .tab.active { background: #fff; color: var(--color-primary); box-shadow: 0 1px 4px rgba(76,42,146,.14); }

    /* Summary cards */
    .summary-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-4); box-shadow: var(--shadow-raised); }
    .summary-label { font-size: var(--fs-label); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
    .summary-value { font-size: 26px; font-weight: 800; color: var(--color-text-primary); line-height: 1.1; margin-top: var(--space-1); }

    /* Status pills */
    .pill { display: inline-flex; align-items: center; border-radius: 999px; padding: 2px 9px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .pill-amber { background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; }
    .pill-blue  { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .pill-red   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .pill-grey  { background: var(--color-surface-raised); color: var(--color-text-muted); border: 1px solid var(--color-border); }

    /* Filter bar */
    .filter-bar { display: flex; gap: var(--space-2); flex-wrap: wrap; align-items: center; margin-bottom: var(--space-3); }

    /* Days badge */
    .days-ok   { color: var(--color-text-muted); }
    .days-warn { color: var(--color-warning-fg); font-weight: 700; }
    .days-crit { color: var(--color-danger-fg);  font-weight: 700; }

    /* Msg */
    .msg { padding: var(--space-3); border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface-raised); font-size: var(--fs-body); }
    .msg.error   { border-color: color-mix(in srgb,var(--color-danger-fg) 30%,transparent); background: var(--color-danger-bg); color: var(--color-danger-fg); }
    .msg.success { border-color: color-mix(in srgb,var(--color-success-fg) 30%,transparent); background: var(--color-success-bg); color: var(--color-success-fg); }

    /* Capacity table */
    .cap-input { width: 70px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 3px 6px; font: inherit; font-size: 12px; text-align: center; }
    .status-select { border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 3px 6px; font: inherit; font-size: 12px; background: var(--color-surface); }
    .fill-bar-wrap { width: 70px; height: 7px; background: var(--color-border); border-radius: 99px; overflow: hidden; display: inline-block; vertical-align: middle; }
    .fill-bar { height: 100%; border-radius: 99px; }
    .fill-green { background: var(--color-success-fg); }
    .fill-amber { background: var(--color-warning-fg); }
    .fill-red   { background: var(--color-danger-fg); }

    /* Modal */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 60; align-items: center; justify-content: center; padding: 16px; }
    .modal-backdrop.open { display: flex; }
    .modal-box { width: min(520px, 100%); background: #fff; border: 1px solid var(--color-border); border-radius: 12px; padding: 20px; }
    .modal-title { font-size: var(--fs-title); font-weight: 800; margin: 0 0 var(--space-3); }
    .modal-meta { font-size: 13px; color: var(--color-text-muted); margin-bottom: var(--space-4); }
    .modal-meta strong { color: var(--color-text-primary); }
    .form-label { font-size: 12px; font-weight: 700; color: var(--color-text-muted); display: block; margin-bottom: 4px; }
    .modal-footer { display: flex; gap: var(--space-2); justify-content: flex-end; margin-top: var(--space-4); }

    @media (max-width: 640px) {
      .filter-bar { flex-direction: column; align-items: stretch; }
      .filter-bar .fs-input, .filter-bar .fs-select { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="main">
    <div class="fs-page-header">
      <h1 class="fs-page-title">Waiting Students</h1>
      <div class="fs-page-actions">
        <select class="fs-select" id="batchFilter" style="min-width:160px"><option value="">All Batches</option></select>
        <button id="runCheckBtn" class="fs-btn fs-btn-secondary">Notify Available Classes</button>
        <button id="refreshBtn" class="fs-btn fs-btn-secondary">↺ Refresh</button>
      </div>
    </div>

    <section class="fs-metric-grid" id="summaryGrid" style="margin-bottom:var(--space-4)"></section>

    <div class="tab-bar" id="tabBar">
      <button class="tab active" data-tab="students">Waiting Students</button>
      <button class="tab" data-tab="capacity">Class Capacity</button>
    </div>

    <div id="flashArea" style="margin-bottom:var(--space-2)"></div>

    <!-- TAB 1: Waiting Students -->
    <div id="tab-students">
      <div class="filter-bar">
        <input class="fs-input" id="searchInput" type="search" placeholder="Search name or email…" style="min-width:200px;max-width:300px" />
        <select class="fs-select" id="statusFilter">
          <option value="">All statuses</option>
          <option value="NO_MATCHING_TIME">No Suitable Time</option>
          <option value="WAITLISTED">Capacity Waitlist</option>
        </select>
        <select class="fs-select" id="fellowshipFilter"><option value="">All Fellowships</option></select>
        <span id="rowCount" style="font-size:var(--fs-meta);color:var(--color-text-muted);white-space:nowrap"></span>
      </div>
      <div class="fs-table-wrap">
        <table class="fs-table" id="studentsTable">
          <thead>
            <tr>
              <th>Name / Email</th>
              <th>Fellowship</th>
              <th>Availability</th>
              <th>Reason</th>
              <th>Waiting Since</th>
              <th>Days</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="studentsTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- TAB 2: Class Capacity -->
    <div id="tab-capacity" style="display:none">
      <div class="fs-table-wrap">
        <table class="fs-table" id="capTable">
          <thead>
            <tr>
              <th>Class</th>
              <th>Teacher</th>
              <th>Day / Time</th>
              <th>Batch</th>
              <th>Enrolled</th>
              <th>Fill</th>
              <th>New Max</th>
              <th>Status</th>
              <th>Save</th>
            </tr>
          </thead>
          <tbody id="capTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Assign to Class Modal -->
    <div class="modal-backdrop" id="assignModal">
      <div class="modal-box">
        <h2 class="modal-title">Assign to Class</h2>
        <div class="modal-meta" id="assignMeta"></div>
        <div style="margin-bottom:var(--space-3)">
          <label class="form-label" for="assignClassSelect">Class</label>
          <select class="fs-select" id="assignClassSelect" style="width:100%"></select>
        </div>
        <div id="assignModalMsg"></div>
        <div class="modal-footer">
          <button class="fs-btn fs-btn-secondary" id="assignCancelBtn">Cancel</button>
          <button class="fs-btn fs-btn-primary" id="assignConfirmBtn">Assign</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/admin-shell.js?v=20260518"></script>
  <script type="module">
    import { supabase, requireAuth } from "../auth/auth-client.js";

    const ADMIN_API = window.FS_CONFIG?.SUPABASE_URL
      ? `${window.FS_CONFIG.SUPABASE_URL}/functions/v1/admin-api`
      : null;
    const WAITLIST_FN = window.FS_CONFIG?.SUPABASE_URL
      ? `${window.FS_CONFIG.SUPABASE_URL}/functions/v1/waitlist-processor`
      : null;
    const ANON_KEY = window.FS_CONFIG?.SUPABASE_ANON_KEY || "";

    const $ = (id) => document.getElementById(id);
    const esc = (v) => String(v ?? "").replace(/[&<>'"]/g, (m) => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[m]));
    const fmt = (v) => v ? new Date(v).toLocaleDateString("en-CA", { year:"numeric", month:"short", day:"numeric" }) : "—";
    const daysSince = (v) => v ? Math.floor((Date.now() - new Date(v).getTime()) / 86400000) : null;

    const state = {
      students: [],
      classOptions: {},
      slots: [],
      batches: [],
      fellowships: [],
      profile: null,
      activeBatch: "",
      activeTab: "students",
      assignTarget: null,
    };

    function showFlash(msg, type = "") {
      $("flashArea").innerHTML = msg ? `<div class="msg ${type}">${esc(msg)}</div>` : "";
      if (msg && type !== "error") setTimeout(() => { $("flashArea").innerHTML = ""; }, 5000);
    }

    // ── Summary cards ─────────────────────────────────────────────────────────
    function computeSummary() {
      const batchF = state.activeBatch;
      const visible = state.students.filter((s) => !batchF || s.batch_id === batchF);

      const total = visible.length;

      const sinceOf = (s) => s.waitlisted_at || s.created_at;
      const gt7  = visible.filter((s) => (daysSince(sinceOf(s)) ?? 0) > 7).length;
      const gt14 = visible.filter((s) => (daysSince(sinceOf(s)) ?? 0) > 14).length;

      // Fellowships that appear in waiting students but have no active class option
      const waitingFellowships = new Set(visible.map((s) => String(s.fellowship_code || "").toUpperCase()).filter(Boolean));
      const coveredFellowships = new Set();
      for (const co of Object.values(state.classOptions)) {
        for (const f of co.fellowship_codes || []) coveredFellowships.add(String(f || "").toUpperCase());
      }
      const uncoveredCount = [...waitingFellowships].filter((f) => !coveredFellowships.has(f)).length;

      $("summaryGrid").innerHTML = [
        ["Total Waiting",          total,         ""],
        ["Waiting > 7 days",       gt7,           gt7  > 0 ? "style=\"--summary-accent:var(--color-warning-fg)\"" : ""],
        ["Waiting > 14 days",      gt14,          gt14 > 0 ? "style=\"--summary-accent:var(--color-danger-fg)\""  : ""],
        ["Fellowships – no class", uncoveredCount, uncoveredCount > 0 ? "style=\"--summary-accent:var(--color-danger-fg)\"" : ""],
      ].map(([lbl, val]) => `<article class="summary-card">
        <div class="summary-label">${esc(String(lbl))}</div>
        <div class="summary-value">${val}</div>
      </article>`).join("");
    }

    // ── Students table (Tab 1) ────────────────────────────────────────────────
    function getVisibleStudents() {
      const batchF  = state.activeBatch;
      const search  = $("searchInput").value.trim().toLowerCase();
      const statusF = $("statusFilter").value;
      const fellowF = $("fellowshipFilter").value;

      return state.students.filter((s) => {
        if (batchF  && s.batch_id       !== batchF)  return false;
        if (fellowF && String(s.fellowship_code || "").toUpperCase() !== fellowF) return false;
        if (statusF === "NO_MATCHING_TIME" && s.availability_status !== "NO_MATCHING_TIME") return false;
        if (statusF === "WAITLISTED"       && s.registration_status !== "WAITLISTED")       return false;
        if (search) {
          const hay = `${s.full_name || ""} ${s.email || ""}`.toLowerCase();
          if (!hay.includes(search)) return false;
        }
        return true;
      });
    }

    function renderStudentsTable() {
      const rows  = getVisibleStudents();
      const tbody = $("studentsTableBody");
      $("rowCount").textContent = `${rows.length} student${rows.length !== 1 ? "s" : ""}`;

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="msg">No waiting students match the current filters.</div></td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map((s) => {
        const sinceDate = s.waitlisted_at || s.created_at;
        const days = daysSince(sinceDate) ?? 0;
        const daysCls = days > 14 ? "days-crit" : days > 7 ? "days-warn" : "days-ok";
        const reasonPill = s.availability_status === "NO_MATCHING_TIME"
          ? `<span class="pill pill-amber">No Suitable Time</span>`
          : s.availability_status === "CLASS_FULL"
            ? `<span class="pill pill-red">Class Full</span>`
            : `<span class="pill pill-grey">${esc(s.availability_status || s.registration_status || "—")}</span>`;

        return `<tr>
          <td>
            <div style="font-weight:600;font-size:13px">${esc(s.full_name || "—")}</div>
            <div style="font-size:11px;color:var(--color-text-muted)">${esc(s.email || "")}</div>
          </td>
          <td style="font-size:12px">${esc(s.fellowship_code || "—")}</td>
          <td style="font-size:12px;max-width:180px;white-space:pre-wrap;word-break:break-word">${esc(s.availability || "—")}</td>
          <td>${reasonPill}</td>
          <td style="font-size:12px;white-space:nowrap">${fmt(sinceDate)}</td>
          <td style="font-size:12px;white-space:nowrap"><span class="${daysCls}">${days}d</span></td>
          <td>
            <div style="display:flex;gap:4px;flex-wrap:wrap">
              <button class="fs-btn fs-btn-primary" style="font-size:12px;padding:3px 10px" data-assign="${esc(s.id)}">Assign to Class</button>
              <button class="fs-btn" style="font-size:12px;padding:3px 10px;color:var(--color-danger-fg)" data-remove="${esc(s.id)}">Remove</button>
            </div>
          </td>
        </tr>`;
      }).join("");
    }

    // ── Capacity table (Tab 2) ────────────────────────────────────────────────
    function renderCapTable() {
      const batchF = state.activeBatch;
      const slots  = state.slots.filter((s) => !batchF || s.batch_id === batchF);
      const tbody  = $("capTableBody");

      if (!slots.length) {
        tbody.innerHTML = `<tr><td colspan="9"><div class="msg">No active class slots found.</div></td></tr>`;
        return;
      }

      tbody.innerHTML = slots.map((slot) => {
        const co  = state.classOptions[slot.class_option_id] || {};
        const bat = state.batches.find((b) => b.batch_id === slot.batch_id);
        const pct = slot.max_capacity ? Math.round((slot.current_enrolment / slot.max_capacity) * 100) : 0;
        const fillCls = pct >= 90 ? "fill-red" : pct >= 75 ? "fill-amber" : "fill-green";
        const fillHtml = slot.max_capacity
          ? `<div class="fill-bar-wrap"><div class="fill-bar ${fillCls}" style="width:${Math.min(100,pct)}%"></div></div> <span style="font-size:11px;color:var(--color-text-muted)">${pct}%</span>`
          : `<span style="font-size:11px;color:var(--color-text-muted)">—</span>`;

        return `<tr id="caprow-${esc(slot.class_slot_id)}">
          <td style="font-size:12px;font-family:monospace">${esc(slot.class_option_id)}</td>
          <td style="font-size:12px">${esc(co.teacher_name || "—")}</td>
          <td style="font-size:12px;white-space:nowrap">${esc([(co.day||""),(co.class_time||"")].filter(Boolean).join(" · ") || "—")}</td>
          <td style="font-size:12px">${esc(bat?.batch_name || slot.batch_id)}</td>
          <td style="font-size:12px">${slot.current_enrolment} / ${slot.max_capacity ?? "∞"}</td>
          <td>${fillHtml}</td>
          <td><input class="cap-input" id="newcap-${esc(slot.class_slot_id)}" type="number" min="0" value="${slot.max_capacity ?? ""}" placeholder="∞" /></td>
          <td><select class="status-select" id="slotstat-${esc(slot.class_slot_id)}">
            <option value="Active"${slot.status==="Active"?" selected":""}>Active</option>
            <option value="Closed"${slot.status==="Closed"?" selected":""}>Closed</option>
            <option value="Cancelled"${slot.status==="Cancelled"?" selected":""}>Cancelled</option>
          </select></td>
          <td><button class="fs-btn" style="font-size:12px;padding:3px 10px" data-save-cap="${esc(slot.class_slot_id)}" data-co="${esc(slot.class_option_id)}" data-batch="${esc(slot.batch_id)}" data-old="${slot.max_capacity ?? ""}">Save</button></td>
        </tr>`;
      }).join("");
    }

    // ── Data loading ──────────────────────────────────────────────────────────
    async function loadData() {
      showFlash("Loading…");
      const [studentsRes, slotsRes, batchesRes] = await Promise.all([
        supabase.from("applicants")
          .select("id,full_name,email,fellowship_code,batch_id,availability,availability_status,registration_status,waitlisted_at,created_at,class_option_id")
          .or("availability_status.eq.NO_MATCHING_TIME,registration_status.eq.WAITLISTED")
          .not("availability_status", "eq", "NO_CLASS_AVAILABLE")
          .order("created_at", { ascending: true })
          .limit(500),
        supabase.from("class_slots")
          .select("class_slot_id,class_option_id,batch_id,status,current_enrolment,max_capacity")
          .order("class_option_id"),
        supabase.from("batches")
          .select("batch_id,batch_name")
          .order("created_at", { ascending: false })
          .limit(50),
      ]);

      state.students = studentsRes.data || [];
      state.slots    = slotsRes.data  || [];
      state.batches  = batchesRes.data || [];

      // Load class options (active ones for assign modal, all referenced ones for cap table)
      const slotCoIds = [...new Set(state.slots.map((s) => s.class_option_id).filter(Boolean))];
      const { data: cos } = await supabase.from("class_options")
        .select("class_option_id,teacher_name,day,class_time,fellowship_codes,active,enrollment_open")
        .or(`active.eq.true,class_option_id.in.(${slotCoIds.length ? slotCoIds.map((id) => `"${id}"`).join(",") : '""'})`);
      state.classOptions = {};
      (cos || []).forEach((c) => { state.classOptions[c.class_option_id] = c; });

      // Populate batch filter
      const curBatch = $("batchFilter").value;
      $("batchFilter").innerHTML = '<option value="">All Batches</option>' +
        state.batches.map((b) => `<option value="${esc(b.batch_id)}">${esc(b.batch_name || b.batch_id)}</option>`).join("");
      if (curBatch) $("batchFilter").value = curBatch;
      state.activeBatch = $("batchFilter").value;

      // Populate fellowship filter
      const fellowSet = new Set(state.students.map((s) => String(s.fellowship_code || "").toUpperCase()).filter(Boolean));
      state.fellowships = [...fellowSet].sort();
      const curFellow = $("fellowshipFilter").value;
      $("fellowshipFilter").innerHTML = '<option value="">All Fellowships</option>' +
        state.fellowships.map((f) => `<option value="${esc(f)}">${esc(f)}</option>`).join("");
      if (curFellow) $("fellowshipFilter").value = curFellow;

      showFlash("");
      computeSummary();
      renderStudentsTable();
      renderCapTable();
    }

    // ── Assign modal ──────────────────────────────────────────────────────────
    function openAssignModal(studentId) {
      const s = state.students.find((x) => x.id === studentId);
      if (!s) return;
      state.assignTarget = s;

      $("assignMeta").innerHTML = `
        <strong>${esc(s.full_name || s.email)}</strong><br>
        ${esc(s.email || "")} &nbsp;·&nbsp; ${esc(s.fellowship_code || "—")}<br>
        <span style="margin-top:4px;display:inline-block">Availability: <em>${esc(s.availability || "not specified")}</em></span>`;
      $("assignModalMsg").innerHTML = "";

      // Build class option list — prefer same fellowship, all active+open options
      const fc = String(s.fellowship_code || "").toUpperCase();
      const options = Object.values(state.classOptions)
        .filter((c) => c.active && c.enrollment_open)
        .sort((a, b) => {
          const aMatch = (a.fellowship_codes || []).map((v) => String(v||"").toUpperCase()).includes(fc);
          const bMatch = (b.fellowship_codes || []).map((v) => String(v||"").toUpperCase()).includes(fc);
          if (aMatch && !bMatch) return -1;
          if (!aMatch && bMatch) return 1;
          return (a.teacher_name || "").localeCompare(b.teacher_name || "");
        });

      $("assignClassSelect").innerHTML = options.length
        ? options.map((c) => {
            const match = (c.fellowship_codes || []).map((v) => String(v||"").toUpperCase()).includes(fc);
            const label = [c.teacher_name, c.day, c.class_time].filter(Boolean).join(" – ") || c.class_option_id;
            return `<option value="${esc(c.class_option_id)}">${esc(label)}${match ? " ✓" : ""}</option>`;
          }).join("")
        : `<option value="">No active class options available</option>`;

      $("assignConfirmBtn").disabled = !options.length;
      $("assignModal").classList.add("open");
    }

    async function submitAssign() {
      const s = state.assignTarget;
      const classOptionId = $("assignClassSelect").value;
      if (!s || !classOptionId) return;
      if (!ADMIN_API) { $("assignModalMsg").innerHTML = '<div class="msg error">Admin API not configured.</div>'; return; }

      $("assignConfirmBtn").disabled = true;
      $("assignModalMsg").innerHTML = '<div class="msg">Assigning…</div>';

      try {
        const res = await fetch(ADMIN_API, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${ANON_KEY}`, "apikey": ANON_KEY },
          body: JSON.stringify({ action: "assign-applicant-admin", applicant_id: s.id, class_option_id: classOptionId }),
        });
        const data = await res.json().catch(() => null);
        if (!res.ok || !data?.ok) throw new Error(data?.error || `HTTP ${res.status}`);

        $("assignModal").classList.remove("open");
        state.assignTarget = null;
        showFlash(`${s.full_name || s.email} assigned to class successfully.`, "success");
        await loadData();
      } catch (err) {
        $("assignModalMsg").innerHTML = `<div class="msg error">Assignment failed: ${esc(err?.message || String(err))}</div>`;
        $("assignConfirmBtn").disabled = false;
      }
    }

    // ── Event wiring ──────────────────────────────────────────────────────────
    function bindEvents() {
      $("refreshBtn").addEventListener("click", loadData);

      $("batchFilter").addEventListener("change", () => {
        state.activeBatch = $("batchFilter").value;
        computeSummary();
        renderStudentsTable();
        renderCapTable();
      });

      $("tabBar").addEventListener("click", (e) => {
        const btn = e.target.closest("[data-tab]");
        if (!btn) return;
        state.activeTab = btn.dataset.tab;
        $("tabBar").querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t === btn));
        $("tab-students").style.display = state.activeTab === "students" ? "" : "none";
        $("tab-capacity").style.display = state.activeTab === "capacity" ? "" : "none";
      });

      for (const id of ["searchInput", "statusFilter", "fellowshipFilter"]) {
        $(id).addEventListener(id === "searchInput" ? "input" : "change", renderStudentsTable);
      }

      $("runCheckBtn").addEventListener("click", async () => {
        if (!WAITLIST_FN) { showFlash("Waitlist processor not configured.", "error"); return; }
        $("runCheckBtn").disabled = true;
        showFlash("Running class availability check…");
        try {
          const res = await fetch(WAITLIST_FN, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${ANON_KEY}` },
            body: JSON.stringify({}),
          });
          const data = await res.json().catch(() => null);
          if (data?.ok) {
            showFlash(`Done — ${data.notified ?? 0} student(s) notified of available classes.`, "success");
            await loadData();
          } else {
            showFlash(`Check failed: ${data?.error || "unknown error"}`, "error");
          }
        } catch (err) {
          showFlash(`Error: ${err?.message || err}`, "error");
        } finally {
          $("runCheckBtn").disabled = false;
        }
      });

      // Students table actions
      $("studentsTableBody").addEventListener("click", async (e) => {
        const assignBtn = e.target.closest("[data-assign]");
        if (assignBtn) { openAssignModal(assignBtn.dataset.assign); return; }

        const removeBtn = e.target.closest("[data-remove]");
        if (removeBtn) {
          const s = state.students.find((x) => x.id === removeBtn.dataset.remove);
          if (!s) return;
          if (!confirm(`Remove ${s.full_name || s.email} from the waiting list? Their status will be set to INACTIVE.`)) return;
          removeBtn.disabled = true;
          const { error } = await supabase.from("applicants")
            .update({ registration_status: "INACTIVE", updated_at: new Date().toISOString() })
            .eq("id", s.id);
          if (error) { showFlash(`Remove failed: ${error.message}`, "error"); removeBtn.disabled = false; return; }
          showFlash(`${s.full_name || s.email} removed from waiting list.`, "success");
          await loadData();
        }
      });

      // Assign modal
      $("assignCancelBtn").addEventListener("click", () => {
        $("assignModal").classList.remove("open");
        state.assignTarget = null;
      });
      $("assignModal").addEventListener("click", (e) => {
        if (e.target === $("assignModal")) { $("assignModal").classList.remove("open"); state.assignTarget = null; }
      });
      $("assignConfirmBtn").addEventListener("click", submitAssign);

      // Capacity table save
      $("capTableBody").addEventListener("click", async (e) => {
        const saveBtn = e.target.closest("[data-save-cap]");
        if (!saveBtn) return;
        const slotId    = saveBtn.dataset.saveCap;
        const coId      = saveBtn.dataset.co;
        const batchId   = saveBtn.dataset.batch;
        const oldCap    = saveBtn.dataset.old ? parseInt(saveBtn.dataset.old) : null;
        const newCapEl  = document.getElementById(`newcap-${slotId}`);
        const statusEl  = document.getElementById(`slotstat-${slotId}`);
        const newCap    = newCapEl?.value ? parseInt(newCapEl.value) : null;
        const newStatus = statusEl?.value || "Active";

        if (newStatus === "Cancelled") {
          const { count } = await supabase.from("applicants")
            .select("id", { count: "exact", head: true })
            .eq("class_option_id", coId).eq("batch_id", batchId).eq("registration_status", "ASSIGNED");
          if (!confirm(`Cancel this slot? ${count || 0} enrolled student(s) will need to be notified separately.`)) return;
        }

        const { error } = await supabase.from("class_slots")
          .update({ max_capacity: newCap, status: newStatus }).eq("class_slot_id", slotId);
        if (error) { showFlash(`Save failed: ${error.message}`, "error"); return; }

        await supabase.from("audit_logs").insert({
          actor_email: state.profile?.email || null,
          action: "SLOT_CAPACITY_UPDATED", entity_type: "class_slot", entity_id: slotId,
          status: "SUCCESS", details: { old_capacity: oldCap, new_capacity: newCap, class_option_id: coId, batch_id: batchId, new_status: newStatus },
          created_at: new Date().toISOString(),
        });

        showFlash("Slot saved.", "success");
        await loadData();
      });
    }

    async function boot() {
      if (!window.FS_CONFIG?.SUPABASE_URL) {
        window.FSAdminShell?.mount({ active: "waitlist", pageTitle: "Waiting Students", profileName: "Not connected" });
        showFlash("Not connected — open via live server with config.js", "error");
        return;
      }
      const auth = await requireAuth(["admin", "superadmin", "regional_secretary"]);
      if (!auth) return;
      state.profile = auth.profile;

      window.FSAdminShell?.mount({ active: "waitlist", pageTitle: "Waiting Students", role: auth.profile?.role });

      bindEvents();
      await loadData();
    }

    boot().catch((e) => showFlash(`Boot failed: ${e?.message || e}`, "error"));
  </script>
</body>
</html>
