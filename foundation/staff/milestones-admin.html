<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundation School - Milestones Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../ui/premium-theme.css" />
  <style>
    :root { --line: color-mix(in srgb, var(--border) 90%, transparent); }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); }
    .shell { display: grid; grid-template-columns: 260px minmax(0, 1fr); min-height: 100vh; }
    .side { border-right: 1px solid var(--line); background: color-mix(in srgb, var(--surface) 92%, transparent); padding: 14px; position: sticky; top: 0; height: 100vh; overflow: auto; }
    .main { padding: 14px; }
    .top {
      position: sticky; top: 8px; z-index: 20;
      border: 1px solid var(--line); border-radius: 16px; padding: 12px;
      backdrop-filter: blur(10px); background: color-mix(in srgb, var(--surface) 84%, transparent);
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .top h1 { margin: 0; font-size: 24px; }
    .top p { margin: 4px 0 0; font-size: 12px; color: var(--muted); }
    .icon-btn, .btn, select, input {
      border: 1px solid var(--line); border-radius: 12px; background: var(--surface-2); color: var(--text); font: inherit;
    }
    .icon-btn { width: 42px; height: 42px; cursor: pointer; font-size: 18px; }
    .btn { padding: 10px 14px; cursor: pointer; font-weight: 700; }
    .btn.primary { background: var(--primary); color: #fff; border-color: color-mix(in srgb, var(--primary) 80%, black); }
    .card { margin-top: 10px; background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 12px; box-shadow: var(--shadow-soft); }
    .filters { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
    label { display: block; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; color: var(--muted); font-weight: 700; letter-spacing: .05em; }
    input, select { width: 100%; padding: 10px; }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; min-width: 1100px; }
    th, td { padding: 9px 8px; border-bottom: 1px solid var(--line); text-align: left; font-size: 12px; }
    th { background: var(--surface-2); color: var(--muted); font-size: 11px; text-transform: uppercase; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      border-radius: 999px; border: 1px solid var(--line); background: color-mix(in srgb, var(--soft-lavender) 70%, var(--surface));
      color: var(--primary); font-size: 11px; font-weight: 700; padding: 5px 9px; cursor: pointer;
    }
    .chip.on { background: var(--primary); color: #fff; border-color: var(--primary); }
    .pill { border-radius: 999px; font-size: 11px; font-weight: 700; padding: 4px 9px; border: 1px solid var(--line); }
    .ok { color: #166534; background: color-mix(in srgb, #22c55e 12%, var(--surface)); border-color: color-mix(in srgb, #22c55e 34%, var(--surface)); }
    .warn { color: #b45309; background: color-mix(in srgb, #f59e0b 14%, var(--surface)); border-color: color-mix(in srgb, #f59e0b 35%, var(--surface)); }
    .timeline { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
    .event { display: flex; justify-content: space-between; gap: 8px; padding: 9px; border-bottom: 1px solid var(--line); font-size: 12px; }
    .event:last-child { border-bottom: 0; }
    .muted { color: var(--muted); }
    .msg { margin-top: 8px; border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; font-size: 12px; }
    .bad { color: #b42318; background: color-mix(in srgb, #ef4444 13%, var(--surface)); border-color: color-mix(in srgb, #ef4444 34%, var(--surface)); }
    .good { color: #166534; background: color-mix(in srgb, #22c55e 12%, var(--surface)); border-color: color-mix(in srgb, #22c55e 34%, var(--surface)); }
    @media (max-width: 1080px) {
      .shell { grid-template-columns: 1fr; }
      .side { position: relative; height: auto; }
      .filters { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side">
      <h3 style="margin:0">Foundation School</h3>
      <p class="muted" style="font-size:12px;margin-top:4px">Milestones Admin</p>
      <div id="roleSidebar" style="margin-top:10px;display:grid;gap:8px"></div>
    </aside>
    <main class="main">
      <section class="top">
        <div>
          <h1>Milestones Admin</h1>
          <p>Edit milestones anytime across the student journey</p>
        </div>
        <div style="display:flex;gap:8px">
          <button id="themeBtn" class="icon-btn">🌙</button>
          <button id="logoutBtn" class="btn">Logout</button>
        </div>
      </section>
      <section id="flash"></section>

      <section class="card">
        <div class="filters">
          <div><label>Search</label><input id="searchInput" placeholder="Name / email" /></div>
          <div><label>Fellowship</label><select id="fellowshipFilter"><option value="">All</option></select></div>
          <div><label>Class</label><select id="classFilter"><option value="">All</option></select></div>
          <div><label>Milestone</label><select id="milestoneFilter"><option value="">All</option></select></div>
          <div><label>Status</label><select id="statusFilter"><option value="">All</option><option value="completed">Completed</option><option value="pending">Pending</option></select></div>
        </div>
      </section>

      <section class="card">
        <div style="display:flex;justify-content:space-between;gap:8px;align-items:center">
          <strong>Students</strong>
          <span id="rowMeta" class="muted" style="font-size:12px"></span>
        </div>
        <div class="table-wrap" style="margin-top:8px">
          <table>
            <thead>
              <tr>
                <th>Student</th><th>Fellowship</th><th>Class</th><th>Status</th><th>Milestones</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <strong>Student Milestone Timeline</strong>
        <div id="timeline" class="timeline" style="margin-top:8px"></div>
      </section>
    </main>
  </div>

<script src="../js/config.js"></script>
<script type="module">
import { CONFIG, supabase } from "../auth/auth-client.js";
import { requireAuth } from "../auth/auth-guards.js";
import { logout } from "../auth/logout.js";
import { renderRoleSidebar } from "../auth/role-sidebar.js";

const MILESTONES = [
  "Born Again",
  "Filled with the Spirit",
  "Partnership",
  "Joined Cell",
  "Serving Team Interest",
  "Needs Follow-up",
  "Foundation Completed"
];
const $ = (id) => document.getElementById(id);
const esc = (v) => String(v ?? "").replace(/[&<>'"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;" }[c]));
const fmt = (v) => v ? new Date(v).toLocaleString() : "-";
const state = {
  auth: null,
  applicants: [],
  classOptions: [],
  milestones: [],
  milestoneDefs: [],
  audits: [],
  filters: { search: "", fellowship: "", classOption: "", milestone: "", status: "" },
  selectedApplicantId: null
};

function setTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("fs_theme", theme);
  $("themeBtn").textContent = theme === "dark" ? "☀️" : "🌙";
}
function flash(msg, cls = "good") { $("flash").innerHTML = msg ? `<div class="msg ${cls}">${esc(msg)}</div>` : ""; }

function milestoneIdByName(name) {
  const row = state.milestoneDefs.find((m) => String(m.name || m.question || "").toLowerCase() === String(name).toLowerCase());
  return row?.id || row?.milestone_id || name;
}
function milestonesForApplicant(id) {
  return state.milestones.filter((m) => String(m.applicant_id || m.student_id || "") === String(id));
}
function isCompleted(ms) { return ms.completed === true || ms.status === "completed" || String(ms.value || "").toLowerCase() === "yes"; }
function completedMilestones(id) {
  const list = milestonesForApplicant(id);
  return new Set(list.filter(isCompleted).map((m) => String(m.milestone_name || m.name || m.milestone_id || "")));
}

function buildFilterOptions() {
  const setOpts = (id, vals) => {
    const first = $(id).querySelector("option").outerHTML;
    $(id).innerHTML = first + [...new Set(vals.filter(Boolean))].sort().map((v) => `<option value="${esc(v)}">${esc(v)}</option>`).join("");
  };
  setOpts("fellowshipFilter", state.applicants.map((a) => a.fellowship_code || a.fellowship || a.subgroup_id));
  setOpts("classFilter", state.applicants.map((a) => a.class_option_id));
  setOpts("milestoneFilter", MILESTONES);
}

function filteredApplicants() {
  return state.applicants.filter((a) => {
    const text = `${a.full_name || ""} ${a.email || ""}`.toLowerCase();
    const done = completedMilestones(a.id);
    if (state.filters.search && !text.includes(state.filters.search.toLowerCase())) return false;
    if (state.filters.fellowship && String(a.fellowship_code || a.fellowship || a.subgroup_id || "") !== state.filters.fellowship) return false;
    if (state.filters.classOption && String(a.class_option_id || "") !== state.filters.classOption) return false;
    if (state.filters.milestone && !done.has(state.filters.milestone) && !done.has(milestoneIdByName(state.filters.milestone))) return false;
    if (state.filters.status === "completed" && !done.size) return false;
    if (state.filters.status === "pending" && done.size === MILESTONES.length) return false;
    return true;
  });
}

function renderRows() {
  const rows = filteredApplicants();
  $("rowMeta").textContent = `${rows.length} of ${state.applicants.length} students`;
  $("rows").innerHTML = rows.map((a) => {
    const done = completedMilestones(a.id);
    const chips = MILESTONES.map((m) => {
      const on = done.has(m) || done.has(milestoneIdByName(m));
      return `<button class="chip ${on ? "on" : ""}" data-app="${esc(a.id)}" data-m="${esc(m)}">${esc(m)}</button>`;
    }).join("");
    return `<tr>
      <td><strong>${esc(a.full_name || "-")}</strong><div class="muted">${esc(a.email || "-")}</div></td>
      <td>${esc(a.fellowship_code || a.fellowship || a.subgroup_id || "-")}</td>
      <td>${esc(a.class_option_id || "-")}</td>
      <td><span class="pill ${done.size ? "ok" : "warn"}">${done.size ? "Active Progress" : "No Milestones Yet"}</span></td>
      <td><div class="chips">${chips}</div></td>
      <td><button class="btn" data-open="${esc(a.id)}">Open Timeline</button></td>
    </tr>`;
  }).join("") || `<tr><td colspan="6" class="muted">No students match the selected filters.</td></tr>`;

  document.querySelectorAll("[data-m]").forEach((btn) => {
    btn.addEventListener("click", () => toggleMilestone(btn.dataset.app, btn.dataset.m));
  });
  document.querySelectorAll("[data-open]").forEach((btn) => {
    btn.addEventListener("click", () => openTimeline(btn.dataset.open));
  });
}

async function toggleMilestone(applicantId, milestoneName) {
  const now = new Date().toISOString();
  const id = milestoneIdByName(milestoneName);
  const existing = state.milestones.find((m) => String(m.applicant_id || m.student_id || "") === String(applicantId) && String(m.milestone_id || m.milestone_name || m.name || "") === String(id));
  const nextCompleted = !(existing && isCompleted(existing));
  const payload = {
    applicant_id: applicantId,
    student_id: applicantId,
    milestone_id: id,
    milestone_name: milestoneName,
    status: nextCompleted ? "completed" : "pending",
    completed: nextCompleted,
    updated_at: now,
    updated_by: state.auth.profile.email
  };
  const { error } = await supabase.from("student_milestones").upsert(payload, { onConflict: "applicant_id,milestone_id" });
  if (error) { flash(`Milestone update failed: ${error.message}`, "bad"); return; }

  await supabase.from("audit_logs").insert({
    action: "MILESTONE_UPDATED",
    entity_type: "student_milestones",
    entity_id: `${applicantId}:${id}`,
    actor_email: state.auth.profile.email,
    status: "SUCCESS",
    details: { applicant_id: applicantId, milestone_id: id, milestone_name: milestoneName, completed: nextCompleted },
    created_at: now
  });

  await loadData();
  openTimeline(applicantId);
  flash("Milestone updated.");
}

function openTimeline(applicantId) {
  state.selectedApplicantId = applicantId;
  const app = state.applicants.find((a) => String(a.id) === String(applicantId));
  const ms = milestonesForApplicant(applicantId).sort((a,b) => new Date(b.updated_at || b.created_at || 0) - new Date(a.updated_at || a.created_at || 0));
  const aud = state.audits
    .filter((a) => String(a.details?.applicant_id || a.entity_id || "").includes(String(applicantId)))
    .slice(0, 30);
  const merged = [
    ...ms.map((m) => ({
      label: `Milestone: ${m.milestone_name || m.name || m.milestone_id}`,
      state: isCompleted(m) ? "Completed" : "Pending",
      at: m.updated_at || m.created_at
    })),
    ...aud.map((a) => ({
      label: a.action || "ADMIN_ACTION",
      state: a.status || "SUCCESS",
      at: a.created_at
    }))
  ].sort((a,b) => new Date(b.at || 0) - new Date(a.at || 0));
  $("timeline").innerHTML = `<div class="event"><strong>${esc(app?.full_name || "Student")}</strong><span class="muted">${esc(app?.email || "-")}</span></div>` +
    (merged.map((e) => `<div class="event"><span>${esc(e.label)} · ${esc(e.state)}</span><span class="muted">${esc(fmt(e.at))}</span></div>`).join("") || `<div class="event"><span class="muted">No milestone or audit history found yet.</span></div>`);
}

async function loadData() {
  const [apps, classes, defs, miles, audits] = await Promise.all([
    supabase.from("applicants").select("*").limit(6000),
    supabase.from("class_options").select("*").limit(2000),
    supabase.from("milestone_definitions").select("*").limit(300),
    supabase.from("student_milestones").select("*").limit(30000),
    supabase.from("audit_logs").select("*").order("created_at", { ascending: false }).limit(8000)
  ]);
  if (apps.error || classes.error || miles.error) throw new Error(apps.error?.message || classes.error?.message || miles.error?.message);
  state.applicants = apps.data || [];
  state.classOptions = classes.data || [];
  state.milestoneDefs = defs.data || [];
  state.milestones = miles.data || [];
  state.audits = audits.data || [];
  buildFilterOptions();
  renderRows();
  if (state.selectedApplicantId) openTimeline(state.selectedApplicantId);
}

function wire() {
  $("themeBtn").addEventListener("click", () => {
    const current = document.documentElement.getAttribute("data-theme") || "light";
    setTheme(current === "dark" ? "light" : "dark");
  });
  $("logoutBtn").addEventListener("click", logout);
  $("searchInput").addEventListener("input", (e) => { state.filters.search = e.target.value || ""; renderRows(); });
  $("fellowshipFilter").addEventListener("change", (e) => { state.filters.fellowship = e.target.value || ""; renderRows(); });
  $("classFilter").addEventListener("change", (e) => { state.filters.classOption = e.target.value || ""; renderRows(); });
  $("milestoneFilter").addEventListener("change", (e) => { state.filters.milestone = e.target.value || ""; renderRows(); });
  $("statusFilter").addEventListener("change", (e) => { state.filters.status = e.target.value || ""; renderRows(); });
}

async function boot() {
  setTheme(localStorage.getItem("fs_theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
  if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_ANON_KEY || CONFIG.SUPABASE_URL.includes("YOUR-PROJECT-REF")) {
    flash("Supabase config missing in foundation/auth/auth-client.js.", "bad");
    return;
  }
  const auth = await requireAuth(["admin", "superadmin", "principal"]);
  if (!auth) return;
  state.auth = auth;
  renderRoleSidebar(auth.profile, "roleSidebar");
  wire();
  await loadData();
}

boot().catch((e) => flash(`Failed to load milestones admin: ${e.message || e}`, "bad"));
</script>
</body>
</html>
