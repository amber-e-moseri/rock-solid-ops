<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirecting to Applicants</title>
  <meta http-equiv="refresh" content="0;url=applicant-directory.html?tab=review" />
  <script>
    (function () {
      const target = new URL('applicant-directory.html', window.location.href);
      target.searchParams.set('tab', 'review');
      window.location.replace(target.toString());
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="applicant-directory.html?tab=review">Applicants - Review Queue</a>...</p>
</body>
</html>
