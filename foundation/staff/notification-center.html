<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundation School - Notification Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;700;800;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            fsPurple: '#4C2A92',
            fsGold:   '#F4BE41',
            fsCream:  '#F4EFE3',
            fsInk:    '#1E1630',
            fsMuted:  '#7A6E90',
            fsDanger: '#B42318',
            fsSuccess:'#157347',
            fsLilac:  '#F3ECFB'
          },
          fontFamily: {
            heading: ['League Spartan','sans-serif'],
            body:    ['Nunito','sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    .skeleton {
      background: linear-gradient(90deg,rgba(76,42,146,.08) 25%,rgba(76,42,146,.18) 40%,rgba(76,42,146,.08) 60%);
      background-size: 200% 100%;
      animation: sh 1.2s linear infinite;
    }
    @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .table-wrap { overflow-x: auto; }
    th { white-space: nowrap; }
  </style>
  <link rel="stylesheet" href="../ui/premium-theme.css" />
</head>
<body class="bg-fsCream text-fsInk font-body min-h-screen">

  <!-- HEADER -->
  <header class="sticky top-0 z-10 bg-white/90 backdrop-blur border-b border-fsPurple/10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-fsGold text-fsPurple font-heading font-black grid place-items-center text-lg">FS</div>
        <div>
          <h1 class="font-heading text-2xl text-fsPurple leading-none">Foundation School</h1>
          <p class="text-xs text-fsMuted">Notification Center</p>
        </div>
      </div>
      <div class="flex items-center gap-2 flex-wrap justify-end">
        <span id="whoami" class="text-xs text-fsMuted"></span>
        <button id="refreshBtn" class="px-4 py-2 rounded-lg bg-fsPurple text-white text-sm font-bold hover:opacity-90 transition-opacity">Refresh</button>
        <button id="logoutBtn"  class="px-4 py-2 rounded-lg bg-fsLilac text-fsPurple text-sm font-bold hover:opacity-90 transition-opacity">Logout</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-6">

    <!-- ROLE NAV -->
    <section class="bg-white rounded-2xl border border-fsPurple/10 p-4">
      <h2 class="font-heading text-xl text-fsPurple mb-3">Role Navigation</h2>
      <div id="roleSidebar" class="flex flex-wrap gap-2"></div>
    </section>

    <!-- ERROR DIAGNOSTICS -->
    <section id="diagPanel" class="hidden bg-red-50 border border-red-200 rounded-2xl p-4">
      <h2 class="font-heading text-lg text-red-700 mb-2">Error</h2>
      <div id="diagBody" class="text-sm text-red-700"></div>
    </section>

    <!-- OVERVIEW STAT CARDS -->
    <section id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-3"></section>

    <!-- FILTERS -->
    <section class="bg-white rounded-2xl border border-fsPurple/10 p-4">
      <h2 class="font-heading text-xl text-fsPurple mb-3">Filters</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
        <input
          id="searchInput"
          type="text"
          placeholder="Search recipient email..."
          class="px-3 py-2 rounded-lg border border-fsPurple/20 text-sm focus:outline-none focus:ring-2 focus:ring-fsPurple/30"
        />
        <select id="statusFilter" class="px-3 py-2 rounded-lg border border-fsPurple/20 text-sm focus:outline-none focus:ring-2 focus:ring-fsPurple/30">
          <option value="">All Statuses</option>
          <option value="PENDING">Pending</option>
          <option value="SENT">Sent</option>
          <option value="FAILED">Failed</option>
        </select>
        <select id="templateFilter" class="px-3 py-2 rounded-lg border border-fsPurple/20 text-sm focus:outline-none focus:ring-2 focus:ring-fsPurple/30">
          <option value="">All Templates</option>
        </select>
        <input
          id="dateFilter"
          type="date"
          class="px-3 py-2 rounded-lg border border-fsPurple/20 text-sm focus:outline-none focus:ring-2 focus:ring-fsPurple/30"
        />
      </div>
    </section>

    <!-- MAIN NOTIFICATIONS TABLE -->
    <section class="bg-white rounded-2xl border border-fsPurple/10 p-4">
      <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h2 class="font-heading text-xl text-fsPurple">Scheduled Notifications</h2>
        <span id="rowCount" class="text-xs text-fsMuted"></span>
      </div>
      <div id="tableError"></div>
      <div id="tableWrap" class="table-wrap"></div>
      <div class="mt-4 flex items-center justify-between gap-2">
        <button id="prevBtn" class="px-4 py-2 rounded-lg bg-fsLilac text-fsPurple text-sm font-bold hover:opacity-90 disabled:opacity-40 transition-opacity" disabled>â† Prev</button>
        <span id="pageInfo" class="text-sm text-fsMuted"></span>
        <button id="nextBtn" class="px-4 py-2 rounded-lg bg-fsLilac text-fsPurple text-sm font-bold hover:opacity-90 disabled:opacity-40 transition-opacity" disabled>Next â†’</button>
      </div>
    </section>

    <!-- FAILED NOTIFICATIONS PANEL -->
    <section class="bg-white rounded-2xl border border-fsPurple/10 p-4">
      <div class="flex items-center gap-2 mb-3">
        <h2 class="font-heading text-xl text-fsPurple">Failed Notifications</h2>
        <span id="failedCount" class="px-2 py-0.5 rounded-full bg-red-100 text-red-700 text-xs font-bold"></span>
      </div>
      <div id="failedError"></div>
      <div id="failedWrap" class="table-wrap"></div>
    </section>

  </main>

  <!-- RETRY TOAST -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 hidden px-5 py-3 rounded-xl shadow-lg text-sm font-bold"></div>

<script type="module">
import { CONFIG, supabase } from "../auth/auth-client.js";
import { requireAuth }      from "../auth/auth-guards.js";
import { logout }           from "../auth/logout.js";
import { renderRoleSidebar } from "../auth/role-sidebar.js";

/* â”€â”€ Constants â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
const PAGE_SIZE = 20;

/* â”€â”€ State â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
const state = {
  notifications: [],
  templates: [],
  filters: { search: '', status: '', template: '', date: '' },
  page: 1,
  retrying: new Set(),
  errors: { notifications: null, templates: null }
};

/* â”€â”€ DOM helpers â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
const $   = id => document.getElementById(id);
const esc = v  => String(v ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const fmt = v  => v ? new Date(v).toLocaleString('en-ZA', { dateStyle: 'short', timeStyle: 'short' }) : 'â€”';
const ymd = v  => v ? new Date(v).toISOString().slice(0, 10) : '';

function badge(s) {
  const t = String(s || '').toUpperCase();
  const cls =
    t === 'FAILED'  ? 'bg-red-100 text-red-700'    :
    t === 'PENDING' ? 'bg-amber-100 text-amber-700' :
    t === 'SENT'    ? 'bg-green-100 text-green-700' :
                      'bg-fsLilac text-fsPurple';
  return `<span class="px-2 py-0.5 rounded-full text-xs font-bold ${cls}">${esc(s || 'â€”')}</span>`;
}

function sectionError(msg) {
  return `<div class="mb-3 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">${esc(msg)}</div>`;
}
function emptyState(msg) {
  return `<div class="py-10 text-center text-fsMuted text-sm">${esc(msg)}</div>`;
}
function skeletonRows(n = 6) {
  return `<div class="space-y-2">${Array.from({ length: n }).map(() =>
    '<div class="h-9 rounded-lg skeleton"></div>').join('')}</div>`;
}

function classifyError(err) {
  const raw = String(err?.message || err || 'Unknown error');
  if (!CONFIG.SUPABASE_ANON_KEY || CONFIG.SUPABASE_ANON_KEY.includes('YOUR_SUPABASE_ANON_KEY'))
    return 'Missing anon key â€” set CONFIG.SUPABASE_ANON_KEY in foundation/auth/auth-client.js.';
  if (!CONFIG.SUPABASE_URL || CONFIG.SUPABASE_URL.includes('YOUR-PROJECT-REF'))
    return 'Wrong Supabase URL â€” set CONFIG.SUPABASE_URL in foundation/auth/auth-client.js.';
  if (raw.includes('Failed to fetch'))
    return 'Network / CORS issue. Check browser network access and Supabase project URL.';
  if (raw.toLowerCase().includes('jwt') || raw.includes('42501') || raw.includes('row-level security'))
    return 'RLS / policy blocked this query. Verify select policies for admin role on scheduled_notifications.';
  return raw;
}

/* â”€â”€ Toast â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
let toastTimer;
function showToast(msg, ok = true) {
  const el = $('toast');
  el.textContent = msg;
  el.className = `fixed bottom-6 right-6 z-50 px-5 py-3 rounded-xl shadow-lg text-sm font-bold ${
    ok ? 'bg-fsSuccess text-white' : 'bg-fsDanger text-white'}`;
  el.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.add('hidden'), 3500);
}

/* â”€â”€ Data loading â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
async function loadNotifications() {
  state.errors.notifications = null;
  try {
    const { data, error } = await supabase
      .from('scheduled_notifications')
      .select('id,recipient_email,event_type,template_key,status,attempts,max_attempts,scheduled_for,sent_at,last_error,error_message,created_at')
      .order('created_at', { ascending: false })
      .limit(2000);
    if (error) throw error;
    state.notifications = data || [];
  } catch (e) {
    state.errors.notifications = classifyError(e);
    state.notifications = [];
  }
}

async function loadTemplates() {
  state.errors.templates = null;
  try {
    const { data, error } = await supabase
      .from('notification_templates')
      .select('template_key,subject,active')
      .order('template_key');
    if (error) throw error;
    state.templates = data || [];
  } catch (e) {
    state.errors.templates = classifyError(e);
    state.templates = [];
  }
}

/* â”€â”€ Filter logic â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
function filteredRows() {
  const { search, status, template, date } = state.filters;
  return state.notifications.filter(r => {
    if (search   && !String(r.recipient_email || '').toLowerCase().includes(search.toLowerCase())) return false;
    if (status   && r.status       !== status)   return false;
    if (template && r.template_key !== template) return false;
    if (date     && ymd(r.scheduled_for) !== date) return false;
    return true;
  });
}

/* â”€â”€ Stat cards â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
function renderStats() {
  const all = state.notifications;
  const byStatus     = s => all.filter(r => r.status === s).length;
  const totalAttempts = all.reduce((acc, r) => acc + (r.attempts || 0), 0);

  const cards = [
    { label: 'Pending',        value: byStatus('PENDING'), color: 'text-amber-600', bg: 'bg-amber-50',  border: 'border-amber-200' },
    { label: 'Sent',           value: byStatus('SENT'),    color: 'text-green-700', bg: 'bg-green-50',  border: 'border-green-200' },
    { label: 'Failed',         value: byStatus('FAILED'),  color: 'text-red-700',   bg: 'bg-red-50',    border: 'border-red-200'   },
    { label: 'Total Attempts', value: totalAttempts,       color: 'text-fsPurple',  bg: 'bg-white',     border: 'border-fsPurple/10' },
  ];

  $('statsGrid').innerHTML = cards.map(c => `
    <div class="${c.bg} rounded-2xl border ${c.border} p-5">
      <p class="text-xs font-bold uppercase tracking-wide text-fsMuted mb-1">${esc(c.label)}</p>
      <p class="font-heading text-4xl ${c.color}">${c.value.toLocaleString()}</p>
    </div>`).join('');
}

/* â”€â”€ Template dropdown â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
function hydrateTemplateFilter() {
  const keys = [...new Set(state.notifications.map(r => r.template_key).filter(Boolean))].sort();
  $('templateFilter').innerHTML =
    '<option value="">All Templates</option>' +
    keys.map(k => `<option value="${esc(k)}">${esc(k)}</option>`).join('');
}

/* â”€â”€ Main table â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
function renderTable() {
  $('tableError').innerHTML = state.errors.notifications ? sectionError(state.errors.notifications) : '';

  const rows       = filteredRows();
  const totalPages = Math.max(1, Math.ceil(rows.length / PAGE_SIZE));
  state.page       = Math.min(state.page, totalPages);

  const start    = (state.page - 1) * PAGE_SIZE;
  const pageRows = rows.slice(start, start + PAGE_SIZE);

  $('rowCount').textContent = `${rows.length.toLocaleString()} row${rows.length !== 1 ? 's' : ''}`;
  $('pageInfo').textContent = `Page ${state.page} of ${totalPages}`;
  $('prevBtn').disabled     = state.page <= 1;
  $('nextBtn').disabled     = state.page >= totalPages;

  if (!pageRows.length) {
    $('tableWrap').innerHTML = emptyState(
      state.errors.notifications
        ? 'Could not load notifications.'
        : 'No notifications match your filters.'
    );
    return;
  }

  $('tableWrap').innerHTML = `
    <table class="min-w-full text-sm">
      <thead class="bg-fsLilac text-fsPurple">
        <tr>
          <th class="px-3 py-2 text-left font-heading">Recipient</th>
          <th class="px-3 py-2 text-left font-heading">Template</th>
          <th class="px-3 py-2 text-left font-heading">Event Type</th>
          <th class="px-3 py-2 text-left font-heading">Status</th>
          <th class="px-3 py-2 text-left font-heading">Attempts</th>
          <th class="px-3 py-2 text-left font-heading">Scheduled For</th>
          <th class="px-3 py-2 text-left font-heading">Sent At</th>
          <th class="px-3 py-2 text-left font-heading">Last Error</th>
        </tr>
      </thead>
      <tbody>
        ${pageRows.map(r => `
        <tr class="border-t border-fsPurple/10 hover:bg-fsLilac/30 transition-colors ${r.status === 'FAILED' ? 'bg-red-50/40' : ''}">
          <td class="px-3 py-2 font-semibold max-w-[180px] truncate" title="${esc(r.recipient_email)}">${esc(r.recipient_email || 'â€”')}</td>
          <td class="px-3 py-2 text-fsMuted">${esc(r.template_key || 'â€”')}</td>
          <td class="px-3 py-2 text-fsMuted">${esc(r.event_type || 'â€”')}</td>
          <td class="px-3 py-2">${badge(r.status)}</td>
          <td class="px-3 py-2 text-center">${esc(r.attempts ?? 0)}&thinsp;/&thinsp;${esc(r.max_attempts ?? 3)}</td>
          <td class="px-3 py-2">${fmt(r.scheduled_for)}</td>
          <td class="px-3 py-2">${fmt(r.sent_at)}</td>
          <td class="px-3 py-2 text-red-700 text-xs max-w-[200px] truncate" title="${esc(r.last_error || r.error_message || '')}">${esc(r.last_error || r.error_message || 'â€”')}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

/* â”€â”€ Failed panel â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
function renderFailed() {
  $('failedError').innerHTML = state.errors.notifications ? sectionError(state.errors.notifications) : '';

  const failed = state.notifications.filter(r => r.status === 'FAILED');
  $('failedCount').textContent = failed.length || '';

  if (!failed.length) {
    $('failedWrap').innerHTML = emptyState('No failed notifications â€” all clear.');
    return;
  }

  $('failedWrap').innerHTML = `
    <table class="min-w-full text-sm">
      <thead class="bg-red-50 text-red-700">
        <tr>
          <th class="px-3 py-2 text-left font-heading">Recipient</th>
          <th class="px-3 py-2 text-left font-heading">Template</th>
          <th class="px-3 py-2 text-left font-heading">Attempts</th>
          <th class="px-3 py-2 text-left font-heading">Scheduled For</th>
          <th class="px-3 py-2 text-left font-heading">Error</th>
          <th class="px-3 py-2 text-left font-heading">Action</th>
        </tr>
      </thead>
      <tbody>
        ${failed.map(r => `
        <tr class="border-t border-red-100 hover:bg-red-50/60 transition-colors">
          <td class="px-3 py-2 font-semibold max-w-[160px] truncate" title="${esc(r.recipient_email)}">${esc(r.recipient_email || 'â€”')}</td>
          <td class="px-3 py-2 text-fsMuted">${esc(r.template_key || 'â€”')}</td>
          <td class="px-3 py-2 text-center">${esc(r.attempts ?? 0)}&thinsp;/&thinsp;${esc(r.max_attempts ?? 3)}</td>
          <td class="px-3 py-2">${fmt(r.scheduled_for)}</td>
          <td class="px-3 py-2 text-red-700 text-xs max-w-[200px] truncate" title="${esc(r.last_error || r.error_message || '')}">${esc(r.last_error || r.error_message || 'Unknown error')}</td>
          <td class="px-3 py-2">
            <button
              id="retry-${esc(r.id)}"
              onclick="window.__retryNotification('${esc(r.id)}')"
              class="px-3 py-1.5 rounded-lg bg-fsPurple text-white text-xs font-bold hover:opacity-80 disabled:opacity-40 transition-opacity"
            >Retry</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

/* â”€â”€ Retry â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
window.__retryNotification = async function(id) {
  if (state.retrying.has(id)) return;
  state.retrying.add(id);

  const btn = $(`retry-${id}`);
  if (btn) { btn.disabled = true; btn.textContent = 'â€¦'; }

  try {
    const { data: { session } } = await supabase.auth.getSession();
    const token = session?.access_token;

    const res = await fetch(`${CONFIG.SUPABASE_URL}/functions/v1/email-retry`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
        'apikey': CONFIG.SUPABASE_ANON_KEY
      },
      body: JSON.stringify({ id, source: 'scheduled_notifications' })
    });

    if (!res.ok) {
      const body = await res.text().catch(() => res.statusText);
      throw new Error(`HTTP ${res.status}: ${body}`);
    }

    showToast('Retry queued successfully.', true);
    await loadNotifications();
    renderAll();
  } catch (e) {
    showToast(`Retry failed: ${e.message}`, false);
    if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
  } finally {
    state.retrying.delete(id);
  }
};

/* â”€â”€ Render all â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
function renderAll() {
  renderStats();
  renderTable();
  renderFailed();
}

/* â”€â”€ Load all â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
async function loadAll() {
  $('tableWrap').innerHTML  = skeletonRows(8);
  $('failedWrap').innerHTML = skeletonRows(4);
  $('statsGrid').innerHTML  = '<div class="col-span-4 h-20 rounded-2xl skeleton"></div>';

  await Promise.allSettled([
    loadNotifications(),
    loadTemplates()
  ]);

  hydrateTemplateFilter();
  renderAll();
}

/* â”€â”€ Wire events â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
function wireEvents() {
  $('refreshBtn').addEventListener('click', loadAll);
  $('logoutBtn').addEventListener('click',  logout);

  $('searchInput').addEventListener('input', e => {
    state.filters.search = e.target.value;
    state.page = 1;
    renderTable();
  });
  $('statusFilter').addEventListener('change', e => {
    state.filters.status = e.target.value;
    state.page = 1;
    renderTable();
    renderFailed();
  });
  $('templateFilter').addEventListener('change', e => {
    state.filters.template = e.target.value;
    state.page = 1;
    renderTable();
  });
  $('dateFilter').addEventListener('change', e => {
    state.filters.date = e.target.value;
    state.page = 1;
    renderTable();
  });
  $('prevBtn').addEventListener('click', () => {
    if (state.page > 1) { state.page -= 1; renderTable(); }
  });
  $('nextBtn').addEventListener('click', () => {
    state.page += 1;
    renderTable();
  });
}

/* â”€â”€ Boot â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
(async function boot() {
  try {
    const auth = await requireAuth(['admin', 'superadmin']);
    if (!auth) return;

    $('whoami').textContent = `${auth.profile.email || ''} (${auth.profile.role || ''})`;
    renderRoleSidebar(auth.profile, 'roleSidebar');

    wireEvents();
    await loadAll();
  } catch (e) {
    $('diagPanel').classList.remove('hidden');
    $('diagBody').innerHTML = sectionError(classifyError(e));
  }
})();
</script>
  <script src="../ui/premium-shell.js"></script>
</body>
</html>
