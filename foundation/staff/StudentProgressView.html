<!doctype html>
<html lang="en">
<head>
  <style>
    html, body {
      background: #f5f3ff;
      margin: 0;
    }
  </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Progress</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
  /* Page-specific: grid view vertical rhythm */
  .wrap { padding-top: 24px; }
  @media (max-width: 600px) {
    .wrap { padding: 14px 10px 50px; }
  }

  /* Teacher/class setup row */
  .setup-row  { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .setup-field { flex: 1; min-width: 180px; }

  /* Sticky name column for the progress grid */
  thead th.name-col {
    text-align: left;
    padding-left: 16px;
    padding-right: 12px;
    position: sticky;
    left: 0;
    z-index: 6;
    background: var(--surface, #fff);
    border-right: 1px solid var(--border);
    min-width: 180px;
  }
  thead th.session-hdr { padding: 10px 8px; min-width: 52px; }
  thead tr.group-row th {
    padding: 6px 0;
    border-bottom: none;
    font-size: .65rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    background: var(--lilacSoft, var(--soft-lavender));
    color: var(--color-primary);
    font-weight: 800;
  }
  thead tr.group-row th.name-col {
    background: var(--lilacSoft, var(--soft-lavender));
    color: transparent;
  }
  tbody tr { transition: background .12s; }
  td {
    padding: 8px 4px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    vertical-align: middle;
  }
  td.name-col {
    position: sticky;
    left: 0;
    background: var(--surface, #fff);
    border-right: 1px solid var(--border);
    padding: 8px 12px 8px 16px;
    text-align: left;
    z-index: 2;
  }
  td.name-col:hover { background: #F6F3FD; }

  /* Student cell content */
  .student-name { font-weight: 700; font-size: .88rem; color: var(--ink, var(--text)); white-space: nowrap; }
  .student-id   { font-size: .72rem; color: var(--fs-text-muted); margin-top: 1px; font-weight: 500; }
  .faith-badges {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .faith-badges .fs-badge {
    font-size: 10px;
    font-weight: 700;
    line-height: 1;
    padding: 5px 8px;
    border-radius: 999px;
    border: 1px solid transparent;
  }
  .fs-badge--success { background: rgba(16, 185, 129, 0.14); color: #065f46; border-color: rgba(16, 185, 129, 0.35); }
  .fs-badge--warning { background: rgba(245, 158, 11, 0.14); color: #92400e; border-color: rgba(245, 158, 11, 0.36); }
  .fs-badge--danger  { background: rgba(239, 68, 68, 0.12); color: #991b1b; border-color: rgba(239, 68, 68, 0.34); }
  .fs-badge--neutral { background: rgba(76, 42, 146, 0.10); color: #4C2A92; border-color: rgba(76, 42, 146, 0.26); }

  /* Read-only attendance checkbox */
  .cb-cell { width: 52px; }
  .cb {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 2px solid var(--border);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    cursor: default;
    flex-shrink: 0;
  }
  .cb.checked   { background: var(--color-primary); border-color: var(--color-primary); }
  .cb.unchecked { background: var(--surface, #fff); border-color: var(--border); }
  .cb svg { display: none; }
  .cb.checked svg { display: block; }
  .grid-note {
    margin-top: 8px;
    font-size: 12px;
    color: var(--fs-text-muted);
  }
  .stats-inline {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0;
    font-size: 12px;
    color: var(--color-text-secondary, var(--fs-text-muted));
  }
  .stats-inline .sep {
    padding: 0 8px;
    opacity: 0.6;
  }

  /* View toggle pill bar */
  .view-toggle-wrap {
    display: inline-flex;
    background: var(--surface-2, #f3f0ff);
    border: 1px solid var(--border, #e0d9ff);
    border-radius: 14px;
    padding: 4px;
    gap: 4px;
  }
  .view-toggle-btn {
    border: none;
    border-radius: 10px;
    padding: 7px 18px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    background: transparent;
    color: var(--fs-text-muted, #6b7280);
    transition: background .15s, color .15s, box-shadow .15s;
  }
  .view-toggle-btn.active {
    background: #fff;
    color: var(--navy, #4C2A92);
    box-shadow: 0 1px 4px rgba(76,42,146,.14);
  }

  /* At-risk chip */
  .at-risk-chip {
    border: 1px solid var(--border, #e0d9ff);
    border-radius: 999px;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    background: var(--surface-2, #f3f0ff);
    color: var(--fs-text-muted, #6b7280);
    transition: background .15s, color .15s, border-color .15s;
  }
  .at-risk-chip.active {
    background: #991b1b;
    color: #fff;
    border-color: #991b1b;
  }
  .at-risk-chip:hover:not(.active) {
    background: #fee2e2;
    color: #991b1b;
    border-color: #fca5a5;
  }
</style>
  <link rel="stylesheet" href="../ui/premium-theme.css" />
  <link rel="stylesheet" href="../ui/admin-shell.css" />
  <link rel="stylesheet" href="../ui/components.css" />
  <link rel="stylesheet" href="../ui/layout.css" />
</head>
<body>
<main class="wrap fs-page fs-wrap-wide">

  <!-- SETUP -->
  <div class="card">
    <div class="card-head">
      <div class="card-icon">P</div>
      <div>
        <div class="card-title">Student Class Progress</div>
        <div class="card-sub">Class attendance checkboxes - read-only view from student records</div>
      </div>
    </div>

    <div class="setup-row">
      <!-- Teacher search -->
      <div class="setup-field dropdown" style="flex:2;min-width:200px">
        <label>Teacher</label>
        <input id="teacherQuery" placeholder="Search by name or ID..." oninput="onTeacherInput()" autocomplete="off" />
        <div class="drop-list hidden" id="teacherDrop"></div>
      </div>

      <!-- Class select (populated after teacher picked) -->
      <div class="setup-field" style="flex:2;min-width:200px">
        <label>Class</label>
        <select id="classSelect" disabled>
          <option value="">- select teacher first -</option>
        </select>
      </div>

      <div class="setup-field" style="flex:0">
        <label>&nbsp;</label>
        <button class="fs-btn primary" id="loadBtn" onclick="loadGrid()" disabled>Load Students</button>
      </div>
    </div>
    <div id="setup-error"></div>
  </div>

  <!-- GRID SECTION -->
  <div class="card hidden" id="grid-card">

    <div class="toolbar">
      <div class="view-toggle-wrap">
        <button type="button" id="toggle-classes" class="view-toggle-btn" onclick="setView('classes')">Classes</button>
        <button type="button" id="toggle-milestones" class="view-toggle-btn" onclick="setView('milestones')">Milestones</button>
      </div>
      <div class="search-wrap">
        <input id="studentSearch" placeholder="Filter students..." oninput="filterTable()" autocomplete="off" />
      </div>
      <div style="display:flex;gap:6px;margin-left:auto;align-items:center">
        <button id="atRiskChip" type="button" class="at-risk-chip" onclick="toggleAtRisk()">At Risk Only</button>
        <button class="fs-btn" onclick="exportCSV()">Export CSV</button>
      </div>
    </div>
    <div id="grid-note" class="grid-note" style="display:none"></div>

    <div class="stats-strip" id="stats-strip"></div>

    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--success);border-radius:4px"></div> Attended</div>
      <div class="leg"><div class="leg-dot" style="background:rgba(239,68,68,.18);border:2px solid rgba(239,68,68,.3);border-radius:4px"></div> Not attended</div>
    </div>

    <div class="tbl-outer">
      <table id="progress-table">
        <thead id="tbl-head"></thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>

    <div id="grid-msg"></div>
  </div>

</main>

<script>
  function readRuntimeConfig() {
    const cfg = window.FSConfig?.get ? window.FSConfig.get() : {
      SUPABASE_URL: String(window.FS_CONFIG?.SUPABASE_URL || '').trim(),
      SUPABASE_ANON_KEY: String(window.FS_CONFIG?.SUPABASE_ANON_KEY || '').trim(),
    };
    return {
      SUPABASE_URL: String(cfg.SUPABASE_URL || "").trim(),
      SUPABASE_ANON_KEY: String(cfg.SUPABASE_ANON_KEY || "").trim(),
    };
  }
  const CLASS_COLUMNS = ['Class1','Class2','Class3','Class4A','Class4B','Class5','Class6','Class7'];
  const VIEW_KEY = 'fs_progress_view';
  const state = { teacher:null, teachers:[], classes:[], classOptionId:'', students:[], filtered:[], milestones:[], progressView:'classes', atRiskOnly: false };
  const teacherModeScope = (() => {
    try {
      const raw = sessionStorage.getItem("fs_teacher_mode_scope");
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (String(parsed?.mode || "").toLowerCase() !== "teacher") return null;
      return parsed;
    } catch (_) { return null; }
  })();

  function esc(s){ return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function normFaith(v){ const t = String(v||'').trim(); return t || "I'm not sure"; }
  function faithBadgeClass(kind, value) {
    const v = normFaith(value);
    if (v === 'Yes') return 'fs-badge--success';
    if (v === 'No') return kind === 'water' ? 'fs-badge--danger' : 'fs-badge--warning';
    return 'fs-badge--neutral';
  }

  function showRuntimeError(message){
    const root = document.querySelector(".card");
    if (!root || document.getElementById("progress-runtime-error")) return;
    const el = document.createElement("div");
    el.id = "progress-runtime-error";
    el.className = "error-msg";
    el.textContent = message;
    root.appendChild(el);
  }

  function ensureSupabaseClient() {
    if (window.FS_SUPABASE_CLIENT && typeof window.FS_SUPABASE_CLIENT.from === "function") return window.FS_SUPABASE_CLIENT;
    throw new Error("Supabase client is not initialized.");
  }
  async function apiGet(action, params={}) {
    ensureSupabaseClient();
    const res = await window.FSApi.invokeEdge("teacher-portal-api", { action, params });
    if(!res?.ok) throw new Error(res?.error || "Request failed");
    return res;
  }

  // -- TEACHER SEARCH --
  let tmr = null;
  function onTeacherInput() {
    clearTimeout(tmr);
    const q = document.getElementById('teacherQuery').value.trim();
    hideDrop();
    if (q.length < 2) return;
    tmr = setTimeout(() => searchTeacher(q), 220);
  }

  async function searchTeacher(q) {
    try {
      const r = await apiGet('lookupTeacherForAttendance', { query:q });
      state.teachers = (r.data || []).filter((t) => {
        if (!teacherModeScope?.teacherId) return true;
        return String(t.teacherId || "").trim() === String(teacherModeScope.teacherId || "").trim();
      });
      const drop = document.getElementById('teacherDrop');
      if (!state.teachers.length) { drop.innerHTML = '<div class="drop-item" style="color:var(--text-muted)">No matches</div>'; drop.classList.remove('hidden'); return; }
      drop.innerHTML = state.teachers.map(t =>
        `<div class="drop-item" onclick="pickTeacher('${esc(t.teacherId)}')">
          ${esc(t.fullName)}
          <div class="drop-item-sub">${esc(t.email||'')} ${esc(t.subGroupLabel||'')}</div>
        </div>`).join('');
      drop.classList.remove('hidden');
    } catch(e) { console.error(e); }
  }

  function hideDrop() { document.getElementById('teacherDrop').classList.add('hidden'); }
  document.addEventListener('click', e => { if (!e.target.closest('.dropdown')) hideDrop(); });

  async function pickTeacher(id) {
    state.teacher = state.teachers.find(t => t.teacherId===id);
    document.getElementById('teacherQuery').value = state.teacher?.fullName || '';
    hideDrop();
    // Load classes
    const sel = document.getElementById('classSelect');
    sel.innerHTML = '<option value="">Loading...</option>';
    sel.disabled = true;
    document.getElementById('loadBtn').disabled = true;
    try {
      const r = await apiGet('getTeacherActiveClassOptions', { teacherId: state.teacher.teacherId });
      state.classes = r.data || [];
      sel.innerHTML = state.classes.map(c =>
        `<option value="${esc(c.classOptionId)}">${esc(c.campus||c.fellowship||c.classOptionId)} | ${esc(c.day)} ${esc(c.time)}</option>`
      ).join('') || '<option value="">No assigned classes yet</option>';
      sel.disabled = false;
      document.getElementById('loadBtn').disabled = false;
      state.classOptionId = state.classes[0]?.classOptionId || '';
      sel.value = state.classOptionId;
    } catch(e) {
      sel.innerHTML = '<option value="">Error loading classes</option>';
    }
  }

  // -- LOAD GRID --
  async function loadGrid() {
    state.classOptionId = document.getElementById('classSelect').value;
    if (!state.teacher || !state.classOptionId) {
      document.getElementById('setup-error').innerHTML = '<div class="error-msg">Please select a teacher and class.</div>';
      return;
    }
    document.getElementById('setup-error').innerHTML = '';

    const card = document.getElementById('grid-card');
    card.classList.remove('hidden');
    document.getElementById('tbl-head').innerHTML = '';
    document.getElementById('tbl-body').innerHTML = `<tr><td colspan="10" class="state-msg"><div class="spinner"></div>Loading students...</td></tr>`;
    document.getElementById('stats-strip').innerHTML = '';
    document.getElementById('grid-msg').innerHTML = '';

    try {
      const r = await apiGet('getTeacherClassProgressGrid', {
        teacherId: state.teacher.teacherId,
        classOptionId: state.classOptionId
      });
      state.milestones = Array.isArray(r.data?.milestones) ? r.data.milestones : [];
      state.classes = Array.isArray(r.data?.classes) && r.data.classes.length ? r.data.classes : CLASS_COLUMNS;
      state.students = (r.data?.students || []);
      state.filtered = [...state.students];
      if (state.progressView !== 'classes' && state.progressView !== 'milestones') {
        state.progressView = 'classes';
      }
      syncViewUI();
      renderTable();
      card.scrollIntoView({behavior:'smooth', block:'start'});
    } catch(e) {
      document.getElementById('tbl-body').innerHTML = '';
      document.getElementById('grid-msg').innerHTML = `<div class="error-msg">${esc(e.message)}</div>`;
    }
  }

  // -- RENDER --
  function renderTable() {
    const rows = state.filtered;
    const isClasses = state.progressView === 'classes';
    const milestoneCols = state.milestones || [];
    const classCols = state.classes || CLASS_COLUMNS;
    const activeCols = isClasses ? classCols : milestoneCols.map((m) => m.code);
    const colCount = activeCols.length + 2;
    const note = document.getElementById('grid-note');
    if (note) {
      note.style.display = isClasses ? 'block' : 'none';
      note.textContent = "Attendance is recorded via the Attendance portal";
    }

    // Build header: group row + column labels
    document.getElementById('tbl-head').innerHTML = `
      <tr class="group-row">
        <th class="name-col"></th>
        <th colspan="${activeCols.length}" style="text-align:center;letter-spacing:.1em">${isClasses ? 'Classes' : 'Milestones'}</th>
        <th></th>
      </tr>
      <tr>
        <th class="name-col">Student</th>
        ${(isClasses
          ? classCols.map(c => `<th class="session-hdr">${esc(c)}</th>`)
          : milestoneCols.map(m => `<th class="session-hdr">${esc(m.label || m.code)}</th>`)).join('')}
        <th style="padding:10px 14px 10px 8px;min-width:100px;text-align:left">Progress</th>
      </tr>`;

    if (!rows.length) {
      document.getElementById('tbl-body').innerHTML = `<tr><td colspan="${colCount}" class="state-msg">No students found.</td></tr>`;
      renderStats([]);
      return;
    }

    document.getElementById('tbl-body').innerHTML = rows.map((s, rowIndex) => {
      const checks = isClasses
        ? classCols.map(c => !!(s.attendance || {})[c])
        : milestoneCols.map(m => !!(s.milestones || {})[m.code]);
      const attended = checks.filter(Boolean).length;
      const pct = activeCols.length ? Math.round(attended / activeCols.length * 100) : 0;
      return `<tr>
        <td class="name-col">
          <div class="student-name">${esc(s.fullName||'-')}</div>
          <div class="student-id">${esc(s.studentId||s.personType||'')}</div>
          <div class="faith-badges">
            <span class="fs-badge ${faithBadgeClass('born', s.bornAgain)}">Born Again: ${esc(normFaith(s.bornAgain))}</span>
            <span class="fs-badge ${faithBadgeClass('tongues', s.speaksInTongues)}">Tongues: ${esc(normFaith(s.speaksInTongues))}</span>
            <span class="fs-badge ${faithBadgeClass('water', s.waterBaptized)}">Baptized: ${esc(normFaith(s.waterBaptized))}</span>
          </div>
        </td>
        ${checks.map((on, idx) => `
          <td class="cb-cell">
            <button type="button" class="cb ${on?'checked':'unchecked'}" ${isClasses ? 'disabled' : ''} onclick="${isClasses ? '' : `toggleMilestone(${rowIndex}, ${idx})`}" aria-label="${isClasses ? 'Attendance status' : 'Toggle milestone'}">
              <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
                <path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </td>`).join('')}
        <td style="padding:8px 14px 8px 8px">
          <div class="prog-wrap">
            <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
            <div class="prog-pct">${pct}%</div>
          </div>
        </td>
      </tr>`;
    }).join('');

    renderStats(rows);
  }

  function renderStats(rows) {
    const isClasses = state.progressView === 'classes';
    const milestoneCols = state.milestones || [];
    const classCols = state.classes || CLASS_COLUMNS;
    const activeCols = isClasses ? classCols : milestoneCols.map((m) => m.code);
    const total = rows.length;
    let totalChecks = 0, possibleChecks = total * activeCols.length;
    rows.forEach((s) => {
      if (isClasses) {
        classCols.forEach((c) => { if ((s.attendance || {})[c]) totalChecks++; });
      } else {
        milestoneCols.forEach((m) => { if ((s.milestones || {})[m.code]) totalChecks++; });
      }
    });
    const overallPct = possibleChecks ? Math.round(totalChecks / possibleChecks * 100) : 0;

    const perSession = isClasses
      ? classCols.map(c => rows.filter(s => !!(s.attendance || {})[c]).length)
      : milestoneCols.map(m => rows.filter(s => !!(s.milestones || {})[m.code]).length);

    const items = [
      `${total} students`,
      `${overallPct}% ${isClasses ? 'attendance' : 'milestones'}`,
      ...(isClasses
        ? classCols.map((c, i) => `${perSession[i]} ${c}`)
        : milestoneCols.map((m, i) => `${perSession[i]} ${String(m.label || m.code)}`))
    ];
    document.getElementById('stats-strip').innerHTML = `
      <div class="stats-inline">
        ${items.map((item, i) => `${i ? '<span class="sep">|</span>' : ''}<span>${esc(item)}</span>`).join('')}
      </div>
    `;
  }

  async function toggleMilestone(rowIndex, milestoneIndex) {
    if (state.progressView === 'classes') return;
    const student = state.filtered[rowIndex];
    const milestone = (state.milestones || [])[milestoneIndex];
    if (!student || !milestone) return;

    student.milestones = student.milestones || {};
    const previous = !!student.milestones[milestone.code];
    const next = !previous;

    student.milestones[milestone.code] = next;
    renderTable();
    document.getElementById('grid-msg').innerHTML = '';

    try {
      await apiGet('updateStudentMilestone', {
        studentId: student.studentId,
        milestoneCode: milestone.code,
        completed: next
      });
    } catch (e) {
      student.milestones[milestone.code] = previous;
      renderTable();
      document.getElementById('grid-msg').innerHTML = `<div class="error-msg">${esc(e.message || 'Could not save milestone update')}</div>`;
    }
  }

  // -- FILTER --
  function toggleAtRisk() {
    state.atRiskOnly = !state.atRiskOnly;
    const chip = document.getElementById('atRiskChip');
    if (chip) chip.classList.toggle('active', state.atRiskOnly);
    filterTable();
  }

  function filterTable() {
    const q = document.getElementById('studentSearch').value.toLowerCase();
    const classCols = state.classes || CLASS_COLUMNS;
    state.filtered = state.students.filter(s => {
      if (q && !(s.fullName||'').toLowerCase().includes(q) && !(s.studentId||'').toLowerCase().includes(q)) return false;
      if (state.atRiskOnly) {
        const attended = classCols.filter(c => !!(s.attendance || {})[c]).length;
        const pct = classCols.length ? Math.round(attended / classCols.length * 100) : 0;
        if (pct >= 75) return false;
      }
      return true;
    });
    renderTable();
  }

  // -- EXPORT CSV --
  function exportCSV() {
    const isClasses = state.progressView === 'classes';
    const milestoneCols = state.milestones || [];
    const classCols = state.classes || CLASS_COLUMNS;
    const headers = ['StudentID','Name', ...(isClasses ? classCols : milestoneCols.map(m => m.code)), 'Attended','Total','Pct'];
    const rows = state.filtered.map(s => {
      const checks = isClasses
        ? classCols.map(c => (s.attendance || {})[c] ? '1' : '0')
        : milestoneCols.map(m => (s.milestones || {})[m.code] ? '1' : '0');
      const attended = checks.filter(v=>v==='1').length;
      const total = (isClasses ? classCols.length : milestoneCols.length) || 0;
      return [s.studentId||'', s.fullName||'', ...checks, attended, total, (total ? Math.round(attended/total*100) : 0)+'%'].join(',');
    });
    const csv = [headers.join(','), ...rows].join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download = `student-progress-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  function syncViewUI() {
    const classesBtn = document.getElementById('toggle-classes');
    const milestonesBtn = document.getElementById('toggle-milestones');
    if (!classesBtn || !milestonesBtn) return;
    classesBtn.classList.toggle('active', state.progressView === 'classes');
    milestonesBtn.classList.toggle('active', state.progressView === 'milestones');
  }

  function setProgressView(view) {
    state.progressView = view === 'milestones' ? 'milestones' : 'classes';
    try { localStorage.setItem(VIEW_KEY, state.progressView); } catch (_) {}
    syncViewUI();
    renderTable();
  }

  function setView(view) {
    setProgressView(view);
  }

  try {
    const savedView = localStorage.getItem(VIEW_KEY);
    if (savedView === 'classes' || savedView === 'milestones') {
      state.progressView = savedView;
    }
  } catch (_) {}
</script>

  <script type="module">
    import { supabase, getCurrentProfile, isAdmin, isRegionalSecretary } from "../auth/auth-client.js";
    window.FS_SUPABASE_CLIENT = supabase;
    window["supabase"] = supabase;

    const { data } = await supabase.auth.getSession();
    if (!data?.session) {
      window.location.href = "login.html";
    } else {
      const profile = await getCurrentProfile();
      if (!profile || !(isAdmin(profile.role) || isRegionalSecretary(profile.role))) {
        window.location.href = "login.html";
      }
    }
  </script>
  <script type="module">
    import { supabase } from "../auth/auth-client.js";
    window.FSAdminShell && window.FSAdminShell.mount({ active: "progress", pageTitle: "Student Progress" });
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const teacherId = String(teacherModeScope?.teacherId || params.get('teacherId') || '');
      let email = String(teacherModeScope?.email || params.get('email') || '');
      let displayName = '';
      if (supabase && supabase.auth && typeof supabase.auth.getSession === 'function') {
        try {
          const { data } = await supabase.auth.getSession();
          const user = data?.session?.user;
          if (!email) email = user?.email || '';
          displayName = String(user?.user_metadata?.full_name || '').trim() || String(user?.email || '').trim();
        } catch (_) {}
      }
      if (window.FSAdminShell && typeof window.FSAdminShell.setProfile === 'function' && displayName) {
        window.FSAdminShell.setProfile(displayName, displayName.charAt(0).toUpperCase());
      }
      const seed = teacherId || email;
      if (!seed) return;
      const input = document.getElementById('teacherQuery');
      if (input) {
        input.value = seed;
        if (teacherModeScope?.teacherId) input.readOnly = true;
        input.dispatchEvent(new Event('input', { bubbles: true }));
        input.dispatchEvent(new Event('change', { bubbles: true }));
      }
    })();
  </script>
