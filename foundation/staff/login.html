<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foundation School â€” Admin Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --navy: #4C2A92;
      --gold: #F4BE41;
      --cream: #F4EFE3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(150deg, var(--cream) 0%, #e4d9f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 52px 44px 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 12px 40px rgba(76, 42, 146, 0.14);
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: var(--navy);
      border-radius: 16px;
      margin-bottom: 16px;
    }

    .logo-mark span {
      color: var(--gold);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .logo h1 {
      font-size: 21px;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.2;
    }

    .logo p {
      font-size: 13px;
      color: #888;
      margin-top: 3px;
    }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #dde0e8;
      border-radius: 9px;
      font-size: 15px;
      color: #222;
      background: #fafafa;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }

    input:focus {
      outline: none;
      border-color: var(--navy);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(76, 42, 146, 0.12);
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.18s, opacity 0.18s;
    }

    .btn:hover:not(:disabled) { background: #3b2080; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error {
      display: none;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      margin-top: 16px;
      line-height: 1.5;
    }

    .error.show { display: block; }
  </style>
  <link rel="stylesheet" href="../ui/premium-theme.css" />
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark"><span>FS</span></div>
      <h1>Foundation School</h1>
      <p>Admin Portal</p>
    </div>

    <form id="form" novalidate>
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="pw">Password</label>
        <input type="password" id="pw" autocomplete="current-password" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required>
      </div>
      <button type="submit" class="btn" id="btn">Sign In</button>
      <div class="error" id="err"></div>
    </form>
  </div>

  <script>
    const SUPABASE_URL     = 'https://xelpsttqhrcqmttmjory.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlbHBzdHRxaHJjcW10dG1qb3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODcxMTMsImV4cCI6MjA5MzQ2MzExM30.7a5yGvkaxxUBMOZl-_nZjjDCVYYvf4FrmwwhrzYd9zQ'

    const { createClient } = window.supabase
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // Redirect immediately if session already exists
    ;(async () => {
      try {
        const { data: { session } } = await db.auth.getSession()
        if (session) window.location.href = 'admin-portal.html'
      } catch (e) {
        console.error('Session check failed:', e)
      }
    })()

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault()
      const btn = document.getElementById('btn')
      const err = document.getElementById('err')
      const email = document.getElementById('email').value.trim()
      const pw    = document.getElementById('pw').value

      err.classList.remove('show')
      btn.disabled = true
      btn.textContent = 'Signing inâ€¦'

      try {
        const { error } = await db.auth.signInWithPassword({ email, password: pw })
        if (error) throw error
        window.location.href = 'admin-portal.html'
      } catch (e) {
        console.error('Login error:', e)
        err.textContent = (e.message || '').includes('Invalid login credentials')
          ? 'Incorrect email or password. Please try again.'
          : (e.message || 'Login failed. Please try again.')
        err.classList.add('show')
        btn.disabled = false
        btn.textContent = 'Sign In'
      }
    })
  </script>
  <script src="../ui/premium-shell.js"></script>
</body>
</html>
