<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foundation School â€” Batch Management</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--navy:#4C2A92;--navy-d:#3b2080;--gold:#F4BE41;--cream:#F4EFE3;--bg:#f5f3fb;--border:#e2ddf0;--text:#1a1230;--muted:#6b7280;--success:#166534;--success-bg:#dcfce7;--danger:#991b1b;--danger-bg:#fee2e2;--warn:#92400e;--warn-bg:#fef3c7;--info:#1e40af;--info-bg:#dbeafe}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}
    header{background:var(--navy);color:white;box-shadow:0 2px 8px rgba(0,0,0,.18)}
    .header-inner{max-width:1180px;margin:0 auto;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:38px;height:38px;border-radius:10px;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:900}
    .brand h1{font-size:17px;margin:0}
    .brand p{margin:2px 0 0;opacity:.75;font-size:12px}
    main{max-width:1180px;margin:0 auto;padding:28px 24px 60px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
    .card{background:white;border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:18px;box-shadow:0 8px 28px rgba(76,42,146,.06)}
    .card h2{font-size:16px;color:var(--navy);margin:0 0 14px}
    .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
    .form-group{display:flex;flex-direction:column;gap:4px}
    .form-group label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    button,.btn{border:0;border-radius:9px;padding:10px 15px;font-weight:700;cursor:pointer;background:var(--navy);color:white;text-decoration:none;display:inline-block;font-size:13px}
    button.secondary{background:white;color:var(--text);border:1px solid var(--border)}
    button.danger{background:var(--danger-bg);color:var(--danger);border:1px solid #fca5a5}
    button.warn{background:var(--warn-bg);color:var(--warn);border:1px solid #fcd34d}
    button.sm{padding:6px 10px;font-size:12px}
    button:disabled{opacity:.6;cursor:not-allowed}
    input,select,textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font:inherit;background:white}
    input:focus,select:focus{outline:2px solid var(--navy);outline-offset:1px}
    .table-wrap{overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;background:#f8f6ff;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:10px 12px;white-space:nowrap}
    td{border-top:1px solid var(--border);padding:10px 12px;vertical-align:middle}
    tr:hover td{background:#faf9ff}
    .badge{display:inline-block;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:700}
    .ok{background:var(--success-bg);color:var(--success)}
    .bad{background:var(--danger-bg);color:var(--danger)}
    .wait{background:var(--warn-bg);color:var(--warn)}
    .info{background:var(--info-bg);color:var(--info)}
    .muted{color:var(--muted)}
    .error{background:var(--danger-bg);border:1px solid #fca5a5;color:var(--danger);padding:12px;border-radius:10px;margin:10px 0}
    .success{background:var(--success-bg);border:1px solid #86efac;color:var(--success);padding:12px;border-radius:10px;margin:10px 0}
    .small{font-size:12px;color:var(--muted)}
    .actions{display:flex;gap:7px;flex-wrap:wrap}
    #toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:12px;font-weight:700;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.15);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
    #toast.show{opacity:1}
    #toast.ok-toast{background:var(--success-bg);color:var(--success);border:1px solid #86efac}
    #toast.err-toast{background:var(--danger-bg);color:var(--danger);border:1px solid #fca5a5}
  </style>
  <link rel="stylesheet" href="../ui/premium-theme.css" />
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="logo">FS</div>
      <div>
        <h1>Foundation School â€” Batch Management</h1>
        <p>Create and manage school batches</p>
      </div>
    </div>
    <div class="actions">
      <a class="btn" href="admin-portal.html">Admin Portal</a>
      <button class="secondary" onclick="signOut()">Sign Out</button>
    </div>
  </div>
</header>

<main>

  <section class="card">
    <h2>Create Batch</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Batch Code</label>
        <input id="batchCode" placeholder="FS-MAY-2026" />
      </div>
      <div class="form-group">
        <label>Batch Name</label>
        <input id="batchName" placeholder="Foundation School May 2026" />
      </div>
      <div class="form-group">
        <label>Start Sunday</label>
        <input type="date" id="startSunday" />
      </div>
    </div>
    <button onclick="createBatch()">Create Batch</button>
    <div id="formMsg"></div>
  </section>

  <section class="card">
    <h2>Existing Batches</h2>
    <p class="small">Manage batch registration status and lifecycle.</p>
    <div class="toolbar">
      <button class="secondary" onclick="loadBatches()">Refresh</button>
    </div>
    <div id="batchTable"></div>
  </section>

</main>

<div id="toast"></div>

<script>
const SUPABASE_URL = "https://xelpsttqhrcqmttmjory.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlbHBzdHRxaHJjcW10dG1qb3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODcxMTMsImV4cCI6MjA5MzQ2MzExM30.7a5yGvkaxxUBMOZl-_nZjjDCVYYvf4FrmwwhrzYd9zQ";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);

function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}

function badge(s){
  const x = String(s||'').toLowerCase();
  const cls = x.includes('archive') ? 'muted' :
              x.includes('suspend') ? 'bad' :
              x.includes('open') ? 'ok' :
              x.includes('draft') ? 'wait' : 'info';
  return `<span class="badge ${cls}">${esc(s??'â€”')}</span>`;
}

function toast(msg, ok=true){
  const t = $('toast');
  t.textContent = msg;
  t.className = 'show ' + (ok ? 'ok-toast' : 'err-toast');
  setTimeout(() => t.className = '', 3000);
}

async function signOut(){ await db.auth.signOut(); location.href='login.html'; }

async function writeAuditLog({action, entityType, entityId, status='SUCCESS', details={}}){
  const { error } = await db.from('audit_logs').insert({
    actor_email: 'admin@foundation.local',
    action, entity_type: entityType, entity_id: entityId, status, details
  });
  if(error) console.error('Audit log failed', error);
}

function rowsToTable(headers, rows){
  return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.join(''):`<tr><td colspan="${headers.length}" class="muted">No records found.</td></tr>`}</tbody></table></div>`;
}

async function createBatch(){
  const batch_code  = $('batchCode').value.trim();
  const batch_name  = $('batchName').value.trim();
  const start_sunday = $('startSunday').value;
  const msg = $('formMsg');
  msg.innerHTML = '';

  if(!batch_code || !batch_name || !start_sunday){
    msg.innerHTML = '<div class="error">All fields are required.</div>';
    return;
  }

  const { error } = await db.from('batches').insert({
    batch_code, batch_name, name: batch_name, start_sunday,
    status: 'DRAFT', registration_open: false, active: true
  });

  if(error){
    msg.innerHTML = `<div class="error">${esc(error.message)}</div>`;
    return;
  }

  await writeAuditLog({ action:'CREATE_BATCH', entityType:'batch', entityId:batch_code, details:{batch_code,batch_name,start_sunday} });
  $('batchCode').value = ''; $('batchName').value = ''; $('startSunday').value = '';
  toast('Batch created successfully.');
  loadBatches();
}

async function loadBatches(){
  $('batchTable').innerHTML = '<p class="small muted">Loadingâ€¦</p>';
  const { data, error } = await db.from('batches').select('*').order('created_at',{ascending:false});
  if(error){ $('batchTable').innerHTML = `<div class="error">${esc(error.message)}</div>`; return; }

  const rows = (data||[]).map(b => `
    <tr>
      <td>${esc(b.batch_code||'â€”')}</td>
      <td>${esc(b.batch_name||b.name||'â€”')}</td>
      <td>${badge(b.status||'â€”')}</td>
      <td>${esc(b.start_sunday||'â€”')}</td>
      <td>
        <div class="actions">
          <button class="sm" onclick="openRegistration('${b.batch_id}')">Open Registration</button>
          <button class="sm warn" onclick="suspendBatch('${b.batch_id}')">Suspend</button>
          <button class="sm danger" onclick="archiveBatch('${b.batch_id}')">Archive</button>
        </div>
      </td>
    </tr>`);

  $('batchTable').innerHTML = rowsToTable(['Code','Name','Status','Start Sunday','Actions'], rows);
}

async function openRegistration(id){
  const { error } = await db.from('batches').update({registration_open:true, status:'OPEN_REGISTRATION', active:true, updated_at:new Date().toISOString()}).eq('batch_id',id);
  if(error){ toast(error.message, false); return; }
  await writeAuditLog({action:'OPEN_REGISTRATION',entityType:'batch',entityId:id,details:{registration_open:true}});
  toast('Registration opened.'); loadBatches();
}

async function suspendBatch(id){
  const { error } = await db.from('batches').update({registration_open:false, status:'SUSPENDED', updated_at:new Date().toISOString()}).eq('batch_id',id);
  if(error){ toast(error.message, false); return; }
  await writeAuditLog({action:'SUSPEND_BATCH',entityType:'batch',entityId:id});
  toast('Batch suspended.'); loadBatches();
}

async function archiveBatch(id){
  if(!confirm('Archive this batch?')) return;
  const { error } = await db.from('batches').update({registration_open:false, active:false, status:'ARCHIVED', archived_at:new Date().toISOString(), updated_at:new Date().toISOString()}).eq('batch_id',id);
  if(error){ toast(error.message, false); return; }
  await writeAuditLog({action:'ARCHIVE_BATCH',entityType:'batch',entityId:id});
  toast('Batch archived.'); loadBatches();
}

loadBatches();
</script>
  <script src="../ui/premium-shell.js"></script>
</body>
</html>
