<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Section</title>
  <link rel="stylesheet" href="../../ui/tokens.css" />
  <style>
    html, body { margin: 0; height: 100%; }
    .frame { width: 100%; height: 100vh; border: none; display: block; }
  </style>
</head>
<body>
  <iframe id="frame" class="frame" src="../../staff/TeacherAttendancePortal.html" title="Attendance"></iframe>
  <script>
    const params = new URLSearchParams(window.location.search);
    const fallbackEmail = params.get("email") || "";
    const frame = document.getElementById("frame");

    frame.addEventListener("load", () => {
      frame.contentWindow?.postMessage({ type: "FS_TEACHER_CONTEXT", email: fallbackEmail }, "*");
    });
  </script>
</body>
</html>
