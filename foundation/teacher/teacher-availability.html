<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Solid - Teacher Availability</title>
  <link rel="stylesheet" href="../ui/tokens.css" />
  <link rel="stylesheet" href="../ui/primitives.css" />
  <link rel="stylesheet" href="../ui/admin-shell.css" />
</head>
<body>
  <main class="fs-content" style="max-width:1200px;margin:0 auto;padding:16px;">
    <section class="fs-card" style="margin-bottom:12px;">
      <div class="fs-row" style="justify-content:space-between;align-items:center;">
        <div>
          <h1 class="fs-h1">Teacher Availability</h1>
          <p class="fs-muted">Submit weekly availability by fellowship and month.</p>
        </div>
        <button id="logoutBtn" class="fs-btn fs-btn-secondary" type="button">Logout</button>
      </div>
    </section>
    <div id="main-content"></div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/config-helper.js"></script>
  <script type="module">
    import { CONFIG, requireAuth } from "../auth/auth-client.js";
    import { logout } from "../auth/logout.js";
    import { mountTeacherAvailability } from "../js/teacher-availability-module.js";

    document.documentElement.setAttribute("data-theme", "light");
    document.body.classList.add("fs-force-light");

    async function boot() {
      if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_ANON_KEY || CONFIG.SUPABASE_URL.includes("YOUR-PROJECT-REF")) {
        throw new Error("Supabase config is missing in foundation/auth/auth-client.js.");
      }
      const auth = await requireAuth(["teacher", "principal", "admin", "superadmin"]);
      if (!auth) return;
      document.getElementById("logoutBtn").addEventListener("click", logout);
      await mountTeacherAvailability("main-content");
    }

    boot().catch((e) => {
      const el = document.getElementById("main-content");
      el.innerHTML = `<section class="fs-card"><div class="fs-banner fs-banner-danger">Failed to load teacher availability: ${String(e?.message || e)}</div></section>`;
    });
  </script>
</body>
</html>
