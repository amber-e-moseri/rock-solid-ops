<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundation School - Teacher Availability</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../ui/premium-theme.css" />
  <style>
    :root {
      --line: color-mix(in srgb, var(--border) 90%, transparent);
      --glass: color-mix(in srgb, var(--surface) 85%, transparent);
      --ok: #166534;
      --warn: #b45309;
      --bad: #b42318;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .top {
      position: sticky; top: 8px; z-index: 30; backdrop-filter: blur(10px);
      background: var(--glass); border: 1px solid var(--line); border-radius: 16px; padding: 12px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .title h1 { margin: 0; font-size: 24px; }
    .title p { margin: 4px 0 0; font-size: 12px; color: var(--muted); }
    .icon-btn, .btn, select, input, textarea {
      border-radius: 12px; border: 1px solid var(--line); background: var(--surface-2); color: var(--text); font: inherit;
    }
    .icon-btn { width: 42px; height: 42px; cursor: pointer; font-size: 18px; }
    .btn { padding: 10px 14px; font-weight: 700; cursor: pointer; }
    .btn.primary { background: var(--primary); color: #fff; border-color: color-mix(in srgb, var(--primary) 80%, black); }
    .layout { margin-top: 12px; display: grid; grid-template-columns: minmax(0, 1fr) 330px; gap: 12px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; padding: 14px; box-shadow: var(--shadow-soft); }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 4px; font-weight: 700; }
    input, select, textarea { width: 100%; padding: 10px; }
    .campus-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .chip {
      border: 1px solid var(--line); background: var(--surface-2); border-radius: 999px; padding: 7px 11px; font-size: 12px; cursor: pointer; font-weight: 700;
    }
    .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .days { display: grid; grid-template-columns: 86px repeat(7, 1fr); border: 1px solid var(--line); border-bottom: 0; border-radius: 14px 14px 0 0; overflow: hidden; }
    .days div { padding: 8px; text-align: center; border-right: 1px solid var(--line); background: var(--surface-2); font-size: 11px; color: var(--muted); font-weight: 700; }
    .days div:first-child { text-align: left; padding-left: 10px; }
    .slot { display: grid; grid-template-columns: 86px repeat(7, 1fr); border: 1px solid var(--line); border-top: 0; }
    .time { padding: 8px 10px; background: var(--surface-2); color: var(--muted); font-size: 11px; font-weight: 700; border-right: 1px solid var(--line); }
    .cell { border-right: 1px solid var(--line); min-height: 38px; cursor: pointer; display: grid; place-items: center; font-size: 12px; }
    .cell:hover { background: color-mix(in srgb, var(--soft-lavender) 60%, var(--surface)); }
    .cell.on { background: color-mix(in srgb, var(--gold) 22%, var(--surface)); color: #624500; font-weight: 800; }
    .stack { display: grid; gap: 8px; }
    .msg { border-radius: 12px; padding: 9px 11px; font-size: 12px; border: 1px solid var(--line); }
    .ok { color: var(--ok); background: color-mix(in srgb, #22c55e 12%, var(--surface)); border-color: color-mix(in srgb, #22c55e 35%, var(--surface)); }
    .warn { color: var(--warn); background: color-mix(in srgb, #f59e0b 16%, var(--surface)); border-color: color-mix(in srgb, #f59e0b 40%, var(--surface)); }
    .bad { color: var(--bad); background: color-mix(in srgb, #ef4444 14%, var(--surface)); border-color: color-mix(in srgb, #ef4444 38%, var(--surface)); }
    .list { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
    .row { display: flex; justify-content: space-between; gap: 8px; padding: 10px; border-bottom: 1px solid var(--line); font-size: 12px; }
    .row:last-child { border-bottom: 0; }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top">
      <div class="title">
        <h1>Teacher Availability</h1>
        <p>Submit weekly availability by fellowship and month</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="themeBtn" class="icon-btn" aria-label="Theme toggle">🌙</button>
        <button id="logoutBtn" class="btn">Logout</button>
      </div>
    </section>

    <section id="flash" class="stack" style="margin-top:10px"></section>

    <div class="layout">
      <section class="stack">
        <article class="card">
          <div class="grid">
            <div>
              <label>Teacher</label>
              <input id="teacherDisplay" disabled />
            </div>
            <div>
              <label>Fellowship / Campus</label>
              <select id="campusSelect"></select>
            </div>
            <div>
              <label>Month</label>
              <select id="monthSelect"></select>
            </div>
            <div>
              <label>Notes</label>
              <input id="notesInput" placeholder="Optional notes for this month" />
            </div>
          </div>
          <div style="margin-top:10px">
            <label>Selected Campuses</label>
            <div id="campusChips" class="campus-chips"></div>
          </div>
        </article>

        <article class="card">
          <div class="days">
            <div>Time</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
          </div>
          <div id="gridWrap"></div>
          <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
            <strong id="slotSummary">0 slots selected</strong>
            <button id="submitBtn" class="btn primary">Submit Availability</button>
          </div>
        </article>
      </section>

      <aside class="stack">
        <article class="card">
          <strong>Submission Status</strong>
          <div id="statusList" class="list" style="margin-top:8px"></div>
        </article>
        <article class="card">
          <strong>Recent Submissions</strong>
          <div id="recentList" class="list" style="margin-top:8px"></div>
        </article>
      </aside>
    </div>
  </main>

<script type="module">
import { CONFIG, supabase } from "../auth/auth-client.js";
import { requireAuth } from "../auth/auth-guards.js";
import { logout } from "../auth/logout.js";

const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const TIMES = ["6:00 AM","7:00 AM","8:00 AM","9:00 AM","10:00 AM","11:00 AM","12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM","6:00 PM","7:00 PM","8:00 PM","9:00 PM"];
const $ = (id) => document.getElementById(id);
const esc = (v) => String(v ?? "").replace(/[&<>'"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;" }[c]));
const fmt = (v) => v ? new Date(v).toLocaleString() : "-";

const state = {
  auth: null,
  campusRows: [],
  monthKey: "",
  selectedCampusCodes: new Set(),
  activeCampusCode: "",
  slots: new Set(),
  existing: []
};

function setTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("fs_theme", theme);
  $("themeBtn").textContent = theme === "dark" ? "☀️" : "🌙";
}

function flash(msg, type = "ok") {
  $("flash").innerHTML = `<div class="msg ${type}">${esc(msg)}</div>`;
}

function monthOptions(count = 6) {
  const out = [];
  const now = new Date();
  for (let i = 0; i < count; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    out.push({ key: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, "0")}`, label: d.toLocaleDateString("en-US", { month: "long", year: "numeric" }) });
  }
  return out;
}

function slotKey(day, time) { return `${day}__${time}`; }

function renderGrid() {
  $("gridWrap").innerHTML = TIMES.map((time) => {
    const cells = DAYS.map((day) => {
      const key = slotKey(day, time);
      const on = state.slots.has(key);
      return `<div class="cell ${on ? "on" : ""}" data-day="${esc(day)}" data-time="${esc(time)}">${on ? "✓" : ""}</div>`;
    }).join("");
    return `<div class="slot"><div class="time">${esc(time)}</div>${cells}</div>`;
  }).join("");
  $("slotSummary").textContent = `${state.slots.size} slots selected`;
  document.querySelectorAll(".cell").forEach((cell) => {
    cell.addEventListener("click", () => {
      const key = slotKey(cell.dataset.day, cell.dataset.time);
      if (state.slots.has(key)) state.slots.delete(key); else state.slots.add(key);
      renderGrid();
    });
  });
}

function renderCampuses() {
  $("campusSelect").innerHTML = state.campusRows.map((c) => `<option value="${esc(c.code)}">${esc(c.campusName || c.code)} (${esc(c.code)})</option>`).join("");
  if (!state.activeCampusCode && state.campusRows[0]) state.activeCampusCode = state.campusRows[0].code;
  if (state.activeCampusCode) $("campusSelect").value = state.activeCampusCode;
  const chips = state.campusRows.map((c) => {
    const active = state.selectedCampusCodes.has(c.code);
    return `<button type="button" class="chip ${active ? "active" : ""}" data-code="${esc(c.code)}">${esc(c.code)}</button>`;
  }).join("");
  $("campusChips").innerHTML = chips || `<span style="font-size:12px;color:var(--muted)">No fellowship/campus mapping rows found.</span>`;
  document.querySelectorAll("[data-code]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const code = btn.dataset.code;
      if (state.selectedCampusCodes.has(code)) state.selectedCampusCodes.delete(code); else state.selectedCampusCodes.add(code);
      if (!state.selectedCampusCodes.size) state.selectedCampusCodes.add(code);
      renderCampuses();
      loadExisting();
    });
  });
}

function renderMonthOptions() {
  const options = monthOptions();
  $("monthSelect").innerHTML = options.map((m) => `<option value="${esc(m.key)}">${esc(m.label)}</option>`).join("");
  if (!state.monthKey) state.monthKey = options[0].key;
  $("monthSelect").value = state.monthKey;
}

function renderStatus() {
  const month = state.monthKey;
  const rows = state.existing.filter((r) => String(r.month_key || "") === month);
  $("statusList").innerHTML = rows.length ? rows.map((r) => `<div class="row"><span>${esc(r.campus_code || "-")} · ${esc(r.status || "SUBMITTED")}</span><span>${esc(fmt(r.updated_at || r.created_at))}</span></div>`).join("") : `<div class="row"><span>No submission for selected month.</span></div>`;
  $("recentList").innerHTML = state.existing.slice(0, 20).map((r) => `<div class="row"><span>${esc(r.month_key || "-")} · ${esc(r.campus_code || "-")}</span><span>${esc(fmt(r.created_at))}</span></div>`).join("") || `<div class="row"><span>No recent submissions.</span></div>`;
}

async function loadCampuses() {
  const { data, error } = await supabase.from("class_options").select("code:subgroup_id,campusName:fellowship_codes,subgroup_id").not("subgroup_id", "is", null).limit(500);
  if (error) throw error;
  const uniq = new Map();
  (data || []).forEach((r) => {
    const code = String(r.code || "").trim();
    if (!code) return;
    if (!uniq.has(code)) uniq.set(code, { code, campusName: code });
  });
  state.campusRows = [...uniq.values()];
  if (!state.campusRows.length) {
    state.campusRows = [{ code: "GENERAL", campusName: "General Fellowship" }];
  }
  if (!state.selectedCampusCodes.size && state.campusRows[0]) state.selectedCampusCodes.add(state.campusRows[0].code);
}

async function loadExisting() {
  const email = state.auth.profile.email;
  const { data, error } = await supabase
    .from("teacher_availability")
    .select("*")
    .eq("teacher_email", email)
    .order("created_at", { ascending: false })
    .limit(300);
  if (error) throw error;
  state.existing = data || [];
  renderStatus();
}

async function submitAvailability() {
  if (!state.slots.size) { flash("Select at least one slot.", "warn"); return; }
  const campuses = [...state.selectedCampusCodes];
  if (!campuses.length) { flash("Select at least one campus/fellowship.", "warn"); return; }
  const month = state.monthKey;
  const notes = $("notesInput").value.trim();
  const now = new Date().toISOString();
  const payload = [];
  campuses.forEach((campusCode) => {
    state.slots.forEach((key) => {
      const [day, time] = key.split("__");
      payload.push({
        teacher_id: state.auth.profile.user_id,
        teacher_email: state.auth.profile.email,
        teacher_name: state.auth.profile.full_name || state.auth.profile.email,
        campus_code: campusCode,
        subgroup_id: campusCode,
        month_key: month,
        day,
        time_slot: time,
        status: "SUBMITTED",
        notes,
        updated_at: now
      });
    });
  });
  $("submitBtn").disabled = true;
  const { error } = await supabase.from("teacher_availability").insert(payload);
  $("submitBtn").disabled = false;
  if (error) { flash(`Could not submit availability: ${error.message}`, "bad"); return; }
  flash("Availability submitted successfully.", "ok");
  await loadExisting();
}

function wire() {
  $("themeBtn").addEventListener("click", () => {
    const current = document.documentElement.getAttribute("data-theme") || "light";
    setTheme(current === "dark" ? "light" : "dark");
  });
  $("logoutBtn").addEventListener("click", logout);
  $("campusSelect").addEventListener("change", (e) => { state.activeCampusCode = e.target.value; });
  $("monthSelect").addEventListener("change", async (e) => { state.monthKey = e.target.value; await loadExisting(); });
  $("submitBtn").addEventListener("click", submitAvailability);
}

async function boot() {
  setTheme(localStorage.getItem("fs_theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
  if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_ANON_KEY || CONFIG.SUPABASE_URL.includes("YOUR-PROJECT-REF")) {
    flash("Supabase config is missing in foundation/auth/auth-client.js.", "bad");
    return;
  }
  const auth = await requireAuth(["teacher", "principal", "admin", "superadmin"]);
  if (!auth) return;
  state.auth = auth;
  $("teacherDisplay").value = `${auth.profile.full_name || "-"} (${auth.profile.email || "-"})`;
  renderMonthOptions();
  renderGrid();
  await loadCampuses();
  renderCampuses();
  await loadExisting();
  wire();
}

boot().catch((e) => flash(`Failed to load teacher availability: ${e.message || e}`, "bad"));
</script>
</body>
</html>
